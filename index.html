    function salvarBancoLocal(opcoes={}){
      try{
        const permitirVazio=opcoes.permitirVazio===true;
        const atual=contarBancoLocalAtual();

        const proximos={
          contratos:allContratos||[],
          pagamentos:allPagamentos||[],
          producao:allProducao||[],
          tecnicos:(allTecnicos||[]).filter(t=>t.tipo==="tecnico"||t.tipo==="exercicio"),
          atualizadoEm:new Date().toISOString()
        };

        // Proteção contra perda acidental em atualização/F5 ou falha de carregamento:
        // se já havia dados salvos e a memória está vazia, não sobrescreve o banco com vazio.
        if(!permitirVazio){
          if(atual.contratos>0 && proximos.contratos.length===0) proximos.contratos=carregarBancoLocal().contratos||[];
          if(atual.pagamentos>0 && proximos.pagamentos.length===0) proximos.pagamentos=carregarBancoLocal().pagamentos||[];
          if(atual.producao>0 && proximos.producao.length===0) proximos.producao=carregarBancoLocal().producao||[];
          if(atual.tecnicos>0 && proximos.tecnicos.length===0) proximos.tecnicos=carregarBancoLocal().tecnicos||[];
        }

        allContratos=proximos.contratos;
        allPagamentos=proximos.pagamentos;
        allProducao=proximos.producao;
        allTecnicos=mesclarExerciciosLocais(mesclarTecnicosLocais(proximos.tecnicos));

        persistirListasPrincipais();
        localStorage.setItem(CHAVE_BANCO_SIGECON,JSON.stringify(proximos));
        return true;
      }catch(e){
        console.error("Erro ao salvar banco local:",e);

        return false;
      }
    }

    function mesclarPorId(base=[], locais=[]){

      [...(base||[]),...(locais||[])].forEach(item=>{
        if(!item) return;
        const chave=String(item.id||`${item.tipo||"registro"}_${Date.now()}_${Math.random()}`);
        mapa.set(chave,item);
      });
      return [...mapa.values()];
    }

        return `Contrato ${registro.nContrato||"—"} • Empresa: ${registro.empresa||"—"} • Processo: ${registro.nProcesso||"—"}`;
      }
      if(registro.tipo==="pagamento" || registro.nfNumero || registro.contrato_id){
        return `Pagamento NF(s): ${registro.nfNumero||"—"} • Competência: ${registro.competencia||"—"} • Situação: ${registro.situacao||"—"}`;
      }
      if(registro.tipo==="producao" || registro.pagamento_id){
        return `Produção vinculada ao pagamento ${registro.pagamento_id||"—"}`;
      }
      if(registro.tipo==="tecnico" || registro.tecnicoMatricula){
        return `Técnico ${registro.tecnicoNome||"—"} • Matrícula: ${registro.tecnicoMatricula||"—"}`;

        return `Exercício fiscal ${registro.exercicioAno||"—"} • Status: ${registro.exercicioStatus||"—"}`;

    async function salvarExercicioSeguro(exercicio){
      const existentes=carregarExerciciosLocais().filter(ex=>String(ex.exercicioAno)!==String(exercicio.exercicioAno) && String(ex.id)!==String(exercicio.id));
      existentes.push(exercicio);
      salvarExerciciosLocais(existentes);

      if(window.dataSdk && window.dataSdk.create){
        try{
          const jaExiste=allTecnicos.find(ex=>ex.tipo==="exercicio" && String(ex.exercicioAno)===String(exercicio.exercicioAno));
          if(!jaExiste){
            const result=await window.dataSdk.create(exercicio);
            if(result?.isOk){
              allTecnicos=mesclarExerciciosLocais([...allTecnicos,exercicio]);
              return {isOk:true,origem:"dataSdk"};
            }
          }
        }catch(e){console.warn("Falha ao salvar exercício no Data SDK. Mantido localmente:",e);}
      }
      allTecnicos=mesclarExerciciosLocais([...allTecnicos,exercicio]);
      return {isOk:true,origem:"local"};
    }

    async function atualizarExercicioSeguro(exercicio){
      const locais=carregarExerciciosLocais();
      const idx=locais.findIndex(ex=>String(ex.id)===String(exercicio.id) || String(ex.exercicioAno)===String(exercicio.exercicioAno));
      if(idx>=0) locais[idx]=exercicio; else locais.push(exercicio);
      salvarExerciciosLocais(locais);

      if(window.dataSdk && window.dataSdk.update && allTecnicos.some(ex=>String(ex.id)===String(exercicio.id))){
        try{
          const result=await window.dataSdk.update(exercicio);
          if(result?.isOk){
            allTecnicos=mesclarExerciciosLocais(allTecnicos.map(ex=>String(ex.id)===String(exercicio.id)?exercicio:ex));
            return {isOk:true,origem:"dataSdk"};
          }
        }catch(e){console.warn("Falha ao atualizar exercício no Data SDK. Mantido localmente:",e);}
      }
      allTecnicos=mesclarExerciciosLocais(allTecnicos.map(ex=>String(ex.id)===String(exercicio.id)?exercicio:ex));
      return {isOk:true,origem:"local"};
    }

    async function excluirExercicioSeguro(exercicio){

      if(window.dataSdk && window.dataSdk.delete && allTecnicos.some(ex=>String(ex.id)===String(exercicio.id))){

    function chaveTecnico(t){

    function mesclarTecnicosLocais(registros){
      const mapa=new Map();
      const excluidos=new Set(carregarTecnicosExcluidos().map(x=>String(x||"").toUpperCase()));
      [...(registros||[]),...carregarTecnicosLocais(),...obterTecnicosPadrao()].forEach(item=>{
        const chaveMat=chaveTecnico(item);
        if(item.tipo==="tecnico" && excluidos.has(chaveMat)) return;
        const chave=item.tipo==="tecnico" ? "tecnico_"+chaveMat : String(item.tipo||"")+"_"+String(item.id||"");
        if(chave && !mapa.has(chave)) mapa.set(chave,item);
      });
      return [...mapa.values()];
    }

    async function excluirTecnicoSeguro(registro){
      try{
        const matricula=chaveTecnico(registro);
        const idStr=String(registro?.id||"");

        // Bloqueia reaparecimento dos técnicos padrão e removidos.
        const excluidos=carregarTecnicosExcluidos().map(x=>String(x).toUpperCase());
        if(matricula && !excluidos.includes(matricula)){
          excluidos.push(matricula);
          salvarTecnicosExcluidos(excluidos);
        }

        const deveManter=(t)=>{
          const mesmoId=idStr && String(t.id)===idStr;
          const mesmaMatricula=matricula && chaveTecnico(t)===matricula;
          return !(mesmoId || mesmaMatricula);
        };

        // Remove da memória principal.
        allTecnicos=(allTecnicos||[]).filter(deveManter);

        // Remove dos técnicos locais usados pelo módulo.
        const locais=carregarTecnicosLocais().filter(deveManter);
        salvarTecnicosLocais(locais);

        // Remove também da chave persistente geral de técnicos.
        const persistentes=carregarListaLocal(CHAVE_TECNICOS_SIGECON).filter(deveManter);
        salvarListaLocal(CHAVE_TECNICOS_SIGECON,persistentes);

        // Remove do banco geral, sem apagar exercícios.
        try{
          const banco=JSON.parse(localStorage.getItem(CHAVE_BANCO_SIGECON)||"{}");
          banco.tecnicos=(Array.isArray(banco.tecnicos)?banco.tecnicos:[]).filter(deveManter);
          banco.atualizadoEm=new Date().toISOString();
          localStorage.setItem(CHAVE_BANCO_SIGECON,JSON.stringify(banco));
        }catch(e){
          console.warn("Falha ao remover técnico do banco geral:",e);
        }

        // Remove de bancoSistema, se existir.
        try{
          const bancoSistema=JSON.parse(localStorage.getItem("bancoSistema")||"{}");
          if(Array.isArray(bancoSistema.tecnicos)){
            bancoSistema.tecnicos=bancoSistema.tecnicos.filter(deveManter);
            localStorage.setItem("bancoSistema",JSON.stringify(bancoSistema));
          }
        }catch(e){
          console.warn("Falha ao remover técnico do bancoSistema:",e);
        }

        // Tenta remover no SDK quando aplicável, mas a exclusão local não depende disso.
        if(window.dataSdk && window.dataSdk.delete && registro && !String(registro.id||"").startsWith("TEC00")){
          try{

    function salvarSessao(){
      if(!usuarioAutenticado) return;

      const sessao={
        usuario:usuarioAutenticado,
        perfil:currentProfile||usuarioAutenticado.perfil||"gestor",
        exercicio:exercicioAtivo||2026,
        aba:currentTab||"dashboard",
        filtros:{
          pagamentos:{

            fonte:filtroPagamentosFonte||"",

            unidade:filtroPagamentosUH||"",
            servico:filtroPagamentosServico||"",
            competencia:filtroPagamentosCompetencia||"",
            tipoProcesso:filtroPagamentosTipoProcesso||"",
            mostrarPagos:!!filtroPagamentosMostrarPagos,
            busca:window.filtroPagamentosBusca||""
          }
        },
        salvaEm:new Date().toISOString()
      };

      // Atualizar/F5 deve manter a sessão. Apenas o botão Sair limpa estes dados.
      localStorage.removeItem(CHAVE_LOGOUT_INTENCIONAL_SIGECON);
      sessionStorage.removeItem(CHAVE_LOGOUT_INTENCIONAL_SIGECON);
      localStorage.setItem(CHAVE_SESSAO_SIGECON,JSON.stringify(sessao));
      localStorage.setItem("sigecon_sessao",JSON.stringify(sessao)); // compatibilidade com versões anteriores
      localStorage.setItem("sigecon_ultima_aba",sessao.aba||"dashboard");
      localStorage.setItem(CHAVE_MANTER_CONECTADO_SIGECON,"1");
      sessionStorage.setItem(CHAVE_SESSAO_SIGECON,JSON.stringify(sessao));
    }

    function limparSessao(){
      // Só o botão SAIR chama esta função. Atualizar a página não limpa sessão.
      localStorage.setItem(CHAVE_LOGOUT_INTENCIONAL_SIGECON,"1");
      sessionStorage.setItem(CHAVE_LOGOUT_INTENCIONAL_SIGECON,"1");
      localStorage.removeItem(CHAVE_SESSAO_SIGECON);
      localStorage.removeItem("sigecon_sessao");
      localStorage.removeItem("sigecon_ultima_aba");
      localStorage.removeItem(CHAVE_MANTER_CONECTADO_SIGECON);
      sessionStorage.removeItem(CHAVE_SESSAO_SIGECON);
    }

    function carregarSessao(){
      try{
        // Sair do sistema é a única ação que invalida a sessão.
        if(localStorage.getItem(CHAVE_LOGOUT_INTENCIONAL_SIGECON)==="1" || sessionStorage.getItem(CHAVE_LOGOUT_INTENCIONAL_SIGECON)==="1") return null;

        const possiveis=[
          localStorage.getItem(CHAVE_SESSAO_SIGECON),
          localStorage.getItem("sigecon_sessao"),
          sessionStorage.getItem(CHAVE_SESSAO_SIGECON)
        ].filter(Boolean);

        for(const bruto of possiveis){
          try{
            const sessao=JSON.parse(bruto);
            if(sessao && sessao.usuario) return sessao;
          }catch(e){}
        }
        return null;
      }catch(e){
        return null;
      }
    }

    function contratoPermitidoAoLeitor(c){

      const acesso=usuarioAutenticado.acessoLeitor||{tipo:"completo"};
      if(acesso.tipo==="completo") return true;
      if(acesso.tipo==="empresa"){
        return String(c.empresa||"")===String(acesso.empresa||"");
      }
      if(acesso.tipo==="unidade"){
        const unidadeOk=contratoUnidadesArray(c).includes(acesso.unidade);
        const servicos=Array.isArray(acesso.servicos)?acesso.servicos:[];
        const servicoOk=!servicos.length || servicos.includes(c.servicoTipo);
        return unidadeOk && servicoOk;
      }

    }

        const servicoOk=!servicos.length || servicos.includes(contrato.servicoTipo);
        return unidadeOk && servicoOk;

function autenticar(){
      const exercicio=document.getElementById("login-exercicio").value;
      const perfil=document.getElementById("login-perfil").value;
      const input=document.getElementById("login-input").value;
      
      if(!exercicio){
        showInlineAlert("❌ Selecione um exercício fiscal","error");
        return;
      }
      
      if(!perfil){
        showInlineAlert("❌ Selecione um perfil de acesso","error");
        return;
      }

      let usuario=null;

      if(perfil==="gestor"){
        if(input.trim()!=="123456"){
          showInlineAlert("❌ Senha do Gestor incorreta!\n\nUse: 123456","error");
          return;
        }
        usuario={
          id:"ADM001",
          nome:"Gestor Administrativo",
          perfil:"gestor",
          matricula:"ADM001",
          unidades:["HMWG","HRTM","HEMONORTE","HCCPG"]
        };
      } else if(perfil==="tecnico"){
        if(!input||input.trim()===""){
          showInlineAlert("❌ Digite sua matrícula de técnico","error");
          return;
        }

        const inputUpper=input.toUpperCase().trim();
        const tecnico=buscarTecnicoPorMatricula(inputUpper);

        if(!tecnico){
          const cadastrados=mesclarTecnicosLocais(allTecnicos)
            .filter(t=>t.tipo==="tecnico" && t.tecnicoAtivo!==false)
            .map(t=>t.tecnicoMatricula)
            .filter(Boolean)
            .slice(0,8)
            .join(", ");
          showInlineAlert("❌ Matrícula não encontrada ou técnico inativo."+(cadastrados?` Matrículas ativas: ${cadastrados}`:""),"error");
          return;
        }

        usuario={
          id:chaveTecnico(tecnico),
          nome:tecnico.tecnicoNome||"Técnico Operacional",
          perfil:"tecnico",
          matricula:chaveTecnico(tecnico),
          unidades:[],
          servicos:String(tecnico.tecnicoServicos||"").split(",").map(s=>s.trim()).filter(Boolean)
        };
      } else if(perfil==="visitante"){
        const tipoLeitor=document.getElementById("login-leitor-tipo")?.value||"completo";
        const unidadeLeitor=document.getElementById("login-leitor-unidade")?.value||"";
        const empresaLeitor=document.getElementById("login-leitor-empresa")?.value||"";
        const servicosLeitor=obterServicosSelecionadosLeitor();

        if(tipoLeitor==="unidade" && !unidadeLeitor){
          showInlineAlert("❌ Selecione a unidade para o acesso de leitor.","error");
          return;
        }
        if(tipoLeitor==="unidade" && !servicosLeitor.length){
          showInlineAlert("❌ Selecione pelo menos um serviço para o acesso por unidade.","error");
          return;
        }
        if(tipoLeitor==="empresa" && !empresaLeitor){
          showInlineAlert("❌ Selecione a empresa para o acesso de leitor.","error");
          return;
        }

        usuario={
          id:"VIS001",
          nome:tipoLeitor==="completo"?"Leitor - Acesso Completo":tipoLeitor==="unidade"?`Leitor - ${unidadeLeitor}`:`Leitor - ${empresaLeitor}`,
          perfil:"visitante",
          matricula:"VIS001",
          unidades:tipoLeitor==="unidade"?[unidadeLeitor]:[],
          acessoLeitor:{
            tipo:tipoLeitor,
            unidade:unidadeLeitor,
            empresa:empresaLeitor,
            servicos:servicosLeitor
          }
        };
      }

      if(usuario){
        usuarioAutenticado=usuario;
        currentProfile=perfil;
        if(perfil==="visitante" && !["dashboard","contratos","pagamentos"].includes(currentTab)){
          currentTab="dashboard";
        }
        exercicioAtivo=parseInt(exercicio);
        exibirTelaAutenticada();
        document.getElementById("exercicio-badge").textContent=exercicio;
        updateProfileUI();
        buildNav();
        renderContent();
        salvarSessao();
        showInlineAlert("✅ Bem-vindo, "+usuario.nome+"!","info");
      }
    }

    // ─── HELPERS ───
    const fmt=v=>"R$ "+(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtM = v => "R$ " + (v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    const pct=(a,b)=>b?Math.round(a/b*100):0;

    function parseValorBR(valor){
      if(valor===undefined||valor===null) return 0;
      if(typeof valor==="number") return isNaN(valor)?0:valor;

      let texto=String(valor).trim();
      if(!texto) return 0;

      texto=texto.replace(/R\$|\s/g,"");

      // Quando há vírgula, assume padrão brasileiro: 1.234,56
      if(texto.includes(",")){
        texto=texto.replace(/\./g,"").replace(",",".");
        return parseFloat(texto)||0;
      }

      // Quando há ponto, preserva o ponto decimal se ele parecer decimal.
      const partes=texto.split(".");
      if(partes.length>2){
        texto=partes.join("");
      }else if(partes.length===2 && partes[1].length===3){
        texto=partes.join("");
      }

      return parseFloat(texto)||0;
    }

    function formatarMoedaBR(valor){
      const numero=parseValorBR(valor);
      if(!numero) return "";
      return numero.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
    }

    function aplicarMascaraMoedaBR(input){
      if(!input) return;
      const numero=parseValorBR(input.value);
      input.value=numero?numero.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}):"";
    }

    
    function prepararInputMoedaBR(input){
      if(!input) return;

    function escapeHtml(valor){
      return String(valor ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function formatarDataBR(data){
      if(!data) return "—";
      const partes=String(data).split("-");
      if(partes.length===3){
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
      }
      const d=new Date(data);
      if(isNaN(d)) return data;
      return d.toLocaleDateString("pt-BR");
    }

    
    function calcularDiasRestantes(dataFim){
      if(!dataFim) return 0;
      const hoje=new Date();
      hoje.setHours(0,0,0,0);

      const fim=new Date(String(dataFim)+"T00:00:00");
      if(isNaN(fim)) return 0;

      return Math.ceil((fim-hoje)/(1000*60*60*24));
    }

    function obterEscalaVigencia(dias){
      if(dias===null || dias===undefined || Number.isNaN(dias)){
        return {
          classe:"bg-slate-50 text-slate-700 border-slate-200",
          tom:"neutra",
          legenda:"Vigência não informada"
        };
      }
      if(dias<=30){
        return {
          classe:"bg-red-50 text-red-800 border-red-200",
          tom:"critica",
          legenda:dias < 0 ? `Vencido há ${Math.abs(dias)} dia(s)` : `${dias} dia(s) restantes`
        };
      }
      if(dias>=31 && dias<=59){
        return {
          classe:"bg-orange-50 text-orange-800 border-orange-200",
          tom:"atencao",
          legenda:`${dias} dia(s) restantes`
        };
      }
      if(dias>=60 && dias<=90){
        return {
          classe:"bg-yellow-50 text-yellow-800 border-yellow-200",
          tom:"alerta",
          legenda:`${dias} dia(s) restantes`
        };
      }
      return {
        classe:"bg-emerald-50 text-emerald-800 border-emerald-200",
        tom:"estavel",
        legenda:`${dias} dia(s) restantes`
      };
    }

      return `
        <div class="inline-flex flex-col gap-1 px-3 py-2 rounded-xl border ${escala.classe} font-bold text-xs">
          <span>${formatarDataBR(c?.vigIni)} até ${formatarDataBR(c?.vigFim)}</span>

          return {
            numero:String(partes[0]||"").trim(),

        return [{numero:"Empenho não detalhado", valor:parseValorBR(c.valorEmpenho2026), elementoDespesa:"", fonte:c.fonteRecurso||"Não informada"}];

    function calcularMesesVigencia(inicio,fim){
      if(!inicio || !fim) return 0;
      const dtIni=new Date(inicio+"T00:00:00");
      const dtFim=new Date(fim+"T00:00:00");
      if(isNaN(dtIni)||isNaN(dtFim)||dtFim<dtIni) return 0;
      const dias=Math.max(1,Math.ceil((dtFim-dtIni)/(1000*60*60*24))+1);
      return Math.max(1,dias/30.4375);
    }

    function calcularValorMensalContrato(valorTotal,inicio,fim){
      const valor=parseValorBR(valorTotal);
      const meses=calcularMesesVigencia(inicio,fim);
      if(!valor || !meses) return 0;
      return valor/meses;
    }

      const vigFim=document.getElementById(`${prefixo}-vigfim`)?.value;
      const campo=document.getElementById(`${prefixo}-valor-mensal`);
      const info=document.getElementById(`${prefixo}-valor-mensal-info`);
      if(!campo) return;
      const mensal=calcularValorMensalContrato(valor,vigIni,vigFim);
      campo.value=mensal?mensal.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}):"";
      if(info){
        const meses=calcularMesesVigencia(vigIni,vigFim);
        info.textContent=mensal?`Calculado automaticamente: ${meses.toFixed(1)} mês(es) de vigência.`:"Informe valor total e vigência para calcular automaticamente.";
      }
    }

    function resumirFonteRecurso(fonte){
      const texto=String(fonte||"").trim();
      if(!texto) return "—";

      // Exibe a fonte de forma padronizada e curta na tabela de pagamentos.
      // Exemplos: "Fonte 600 - Federal" => "0.600"; "500" => "0.500".
      const match=texto.match(/(?:^|\D)(\d{3})(?:\D|$)/);
      if(match) return `0.${match[1]}`;

      const matchComPonto=texto.match(/0[.,](\d{3})/);
      if(matchComPonto) return `0.${matchComPonto[1]}`;

      // Se por algum erro antigo vier valor financeiro no campo fonte, não polui a visualização.
      if(/^R\$|\d+[,.]\d{2}$/.test(texto)) return "—";

      return texto.replace(/^fonte\s*/i,"").split("-")[0].trim() || texto;
    }

function contratoTemFonte(c,fonte){
      if(!fonte) return true;
      const termo=String(fonte).toLowerCase().trim();

    // ─── ALERTAS DE VIGÊNCIA ───
    function verificarVigenciaContratos(contratosEscopo=null){
      const hoje=new Date();
      const alertas=[];
      const base=contratosEscopo || aplicarFiltroLeitorContratos(allContratos);

      base.forEach(c=>{
        if(!c.vigFim) return;
        const vigFim=new Date(c.vigFim);
        const diasRestantes=Math.ceil((vigFim-hoje)/(1000*60*60*24));

        if(diasRestantes<0){
          alertas.push({
            tipo:"Expirado",
            cor:"vermelho",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:`Vencido há ${Math.abs(diasRestantes)} dia(s).`
          });
        } else if(diasRestantes<=30){
          alertas.push({
            tipo:"Crítico",
            cor:"vermelho",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:diasRestantes===0?"Vence hoje.":`Faltam ${diasRestantes} dia(s).`
          });
        } else if(diasRestantes<=60){
          alertas.push({
            tipo:"Atenção",
            cor:"amarelo",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:`Faltam ${diasRestantes} dia(s).`
          });
        } else if(diasRestantes<=90){
          alertas.push({
            tipo:"Primeiro aviso",
            cor:"azul",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:`Primeiro aviso: faltam ${diasRestantes} dia(s).`
          });
        }
      });

      return alertas.sort((a,b)=>a.dias-b.dias);
    }

    function calcularValorExecutadoContrato(c){
      return allPagamentos
        .filter(p=>p.contrato_id===c.id && (!p.anoExercicio || p.anoExercicio==exercicioAtivo))
        .reduce((acc,p)=>acc+parseValorBR(p.nfValor),0);
    }

    function calcularPercentualTempoContrato(c){
      if(!c.vigIni || !c.vigFim) return 0;
      const inicio=new Date(c.vigIni);
      const fim=new Date(c.vigFim);
      const hoje=new Date();
      if(isNaN(inicio)||isNaN(fim)||fim<=inicio) return 0;
      const total=fim-inicio;
      const decorrido=Math.min(Math.max(hoje-inicio,0),total);
      return Math.round((decorrido/total)*100);
    }

    function analisarExecucaoContrato(c){
      const empenhado=calcularValorEmpenhadoContrato(c);
      const executado=calcularValorExecutadoContrato(c);
      const pctExecucao=pct(executado,empenhado);
      const pctTempo=calcularPercentualTempoContrato(c);
      const diferenca=pctExecucao-pctTempo;

      let status="Dentro do esperado";
      let cor="verde";
      let leitura="Execução compatível com o prazo decorrido.";

      if(diferenca<-15){
        status="Abaixo do esperado";
        cor="vermelho";
        leitura="Execução abaixo do ritmo esperado para o período.";
      } else if(diferenca>15){
        status="Acima do esperado";
        cor="amarelo";
        leitura="Execução acima do ritmo esperado. Acompanhar saldo e fonte.";
      }

      return {
        contrato:c.nContrato,
        empresa:c.empresa,
        status,
        cor,
        leitura,
        empenhado,
        executado,
        pctExecucao,
        pctTempo,
        diferenca
      };
    }

    function obterAlertasExecucao(contratos){
      return contratos
        .filter(c=>calcularValorEmpenhadoContrato(c)>0)
        .map(analisarExecucaoContrato);
    }

    function normalizarServicoItem(item){
      if(typeof item==="object" && item!==null){
        return {codigo:item.codigo||item.id||item.value||"", nome:item.nome||item.label||item.codigo||""};
      }
      const txt=String(item||"");
      if(txt.includes("|")){
        const [codigo,...rest]=txt.split("|");
        return {codigo:codigo.trim(), nome:(rest.join("|")||codigo).trim()};
      }
      return {codigo:txt.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""), nome:txt.trim()};

    async function excluirRegistroSeguro(registro, listaNome=""){
      if(!registro || !registro.id){
        return {isOk:false, error:"Registro inválido"};
      }

      if(listaNome==="contratos" || registro.tipo==="contrato"){
        allContratos=allContratos.filter(x=>String(x.id)!==String(registro.id));
      }
      if(listaNome==="pagamentos" || registro.tipo==="pagamento"){
        allPagamentos=allPagamentos.filter(x=>String(x.id)!==String(registro.id));
      }
      if(listaNome==="producao" || registro.tipo==="producao"){
        allProducao=allProducao.filter(x=>String(x.id)!==String(registro.id));
      }
      if(listaNome==="tecnicos" || registro.tipo==="tecnico"){
        allTecnicos=allTecnicos.filter(x=>String(x.id)!==String(registro.id));
      }

      if(window.dataSdk && window.dataSdk.delete){
        try{
          await window.dataSdk.delete(registro);
        }catch(e){
          console.warn("Falha no Data SDK. Exclusão local preservada:",e);
        }
      }

      registrarAuditoria("Exclusão",listaNome||registro.tipo,registro);
      salvarDepoisDeAlterar();
      persistirListasPrincipais();
      return {isOk:true, origem:"local"};
    }

    async function criarRegistroSeguro(registro, tipoLista){
      let result={isOk:false};
      if(window.dataSdk && window.dataSdk.create){
        try{
          result=await window.dataSdk.create(registro);
        }catch(e){
          console.warn("Falha no Data SDK ao criar. Aplicando salvamento local:",e);
        }
      }

      if(tipoLista==="contratos" && !allContratos.some(x=>String(x.id)===String(registro.id))){
        allContratos=[...allContratos,registro];
      }
      if(tipoLista==="pagamentos" && !allPagamentos.some(x=>String(x.id)===String(registro.id))){
        allPagamentos=[...allPagamentos,registro];
      }
      if(tipoLista==="producao" && !allProducao.some(x=>String(x.id)===String(registro.id))){
        allProducao=[...allProducao,registro];
      }
      if(tipoLista==="tecnicos" && !allTecnicos.some(x=>String(x.id)===String(registro.id))){
        allTecnicos=[...allTecnicos,registro];
      }

      registrarAuditoria("Cadastro",tipoLista,registro);
      salvarDepoisDeAlterar();
      persistirListasPrincipais();
      return {isOk:true, origem:result.isOk?"dataSdk":"local"};
    }

    async function atualizarRegistroSeguro(registro, tipoLista){
      let result={isOk:false};
      if(window.dataSdk && window.dataSdk.update){
        try{
          result=await window.dataSdk.update(registro);
        }catch(e){
          console.warn("Falha no Data SDK ao atualizar. Aplicando atualização local:",e);
        }
      }

      if(tipoLista==="contratos"){
        allContratos=allContratos.some(x=>String(x.id)===String(registro.id))
          ? allContratos.map(x=>String(x.id)===String(registro.id)?registro:x)
          : [...allContratos,registro];
      }
      if(tipoLista==="pagamentos"){
        allPagamentos=allPagamentos.some(x=>String(x.id)===String(registro.id))
          ? allPagamentos.map(x=>String(x.id)===String(registro.id)?registro:x)
          : [...allPagamentos,registro];
      }
      if(tipoLista==="producao"){
        allProducao=allProducao.some(x=>String(x.id)===String(registro.id))
          ? allProducao.map(x=>String(x.id)===String(registro.id)?registro:x)
          : [...allProducao,registro];
      }
      if(tipoLista==="tecnicos"){
        allTecnicos=allTecnicos.some(x=>String(x.id)===String(registro.id))
          ? allTecnicos.map(x=>String(x.id)===String(registro.id)?registro:x)
          : [...allTecnicos,registro];
      }

      registrarAuditoria("Atualização",tipoLista,registro);
      salvarDepoisDeAlterar();
      persistirListasPrincipais();
      return {isOk:true, origem:result.isOk?"dataSdk":"local"};
    }

    function normalizarEmpenhosAditivo(valor=""){
      if(Array.isArray(valor)) return valor;
      return String(valor||"").split(/\n|;/).map(v=>v.trim()).filter(Boolean).map(numero=>({numero}));
    }

    function extrairAditivosContrato(c){
      if(Array.isArray(c?.aditivos) && c.aditivos.length){
        return c.aditivos.map(a=>({
          numero:String(a.numero||"").trim(),
          data:String(a.data||"").trim(),
          vigIni:String(a.vigIni||a.vigenciaInicial||"").trim(),
          vigFim:String(a.vigFim||a.vigenciaFinal||"").trim(),
          valor:parseValorBR(a.valor||0),
          empenhos:normalizarEmpenhosAditivo(a.empenhos||a.empenhosTexto||""),
          descricao:String(a.descricao||a.objeto||"").trim()
        })).filter(a=>a.numero||a.data||a.vigIni||a.vigFim||a.valor||a.descricao||a.empenhos.length);
      }
      if(c?.aditivo && c.aditivo!=="—"){
        return [{numero:String(c.aditivo),data:"",vigIni:"",vigFim:"",valor:0,empenhos:[],descricao:""}];
      }
      return [];
    }

    function obterAditivoVigenteContrato(c){
      const hoje=new Date();
      hoje.setHours(0,0,0,0);
      const aditivos=extrairAditivosContrato(c)
        .filter(a=>a.vigIni||a.vigFim)
        .map(a=>({...a,ini:a.vigIni?new Date(a.vigIni):null,fim:a.vigFim?new Date(a.vigFim):null}))
        .filter(a=>(!a.ini||!isNaN(a.ini))&&(!a.fim||!isNaN(a.fim)));

      const vigente=aditivos.find(a=>(!a.ini||a.ini<=hoje)&&(!a.fim||a.fim>=hoje));
      if(vigente) return vigente;

      const ordenado=aditivos.sort((a,b)=>(b.fim?.getTime()||0)-(a.fim?.getTime()||0));
      return ordenado[0]||null;
    }

    function obterResumoVigenteContrato(c){
      const ad=obterAditivoVigenteContrato(c);
      if(ad){
        return {
          temAditivo:true,
          numero:ad.numero||"Aditivo",
          vigIni:ad.vigIni||c.vigIni,
          vigFim:ad.vigFim||c.vigFim,
          valor:ad.valor||parseValorBR(c.valorContrato),
          empenhos:ad.empenhos||[],
          descricao:ad.descricao||""
        };
      }
      return {
        temAditivo:false,
        numero:c.nContrato||"Contrato inicial",
        vigIni:c.vigIni,
        vigFim:c.vigFim,
        valor:parseValorBR(c.valorContrato),
        empenhos:extrairEmpenhosContrato(c),
        descricao:c.objeto||""
      };
    }

    function renderVigenciaResumoContrato(c){
      const atual=obterResumoVigenteContrato(c);
      const dias=atual.vigFim?calcularDiasRestantes(atual.vigFim):null;
      const escala=obterEscalaVigencia(dias);

      return `

          <span class="font-black">${formatarDataBR(atual.vigIni)} até ${formatarDataBR(atual.vigFim)}</span>
          <span class="text-[10px]">${escala.legenda} ${atual.temAditivo?"• aditivo vigente":"• contrato inicial"}</span>
        </div>
      `;
    }

    function calcularExecucaoPorEmpenhoContrato(c){
      const empenhos=extrairEmpenhosContrato(c);
      const mapa=new Map();

      empenhos.forEach(e=>{
        mapa.set(String(e.numero||""),{
          numero:e.numero||"",
          fonte:e.fonte||"",
          elementoDespesa:e.elementoDespesa||"",
          empenhado:parseValorBR(e.valor),
          executado:0
        });
      });

      const pagamentos=(allPagamentos||[]).filter(p=>String(p.contrato_id)===String(c.id) && (!p.anoExercicio || String(p.anoExercicio)===String(exercicioAtivo)));

      pagamentos.forEach(p=>{
        const obs=normalizarListaFinanceira(p.ordensBancarias||[]);
        const nls=normalizarListaFinanceira(p.notasLancamento||[]);
        const base=obs.length?obs:nls;

        if(base.length){
          base.forEach(item=>{
            if(!item.empenho) return;
            if(!mapa.has(String(item.empenho))){
              mapa.set(String(item.empenho),{numero:item.empenho,fonte:"",elementoDespesa:"",empenhado:0,executado:0});
            }
            mapa.get(String(item.empenho)).executado+=parseValorBR(item.valor||0);
          });
          return;
        }

        const empenhosPag=Array.isArray(p.empenhos)?p.empenhos:[];
        if(empenhosPag.length===1){
          const numero=String(empenhosPag[0].numero||p.empenho||"");
          if(!mapa.has(numero)) mapa.set(numero,{numero,fonte:empenhosPag[0].fonte||"",elementoDespesa:"",empenhado:0,executado:0});
          mapa.get(numero).executado+=parseValorBR(p.nfValor||0);
        }else if(empenhosPag.length>1){
          const parte=parseValorBR(p.nfValor||0)/empenhosPag.length;
          empenhosPag.forEach(e=>{
            const numero=String(e.numero||"");
            if(!mapa.has(numero)) mapa.set(numero,{numero,fonte:e.fonte||"",elementoDespesa:"",empenhado:0,executado:0});
            mapa.get(numero).executado+=parte;
          });
        }
      });

      return [...mapa.values()].map(e=>({
        ...e,
        saldo:e.empenhado-e.executado,
        percentual:e.empenhado>0?Math.min(100,Math.round((e.executado/e.empenhado)*100)):0
      }));
    }

              <div class="grid grid-cols-3 gap-2 mt-2 text-[10px]">

    }

    function renderGraficoExecucaoEmpenhosContrato(c){
      const itens=calcularExecucaoPorEmpenhoContrato(c);
      if(!itens.length) return `<div class="rounded-xl bg-slate-50 border border-slate-100 p-4 text-steel-500">Nenhum empenho cadastrado para gerar gráfico.</div>`;
      const max=Math.max(...itens.map(e=>e.empenhado),...itens.map(e=>e.executado),1);
      return `
        <div class="rounded-xl bg-white border border-sky-100 p-4">
          <p class="font-bold text-navy-900 mb-3">Gráfico de execução por empenho</p>
          <div class="space-y-4">
            ${itens.map(e=>`
              <div>
                <div class="flex items-center justify-between gap-2 mb-1">
                  <p class="text-xs font-bold text-navy-900">${escapeHtml(e.numero||"Empenho")}</p>
                  <p class="text-xs text-steel-500">${e.percentual}% executado</p>
                </div>
                <div class="space-y-1">
                  <div>
                    <p class="text-[10px] text-blue-700 font-bold">Empenhado ${fmtM(e.empenhado)}</p>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2,Math.round((e.empenhado/max)*100))}%;background:linear-gradient(90deg,#2563a8,#3b82c4)"></div></div>
                  </div>
                  <div>
                    <p class="text-[10px] text-orange-700 font-bold">Executado ${fmtM(e.executado)}</p>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2,Math.round((e.executado/max)*100))}%;background:linear-gradient(90deg,#f97316,#fb923c)"></div></div>
                  </div>
                  <div>
                    <p class="text-[10px] text-emerald-700 font-bold">Saldo ${fmtM(e.saldo)}</p>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2,Math.round((Math.max(e.saldo,0)/max)*100))}%;background:linear-gradient(90deg,#059669,#34d399)"></div></div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    async function salvarContrato(e){
      if(bloquearAcaoLeitor()) return;

      e.preventDefault();
      if(!hasPermission("create")){showInlineAlert("Sem permissão","error");return}

      const unidades=[...document.querySelectorAll(".form-uh-multi:checked")].map(el=>el.value);
      if(unidades.length===0){
        showInlineAlert("Selecione pelo menos uma unidade hospitalar","error");
        return;
      }

      const valorContrato=obterValorMoedaInput("form-valor-contrato");
      const vigIni=document.getElementById("form-vigini").value;
      const vigFim=document.getElementById("form-vigfim").value;
      const valorMensal=calcularValorMensalContrato(valorContrato,vigIni,vigFim);

      if(!valorContrato){
        showInlineAlert("Informe o valor total do contrato","error");
        return;
      }

      if(!valorMensal){
        showInlineAlert("Informe a vigência inicial e final para calcular o valor mensal","error");
        return;
      }

      const empenhos=coletarEmpenhos("form-lista-empenhos");
      const aditivos=coletarAditivos("form-lista-aditivos");
      const empenhosTexto=montarTextoEmpenhos(empenhos);
      const novoContrato={
        id:Date.now().toString(),
        tipo:"contrato",
        nProcesso:document.getElementById("form-nprocesso").value,
        unidades:unidades.join(","),
        empresa:document.getElementById("form-empresa").value,
        nContrato:document.getElementById("form-ncontrato").value,
        objeto:document.getElementById("form-objeto").value.trim(),
        aditivo:aditivos.map(a=>a.numero).filter(Boolean).join(", ")||"—",
        aditivos:aditivos,
        vigIni:vigIni,
        vigFim:vigFim,
        valorContrato:valorContrato,
        valorEstimadoMensal:valorMensal,
        servicoTipo:document.getElementById("form-servico").value,
        anoExercicio:exercicioAtivo,
        status:"Ativo",
        valorEmpenho2026:calcularValorEmpenhadoContrato({empenhos}),
        empenhos:empenhos,
        empenhosTexto:empenhosTexto,
        valorExecutado2026:0,
        criadoEm:new Date().toISOString()
      };

      const result=await criarRegistroSeguro(novoContrato,"contratos");
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Contrato salvo com sucesso!","info");
        renderContent();
      } else {
        showInlineAlert("Erro ao salvar contrato","error");
      }
    }

    async function atualizarContrato(e,id){
      if(bloquearAcaoLeitor()) return;

      e.preventDefault();
      const unidades=[...document.querySelectorAll(".edit-uh-multi:checked")].map(el=>el.value);
      if(unidades.length===0){
        showInlineAlert("Selecione pelo menos uma unidade hospitalar","error");
        return;
      }

      const contratoBase=allContratos.find(x=>String(x.id)===String(id));
      if(!contratoBase){
        showInlineAlert("Contrato não encontrado para atualização","error");
        return;
      }

      const empenhos=coletarEmpenhos("edit-lista-empenhos");
      const aditivos=coletarAditivos("edit-lista-aditivos");
      const empenhosTexto=montarTextoEmpenhos(empenhos);

      const contratoAtualizado={
        ...contratoBase,
        nProcesso:document.getElementById("edit-nprocesso").value,
        unidades:unidades.join(","),
        empresa:document.getElementById("edit-empresa").value,
        nContrato:document.getElementById("edit-ncontrato").value,
        objeto:document.getElementById("edit-objeto").value.trim(),
        aditivo:aditivos.map(a=>a.numero).filter(Boolean).join(", ")||"—",
        aditivos:aditivos,
        vigIni:document.getElementById("edit-vigini").value,
        vigFim:document.getElementById("edit-vigfim").value,
        valorContrato:obterValorMoedaInput("edit-valor-contrato"),
        valorEstimadoMensal:calcularValorMensalContrato(obterValorMoedaInput("edit-valor-contrato"),document.getElementById("edit-vigini").value,document.getElementById("edit-vigfim").value),
        servicoTipo:document.getElementById("edit-servico").value,
        empenhos:empenhos,
        empenhosTexto:empenhosTexto,
        valorEmpenho2026:calcularValorEmpenhadoContrato({empenhos}),
        atualizadoEm:new Date().toISOString()
      };

      const result=await atualizarRegistroSeguro(contratoAtualizado,"contratos");
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Contrato atualizado com sucesso!","info");
        renderContent();
      } else {
        showInlineAlert("Erro ao atualizar contrato","error");
      }
    }

    async function confirmarExclusaoContrato(id){
      const c=allContratos.find(x=>String(x.id)===String(id));
      if(!c){
        alert("Contrato não encontrado para exclusão.");
        return;
      }

      if(!confirm(`Deseja excluir o contrato ${c.nContrato || ""}?`)) return;

      const result=await excluirRegistroSeguro(c,"contratos");
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Contrato excluído com sucesso!","info");
        atualizarTelaAtual();
      } else {
        showInlineAlert("❌ Erro ao excluir contrato","error");
      }
    }

    // ─── PAGAMENTOS ───
    
    function obterProcessoSEIPagamento(p){
      if(!p) return "—";
      const direto=String(p.processoSEI||p.processoSei||p.sei||"").trim();
      if(direto) return direto;
      const notas=extrairNFsPagamento(p);
      const ids=[...new Set(notas.map(n=>String(n.sei||"").trim()).filter(Boolean))];
      return ids.length?ids.join(", "):"—";
    }

    
    function formatarCompetenciaBR(valor){
      if(!valor) return "—";
      const texto=String(valor).trim();
      const match=texto.match(/^(\d{4})-(\d{2})$/);
      if(match){
        const ano=match[1];
        const mes=parseInt(match[2],10);
        const nomes=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
        if(mes>=1 && mes<=12) return `${nomes[mes-1]}/${ano}`;
      }
      const data=new Date(texto);
      if(!isNaN(data)){
        const nomes=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
        return `${nomes[data.getMonth()]}/${data.getFullYear()}`;
      }
      return texto;
    }

function formatarDataHoraBR(data){
      if(!data) return "—";
      const d=new Date(data);
      if(isNaN(d)) return String(data);
      return d.toLocaleDateString("pt-BR")+" às "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    }

    function situacaoClasseDestaque(situacao){
      const s=String(situacao||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
      if(s.includes("pago")) return "bg-emerald-50 text-emerald-800 border-emerald-200";
      if(s.includes("liquidado")) return "bg-blue-50 text-blue-800 border-blue-200";
      if(s.includes("liquidar")) return "bg-amber-50 text-amber-800 border-amber-200";
      if(s.includes("unidade")) return "bg-purple-50 text-purple-800 border-purple-200";
      if(s.includes("glosado")) return "bg-red-50 text-red-800 border-red-200";
      return "bg-slate-50 text-slate-700 border-slate-200";
    }

    function atualizarResumoFinanceiroLinha(input){
      const lista=input?.closest(".space-y-2[id$='-list'], #modal-complemento-list");
      const modalLista=document.getElementById("modal-complemento-list");
      if(!lista && !modalLista) return;

      const alvo=lista || modalLista;
      const resumo=document.getElementById("modal-complemento-resumo");
      if(!resumo || !alvo) return;

      const nf=parseValorBR(alvo.dataset.nfValor||0);
      const total=[...alvo.querySelectorAll(".fin-valor")].reduce((s,el)=>s+parseValorBR(el.value||0),0);
      const dif=nf-total;
      const cls=total && Math.abs(dif)>0.009 ? "bg-red-50 border-red-200 text-red-700" : "bg-emerald-50 border-emerald-200 text-emerald-700";
      resumo.className=`rounded-lg border p-3 text-xs font-bold ${cls}`;
      resumo.innerHTML=`NF: ${fmtM(nf)} • Informado: ${fmtM(total)} • Diferença: ${fmtM(dif)}`;
    }

async function salvarComplementoSituacaoPagamento(e,id,novaSituacao,tipo){
      e.preventDefault();
      const pagamento=allPagamentos.find(p=>String(p.id)===String(id));
      if(!pagamento){
        showInlineAlert("Pagamento não encontrado","error");
        return;
      }

      const linhas=coletarLinhasFinanceiras("modal-complemento-list");
      if(!linhas.length){
        showInlineAlert(tipo==="ob"?"Informe pelo menos uma OB.":"Informe pelo menos uma Nota de Lançamento.","error");
        return;
      }

      const validacao=validarLinhasFinanceirasContraNF(pagamento,linhas,tipo);
      if(!validacao.ok){
        showInlineAlert(validacao.mensagem,"error");
        return;
      }

      const atualizado={
        ...pagamento,
        situacao:novaSituacao,
        atualizadoEm:new Date().toISOString()
      };

      if(tipo==="ob"){
        atualizado.ordensBancarias=linhas;
      }else{
        atualizado.notasLancamento=linhas;
      }

      registrarAuditoria("Alteração de situação","pagamentos",atualizado,`Situação alterada para "${novaSituacao}" com registro de ${tipo==="ob"?"OB":"NL"} • NF(s): ${pagamento.nfNumero||"—"} • Competência: ${formatarCompetenciaBR(pagamento.competencia)}`);

      const result=await atualizarRegistroSeguro(atualizado,"pagamentos");
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Situação e dados financeiros atualizados com sucesso!","info");
        renderContent();
      }else{
        showInlineAlert("❌ Erro ao atualizar situação","error");
      }
    }

    function excluirPagamentoCadastro(id){
      if(bloquearAcaoLeitor()) return;

      try{
        const idStr=String(id||"").trim();
        garantirIdsPagamentos();

        const pagamento=(allPagamentos||[]).find(p=>String(p.id)===idStr);
        if(!pagamento){
          showInlineAlert("❌ Processo de pagamento não encontrado para exclusão.","error");
          return false;
        }

        const processo=typeof obterProcessoSEIPagamento==="function"
          ? obterProcessoSEIPagamento(pagamento)
          : (pagamento.processoSEI||pagamento.nfNumero||idStr);

        if(!confirm(`Deseja realmente excluir este processo de pagamento?\n\nProcesso SEI: ${processo}`)){
          return false;
        }

        allPagamentos=(allPagamentos||[]).filter(p=>String(p.id)!==idStr);

        // Salva o estado limpo em todos os pontos de persistência.
        salvarListaLocal(CHAVE_PAGAMENTOS_SIGECON,allPagamentos);

        try{
          const banco=JSON.parse(localStorage.getItem(CHAVE_BANCO_SIGECON)||"{}");
          banco.pagamentos=allPagamentos;
          banco.atualizadoEm=new Date().toISOString();
          localStorage.setItem(CHAVE_BANCO_SIGECON,JSON.stringify(banco));
        }catch(e){ console.warn("Falha ao atualizar banco geral:",e); }

        try{
          const bancoSistema=JSON.parse(localStorage.getItem("bancoSistema")||"{}");
          bancoSistema.pagamentos=allPagamentos;
          localStorage.setItem("bancoSistema",JSON.stringify(bancoSistema));
        }catch(e){ console.warn("Falha ao atualizar bancoSistema:",e); }

        if(window.dataSdk && typeof window.dataSdk.delete==="function"){
          Promise.resolve(window.dataSdk.delete(pagamento)).catch(err=>console.warn("SDK delete falhou:",err));
        }

        if(typeof registrarAuditoria==="function"){
          registrarAuditoria("Exclusão","pagamentos",pagamento,`Exclusão de processo de pagamento • Processo SEI: ${processo}`);
        }

        closeAllModals();
        showInlineAlert("✅ Processo de pagamento excluído com sucesso!","info");
        currentTab="pagamentos";
        buildNav();
        renderContent();
        return true;
      }catch(error){
        console.error("Erro ao excluir pagamento:",error);
        showInlineAlert("❌ Erro ao excluir processo de pagamento.","error");
        return false;
      }
    }

      };

    function garantirIdsPagamentos(){
      let alterou=false;
      allPagamentos=(allPagamentos||[]).map((p,idx)=>{
        if(p && p.id) return p;
        alterou=true;
        return {
          ...p,
          id:`pag_migrado_${Date.now()}_${idx}_${Math.random().toString(16).slice(2)}`
        };
      });
      if(alterou){
        salvarListaLocal(CHAVE_PAGAMENTOS_SIGECON,allPagamentos);
        try{
          const banco=JSON.parse(localStorage.getItem(CHAVE_BANCO_SIGECON)||"{}");
          banco.pagamentos=allPagamentos;
          banco.atualizadoEm=new Date().toISOString();
          localStorage.setItem(CHAVE_BANCO_SIGECON,JSON.stringify(banco));
        }catch(e){}
      }
    }


    function somaListaFinanceira(lista=[]){
      return normalizarListaFinanceira(lista).reduce((s,item)=>s+parseValorBR(item.valor||0),0);
    }

    function validarValoresFinanceirosPagamento(p){
      const valorNF=parseValorBR(p?.nfValor||0);
      const totalNL=somaListaFinanceira(p?.notasLancamento||[]);
      const totalOB=somaListaFinanceira(p?.ordensBancarias||[]);
      const difNL=totalNL?valorNF-totalNL:0;
      const difOB=totalOB?valorNF-totalOB:0;

      return {
        valorNF,
        totalNL,
        totalOB,
        difNL,
        difOB,
        nlInferior:totalNL>0 && totalNL<valorNF,
        obInferior:totalOB>0 && totalOB<valorNF,
        nlDivergente:totalNL>0 && Math.abs(difNL)>0.009,
        obDivergente:totalOB>0 && Math.abs(difOB)>0.009
      };
    }

    function obterContratoPagamento(p){
      return allContratos.find(c=>String(c.id)===String(p?.contrato_id));
    }

    function obterFontePorEmpenhoPagamento(p, empenhoNumero=""){
      const contrato=obterContratoPagamento(p);
      const empenhosContrato=extrairEmpenhosContrato(contrato||{});
      const item=empenhosContrato.find(e=>String(e.numero||"")===String(empenhoNumero||""));
      if(item?.fonte) return item.fonte;

      const empenhosPag=Array.isArray(p?.empenhos)?p.empenhos:[];
      const empPag=empenhosPag.find(e=>String(e.numero||"")===String(empenhoNumero||""));
      if(empPag?.fonte) return empPag.fonte;

      return p?.fonteRecurso||"—";
    }

    function obterEmpenhosContratoPagamento(p){
      const contrato=obterContratoPagamento(p);
      return extrairEmpenhosContrato(contrato||{});
    }

    function obterEmpenhoPrincipalPagamento(p){
      const empenhosPag=Array.isArray(p?.empenhos)?p.empenhos:[];
      if(empenhosPag.length && empenhosPag[0]?.numero) return String(empenhosPag[0].numero);
      const texto=String(p?.empenho||"").split(",").map(x=>x.trim()).filter(Boolean);
      return texto[0]||"";
    }

    function obterEmpenhoSelecionadoNoContratoPagamento(p){
      const empenhosContrato=obterEmpenhosContratoPagamento(p);
      const atual=obterEmpenhoPrincipalPagamento(p);
      let selecionado=empenhosContrato.find(e=>String(e.numero||"")===String(atual||""));
      if(!selecionado && empenhosContrato.length===1) selecionado=empenhosContrato[0];
      return selecionado||null;
    }

    function textoFonteEmpenho(e){
      const fonte=String(e?.fonte||"").trim();
      const numero=String(e?.numero||"").trim();
      const codigo=resumirFonteRecurso(fonte);
      if(codigo && codigo!=="—" && numero) return `${codigo} · NE ${numero}`;
      if(codigo && codigo!=="—") return codigo;
      if(numero) return `NE ${numero}`;
      return "Empenho sem fonte";
    }

    function obterFontesDistintasPagamento(p){
      const fontes=[];
      const adicionar=(fonte,origem="")=>{
        const codigo=resumirFonteRecurso(fonte||"");
        if(!codigo || codigo==="—") return;
        if(!fontes.some(f=>String(f.codigo)===String(codigo))){
          fontes.push({codigo,fonte:fonte||codigo,origem});
        }
      };

      const itensFinanceiros=[
        ...normalizarListaFinanceira(p?.notasLancamento||[]).map(i=>({...i,tipo:"NL"})),
        ...normalizarListaFinanceira(p?.ordensBancarias||[]).map(i=>({...i,tipo:"OB"}))
      ];

      itensFinanceiros.forEach(item=>{
        if(item.empenho){
          adicionar(obterFontePorEmpenhoPagamento(p,item.empenho),`${item.tipo} ${item.numero||""} • NE ${item.empenho}`);
        }
      });

      const empenhosPag=Array.isArray(p?.empenhos)?p.empenhos:[];
      empenhosPag.forEach(e=>{
        adicionar(e.fonte || obterFontePorEmpenhoPagamento(p,e.numero),`NE ${e.numero||""}`);
      });

      const empenhosTexto=String(p?.empenho||"").split(",").map(x=>x.trim()).filter(Boolean);
      empenhosTexto.forEach(ne=>adicionar(obterFontePorEmpenhoPagamento(p,ne),`NE ${ne}`));

      const selecionado=obterEmpenhoSelecionadoNoContratoPagamento(p);
      if(selecionado) adicionar(selecionado.fonte,`NE ${selecionado.numero||""}`);
      adicionar(p?.fonteRecurso||"","Fonte registrada no pagamento");
      return fontes;
    }

    function obterCodigoFontePagamento(p){
      const fontes=obterFontesDistintasPagamento(p);
      return fontes[0]?.codigo || "—";
    }

    function renderFontePagamentoResumo(p){
      const fontes=obterFontesDistintasPagamento(p);
      if(!fontes.length){
        return `<span class="fonte-vazio-compacto" title="Cadastre uma NE no contrato e vincule a NL/OB ao empenho para puxar a fonte">Sem NE</span>`;
      }
      const titulo=fontes.map(f=>`${f.codigo}${f.origem?` (${f.origem})`:""}`).join(" | ");

      const visiveis=fontes.slice(0,2);

      return `

    function alterarFonteEmpenhoPagamentoRapido(id,numeroEmpenho){
      if(bloquearAcaoLeitor()) return;
      garantirIdsPagamentos();

      const idx=allPagamentos.findIndex(x=>String(x.id)===String(id));
      if(idx<0){
        showInlineAlert("❌ Pagamento não encontrado.","error");
        return;
      }

      const pagamento=allPagamentos[idx];
      const empenhoSelecionado=obterEmpenhosContratoPagamento(pagamento).find(e=>String(e.numero||"")===String(numeroEmpenho||""));
      if(!empenhoSelecionado){
        showInlineAlert("❌ Selecione um empenho cadastrado no contrato.","error");
        renderPagamentos(document.getElementById("content-area"));
        return;
      }

      const atualizado={
        ...pagamento,
        empenhos:[{
          numero:empenhoSelecionado.numero||"",
          fonte:empenhoSelecionado.fonte||"",
          valor:parseValorBR(empenhoSelecionado.valor||0),
          elementoDespesa:empenhoSelecionado.elementoDespesa||""
        }],
        empenho:empenhoSelecionado.numero||"",

        valorEmpenhoVinculado:parseValorBR(empenhoSelecionado.valor||0),
        atualizadoEm:new Date().toISOString()
      };

      allPagamentos[idx]=atualizado;
      registrarAuditoria("Alteração de fonte/empenho", "pagamentos", atualizado, `Fonte vinculada ao empenho ${empenhoSelecionado.numero||"—"} do contrato.`);
      salvarDepoisDeAlterar();
      renderPagamentos(document.getElementById("content-area"));
      showInlineAlert("✅ Fonte do pagamento atualizada pelo empenho vinculado ao contrato.","info");
    }


    function obterValoresPorFontePagamento(p){
      const mapa=new Map();
      const obs=normalizarListaFinanceira(p?.ordensBancarias||[]);
      const nls=normalizarListaFinanceira(p?.notasLancamento||[]);
      const base=obs.length?obs:nls;

      if(String(p?.tipoProcessoPagamento||"")==="indenizatorio" && parseValorBR(p?.valorIndenizatorio||0)){
        mapa.set("500",(mapa.get("500")||0)+parseValorBR(p.valorIndenizatorio||0));
      }

      if(base.length){
        base.forEach(item=>{
          const fonte=obterFontePorEmpenhoPagamento(p,item.empenho);
          const chave=resumirFonteRecurso(fonte);
          mapa.set(chave,(mapa.get(chave)||0)+parseValorBR(item.valor||0));
        });
      }else{
        const fonte=resumirFonteRecurso(p?.fonteRecurso||"—");
        mapa.set(fonte,parseValorBR(p?.nfValor||0));
      }

      return [...mapa.entries()].map(([fonte,valor])=>({fonte,valor}));
    }

    
    function calcularIndenizatoriosPorEmpenho(){
      const mapa=new Map();
      (allPagamentos||[]).forEach(p=>{
        if(String(p.tipoProcessoPagamento||"convencional")!=="indenizatorio") return;
        const empObj=p.empenhoIndenizatorioObj || {};
        const emp=String(empObj.numero||p.empenhoIndenizatorio||"").trim() || "Empenho indenizatório não informado";
        const valor=parseValorBR(empObj.valor||p.valorIndenizatorio||p.nfValor||0);
        const fonte=resumirFonteRecurso(empObj.fonte||p.fonteIndenizatoria||"Fonte não informada");
        const chave=`${emp}|${fonte}`;
        if(!mapa.has(chave)){
          mapa.set(chave,{empenho:emp,fonte,valor:0,processos:0});
        }
        const item=mapa.get(chave);
        item.valor+=valor;
        item.processos+=1;
      });
      return [...mapa.values()];
    }

    function renderAlertaValoresFinanceiros(p){
      const v=validarValoresFinanceirosPagamento(p);
      const alertas=[];
      if(v.nlInferior) alertas.push(`NL inferior à NF: falta ${fmtM(v.valorNF-v.totalNL)}`);
      else if(v.nlDivergente) alertas.push(`NL divergente da NF: diferença ${fmtM(Math.abs(v.difNL))}`);

      if(v.obInferior) alertas.push(`OB inferior à NF: falta ${fmtM(v.valorNF-v.totalOB)}`);
      else if(v.obDivergente) alertas.push(`OB divergente da NF: diferença ${fmtM(Math.abs(v.difOB))}`);

      if(!alertas.length) return "";
      return `<div class="mt-1 rounded-lg bg-red-50 border border-red-200 text-red-700 px-2 py-1 text-[10px] font-bold">${alertas.join(" • ")}</div>`;
    }

    function validarLinhasFinanceirasContraNF(p, linhas, tipo){
      const valorNF=parseValorBR(p?.nfValor||0);
      const total=linhas.reduce((s,item)=>s+parseValorBR(item.valor||0),0);
      if(valorNF>0 && total<valorNF){
        return {
          ok:false,
          mensagem:`⚠️ O valor total de ${tipo.toUpperCase()} está inferior ao valor da NF. NF: ${fmtM(valorNF)} • ${tipo.toUpperCase()}: ${fmtM(total)} • Diferença: ${fmtM(valorNF-total)}`
        };
      }
      if(valorNF>0 && Math.abs(total-valorNF)>0.009){
        return {
          ok:false,
          mensagem:`⚠️ O valor total de ${tipo.toUpperCase()} está diferente do valor da NF. NF: ${fmtM(valorNF)} • ${tipo.toUpperCase()}: ${fmtM(total)} • Diferença: ${fmtM(Math.abs(valorNF-total))}`
        };
      }
      return {ok:true,mensagem:""};
    }

function obterPagamentosFiltrados(){
      let pagamentosFiltrados=aplicarFiltroLeitorPagamentos(allPagamentos).filter(p=>String(p.anoExercicio)==String(exercicioAtivo)||!p.anoExercicio);

      if(!filtroPagamentosMostrarPagos){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>!pagamentoEstaPago(p));
      }

      if(currentProfile==="tecnico"&&usuarioAutenticado?.servicos){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>{
          const contratoVinculado=allContratos.find(c=>c.id===p.contrato_id);
          if(!contratoVinculado) return false;
          return usuarioAutenticado.servicos.includes(contratoVinculado.servicoTipo);
        });
      }

      if(filtroPagamentosSituacao){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>String(p.situacao||"")===String(filtroPagamentosSituacao));
      }
      if(filtroPagamentosCompetencia){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>String(p.competencia||"")===String(filtroPagamentosCompetencia));
      }
      if(filtroPagamentosTipoProcesso){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>String(p.tipoProcessoPagamento||"convencional")===String(filtroPagamentosTipoProcesso));
      }
      if(filtroPagamentosFonte){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>{
          const fontes=obterFontesDistintasPagamento(p).map(i=>String(i.codigo||"").toLowerCase());
          const filtro=String(resumirFonteRecurso(filtroPagamentosFonte)).toLowerCase();
          return fontes.some(f=>f===filtro || f.includes(filtro));
        });
      }
      if(filtroPagamentosUH){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>String(p.uh||"")===String(filtroPagamentosUH));
      }
      if(filtroPagamentosEmpresa || filtroPagamentosServico){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>{
          const contrato=allContratos.find(c=>c.id===p.contrato_id);
          if(filtroPagamentosEmpresa && String(contrato?.empresa||"")!==String(filtroPagamentosEmpresa)) return false;
          if(filtroPagamentosServico && String(contrato?.servicoTipo||"")!==String(filtroPagamentosServico)) return false;
          return true;
        });
      }

      return pagamentosFiltrados;
    }

    function csvEscape(valor){
      const texto=String(valor??"");
      return `"${texto.replace(/"/g,'""')}"`;
    }

    function baixarPagamentosFiltrados(){
      const lista=obterPagamentosFiltrados();
      if(!lista.length){
        showInlineAlert("Não há processos de pagamento para baixar com os filtros atuais.","error");
        return;
      }

      const cabecalho=[
        "Serviço",
        "Empresa",
        "Unidade",
        "Processo SEI",
        "NF(s)",
        "Competência",
        "Empenho(s)",
        "Fonte",
        "Valor",
        "Situação",
        "Tipo do Processo",
        "Valor Indenizatório",
        "Empenho Indenizatório",
        "Última Atualização",
        "Nota(s) de Lançamento",
        "OB(s)"
      ];

      const linhas=lista.map(p=>{
        const contrato=allContratos.find(c=>c.id===p.contrato_id);
        const nfs=extrairNFsPagamento(p).map(n=>n.numero).filter(Boolean).join(", ") || p.nfNumero || "";
        const empenhos=Array.isArray(p.empenhos)?p.empenhos.map(e=>e.numero).filter(Boolean).join(", "):(p.empenho||"");
        return [
          servicoLabel(contrato?.servicoTipo||"Sem classificação"),
          contrato?.empresa||"—",
          p.uh||"—",
          obterProcessoSEIPagamento(p),
          nfs,
          formatarCompetenciaBR(p.competencia),
          empenhos||"—",
          p.fonteRecurso||"—",
          fmtM(p.nfValor),
          p.situacao||"—",
          tipoProcessoPagamentoLabel(p.tipoProcessoPagamento),
          fmtM(p.valorIndenizatorio||0),
          p.empenhoIndenizatorio||"",
          formatarDataHoraBR(p.atualizadoEm||p.criadoEm),
          normalizarListaFinanceira(p.notasLancamento||[]).map(n=>`${n.numero} ${n.data?formatarDataBR(n.data):""}`.trim()).join(" | "),
          normalizarListaFinanceira(p.ordensBancarias||[]).map(o=>`${o.numero} ${o.data?formatarDataBR(o.data):""}`.trim()).join(" | ")
        ].map(csvEscape).join(";");
      });

      const conteudo="\ufeff"+[cabecalho.map(csvEscape).join(";"),...linhas].join("\n");
      const blob=new Blob([conteudo],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      const data=new Date().toISOString().slice(0,10);
      a.href=url;
      a.download=`pagamentos_filtrados_SIGECON_${data}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      showInlineAlert(`✅ Arquivo baixado com ${lista.length} processo(s) de pagamento.`,"info");
    }

        const nfs=notas.map(n=>n.numero).filter(Boolean).join(", ") || "—";

    }

    async function atualizarPagamento(e,id){
      if(bloquearAcaoLeitor()) return;

      e.preventDefault();
      const notas=coletarNotasPagamento();
      const empenhos=coletarEmpenhosPagamento("edit");

      if(!empenhos.length){
        showInlineAlert("❌ Selecione pelo menos um empenho","error");
        return;
      }
      if(!notas.length){
        showInlineAlert("❌ Cadastre pelo menos uma nota fiscal","error");
        return;
      }

      const pagamentoBase=allPagamentos.find(x=>String(x.id)===String(id));
      if(!pagamentoBase){
        showInlineAlert("Pagamento não encontrado para atualização","error");
        return;
      }

      const tipoProcessoPagamento=document.getElementById("edit-tipo-processo-pag")?.value||"convencional";
      if(tipoProcessoPagamento==="indenizatorio"){
        const erroInd=validarEmpenhoIndenizatorio("edit");
        if(erroInd){
          showInlineAlert("❌ "+erroInd,"error");
          return;
        }
      }

      const totalNotas=notas.reduce((s,n)=>s+parseValorBR(n.valor),0);
      const situacaoEdit=document.getElementById("edit-situacao-pag").value;
      const linhasNLEdit=coletarLinhasFinanceiras("edit-nl-list");
      const linhasOBEdit=coletarLinhasFinanceiras("edit-ob-list");
      const pagamentoValidacaoEdit={nfValor:totalNotas, notasLancamento:linhasNLEdit, ordensBancarias:linhasOBEdit};

      if(precisaNotaLancamento(situacaoEdit)){
        const vnl=validarLinhasFinanceirasContraNF(pagamentoValidacaoEdit,linhasNLEdit,"nl");
        if(!vnl.ok){ showInlineAlert(vnl.mensagem,"error"); return; }
      }
      if(precisaOrdemBancaria(situacaoEdit)){
        const vob=validarLinhasFinanceirasContraNF(pagamentoValidacaoEdit,linhasOBEdit,"ob");
        if(!vob.ok){ showInlineAlert(vob.mensagem,"error"); return; }
      }

      const empIndenizatorioAtualizado=obterEmpenhoIndenizatorio("edit");

      const pagamentoAtualizado={
        ...pagamentoBase,
        uh:document.getElementById("edit-uh-pag").value,
        contrato_id:document.getElementById("edit-contrato-pag").value,
        competencia:document.getElementById("edit-competencia-pag").value,
        empenhos:empenhos,
        empenho:empenhos.map(e=>e.numero).join(","),
        fonteRecurso:[...new Set(empenhos.map(e=>e.fonte).filter(Boolean))].join(", "),
        valorEmpenhoVinculado:empenhos.reduce((s,e)=>s+parseValorBR(e.valor),0),
        notasFiscais:notas,
        nfNumero:notas.map(n=>n.numero).join(", "),
        nfValor:totalNotas,
        processoSEI:(document.getElementById("edit-processo-sei-pag")?.value||"").trim() || notas.map(n=>n.sei).filter(Boolean).join(", "),
        dataEmissao:notas[0]?.dataEmissao||"",
        tipoNF:notas.map(n=>n.tipo).join(","),
        situacao:situacaoEdit,
        setor:document.getElementById("edit-setor-pag")?.value||"",
        tipoProcessoPagamento:document.getElementById("edit-tipo-processo-pag")?.value||"convencional",
        valorIndenizatorio:empIndenizatorioAtualizado.valor,
        empenhoIndenizatorio:empIndenizatorioAtualizado.numero,
        elementoDespesaIndenizatorio:empIndenizatorioAtualizado.elementoDespesa,
        fonteIndenizatoria:empIndenizatorioAtualizado.fonte,
        empenhoIndenizatorioObj:empIndenizatorioAtualizado,
        notasLancamento:linhasNLEdit,
        ordensBancarias:linhasOBEdit,
        atualizadoEm:new Date().toISOString()
      };

      const result=await atualizarRegistroSeguro(pagamentoAtualizado,"pagamentos");
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Pagamento atualizado com sucesso!","info");
        renderContent();
      } else {
        showInlineAlert("Erro ao atualizar pagamento","error");
      }
    }

    async function confirmarExclusaoPagamento(id){
      const p=allPagamentos.find(x=>String(x.id)===String(id));
      if(!p){
        alert("Processo de pagamento não encontrado para exclusão.");
        return;
      }

      if(!confirm(`Deseja excluir este processo de pagamento?`)) return;

      // Remove imediatamente da memória.
      allPagamentos=allPagamentos.filter(x=>String(x.id)!==String(id));

      // Remove diretamente das chaves locais, evitando reaparecer após F5.
      try{
        const chaves=["sigecon_pagamentos_persistentes","sigecon_banco_geral"];
        const pagamentosLocais=JSON.parse(localStorage.getItem("sigecon_pagamentos_persistentes")||"[]")
          .filter(x=>String(x.id)!==String(id));
        localStorage.setItem("sigecon_pagamentos_persistentes",JSON.stringify(pagamentosLocais));

        const banco=JSON.parse(localStorage.getItem("sigecon_banco_geral")||"{}");
        banco.pagamentos=(Array.isArray(banco.pagamentos)?banco.pagamentos:[]).filter(x=>String(x.id)!==String(id));
        banco.atualizadoEm=new Date().toISOString();
        localStorage.setItem("sigecon_banco_geral",JSON.stringify(banco));
      }catch(e){
        console.warn("Falha ao limpar pagamento no armazenamento local:",e);
      }

      // Tenta remover do SDK, mas a exclusão local já foi aplicada.
      if(window.dataSdk && window.dataSdk.delete){
        try{ await window.dataSdk.delete(p); }catch(e){ console.warn("SDK delete falhou, exclusão local mantida:",e); }
      }

      registrarAuditoria("Exclusão","pagamentos",p);
      salvarBancoLocal();
      persistirListasPrincipais();

      closeAllModals();
      showInlineAlert("✅ Pagamento excluído com sucesso!","info");
      renderContent();
    }

    function coletarNotasPagamentoSeguro(){
      const notas=[];
      document.querySelectorAll(".nf-row").forEach(row=>{
        const numero=row.querySelector(".nf-numero")?.value?.trim()||"";
        const valor=parseValorBR(row.querySelector(".nf-valor")?.value||0);
        const tipo=row.querySelector(".nf-tipo")?.value||"servico";
        const sei=row.querySelector(".nf-sei")?.value?.trim()||"";
        const dataEmissao=row.querySelector(".nf-data")?.value||"";

        if(numero || valor || sei || dataEmissao){
          notas.push({numero,valor,tipo,sei,dataEmissao});
        }
      });
      return notas;
    }

    function validarComplementosSituacaoPagamento(prefix,situacao){
      if(typeof precisaNotaLancamento==="function" && precisaNotaLancamento(situacao)){
        const nls=typeof coletarLinhasFinanceiras==="function" ? coletarLinhasFinanceiras(`${prefix}-nl-list`) : [];
        if(!nls.length){
          return "Informe pelo menos uma Nota de Lançamento para situação Liquidado.";
        }
      }

      if(typeof precisaOrdemBancaria==="function" && precisaOrdemBancaria(situacao)){
        const obs=typeof coletarLinhasFinanceiras==="function" ? coletarLinhasFinanceiras(`${prefix}-ob-list`) : [];
        if(!obs.length){
          return "Informe pelo menos uma OB para situação Pago.";
        }
      }

      return "";
    }


    async function salvarPagamentoSeguro(e){
      if(bloquearAcaoLeitor()) return;

      if(e && typeof e.preventDefault==="function") e.preventDefault();

      try{
        if(!hasPermission("create")){
          showInlineAlert("Sem permissão para criar pagamentos","error");
          return false;
        }

        const contratoId=document.getElementById("form-contrato-pag")?.value||"";
        const uh=document.getElementById("form-uh-pag")?.value||"";
        const competencia=document.getElementById("form-competencia-pag")?.value||"";
        const processoSEI=(document.getElementById("form-processo-sei-pag")?.value||"").trim();
        const situacao=document.getElementById("form-situacao-pag")?.value||"A liquidar";

        if(!uh){
          showInlineAlert("❌ Selecione a Unidade Hospitalar.","error");
          return false;
        }

        if(!contratoId){
          showInlineAlert("❌ Selecione o contrato vinculado ao pagamento.","error");
          return false;
        }

        if(!competencia){
          showInlineAlert("❌ Informe a competência do pagamento.","error");
          return false;
        }

        if(!processoSEI){
          showInlineAlert("❌ Informe o Processo SEI do pagamento.","error");
          return false;
        }

        const tipoProcessoPagamento=document.getElementById("form-tipo-processo-pag")?.value||"convencional";
        if(tipoProcessoPagamento==="indenizatorio"){
          const erroInd=validarEmpenhoIndenizatorio("form");
          if(erroInd){
            showInlineAlert("❌ "+erroInd,"error");
            return false;
          }
        }

        const complementoErro=validarComplementosSituacaoPagamento("form",situacao);
        if(complementoErro){
          showInlineAlert("❌ "+complementoErro,"error");
          return false;
        }

        const notas=coletarNotasPagamentoSeguro();
        if(!notas.length){
          showInlineAlert("❌ Cadastre pelo menos uma nota fiscal.","error");
          return false;
        }

        const notasSemNumero=notas.filter(n=>!n.numero);
        if(notasSemNumero.length){
          showInlineAlert("❌ Informe o número de todas as notas fiscais cadastradas.","error");
          return false;
        }

        const notasSemValor=notas.filter(n=>!parseValorBR(n.valor));
        if(notasSemValor.length){
          showInlineAlert("❌ Informe o valor de todas as notas fiscais cadastradas.","error");
          return false;
        }

        let empenhos=coletarEmpenhosPagamento("form");

        // Se o contrato tiver apenas um empenho e o usuário não marcou, seleciona automaticamente.
        if(!empenhos.length){
          const contratoSelecionado=allContratos.find(c=>String(c.id)===String(contratoId));
          const empenhosContrato=extrairEmpenhosContrato(contratoSelecionado||{});
          if(empenhosContrato.length===1){
            empenhos=[{
              numero:empenhosContrato[0].numero,
              fonte:empenhosContrato[0].fonte||"",
              valor:parseValorBR(empenhosContrato[0].valor)
            }];
          }
        }

        if(!empenhos.length){
          showInlineAlert("❌ Selecione pelo menos um empenho vinculado ao contrato.","error");
          return false;
        }

        const totalNotas=notas.reduce((s,n)=>s+parseValorBR(n.valor),0);
        const linhasNLForm=typeof coletarLinhasFinanceiras==="function" ? coletarLinhasFinanceiras("form-nl-list") : [];
        const linhasOBForm=typeof coletarLinhasFinanceiras==="function" ? coletarLinhasFinanceiras("form-ob-list") : [];
        const pagamentoValidacaoForm={nfValor:totalNotas, notasLancamento:linhasNLForm, ordensBancarias:linhasOBForm};

        if(precisaNotaLancamento(situacao)){
          const vnl=validarLinhasFinanceirasContraNF(pagamentoValidacaoForm,linhasNLForm,"nl");
          if(!vnl.ok){ showInlineAlert(vnl.mensagem,"error"); return false; }
        }
        if(precisaOrdemBancaria(situacao)){
          const vob=validarLinhasFinanceirasContraNF(pagamentoValidacaoForm,linhasOBForm,"ob");
          if(!vob.ok){ showInlineAlert(vob.mensagem,"error"); return false; }
        }

        const empIndenizatorioNovo=obterEmpenhoIndenizatorio("form");

        const novoPagamento={
          id:`pag_${Date.now()}_${Math.random().toString(16).slice(2)}`,
          tipo:"pagamento",
          uh:uh,
          contrato_id:contratoId,
          competencia:competencia,
          empenhos:empenhos,
          empenho:empenhos.map(e=>e.numero).join(","),
          fonteRecurso:[...new Set(empenhos.map(e=>e.fonte).filter(Boolean))].join(", "),
          valorEmpenhoVinculado:empenhos.reduce((s,e)=>s+parseValorBR(e.valor),0),
          notasFiscais:notas,
          nfNumero:notas.map(n=>n.numero).join(", "),
          nfValor:totalNotas,
          processoSEI:processoSEI || notas.map(n=>n.sei).filter(Boolean).join(", "),
          dataEmissao:notas[0]?.dataEmissao||"",
          situacao:situacao,
          setor:document.getElementById("form-setor-pag")?.value||"",
          tipoProcessoPagamento:document.getElementById("form-tipo-processo-pag")?.value||"convencional",
          valorIndenizatorio:empIndenizatorioNovo.valor,
          empenhoIndenizatorio:empIndenizatorioNovo.numero,
          elementoDespesaIndenizatorio:empIndenizatorioNovo.elementoDespesa,
          fonteIndenizatoria:empIndenizatorioNovo.fonte,
          empenhoIndenizatorioObj:empIndenizatorioNovo,
          notasLancamento:linhasNLForm,
          ordensBancarias:linhasOBForm,
          tipoNF:notas.map(n=>n.tipo).join(","),
          anoExercicio:exercicioAtivo,
          criadoEm:new Date().toISOString(),
        dataUltimaAtualizacaoSituacao:new Date().toISOString(),
          atualizadoEm:new Date().toISOString()
        };

        const btn=document.getElementById("btn-salvar-pagamento");
        if(btn){
          btn.disabled=true;
          btn.textContent="Salvando...";
        }

        const result=await criarRegistroSeguro(novoPagamento,"pagamentos");

        if(result && result.isOk){
          salvarBancoLocal();
          persistirListasPrincipais();
          closeAllModals();
          showInlineAlert("✅ Pagamento cadastrado com sucesso!","info");
          currentTab="pagamentos";
          buildNav();
          renderContent();
          return true;
        }

        showInlineAlert("❌ Erro ao salvar pagamento.","error");
        if(btn){
          btn.disabled=false;
          btn.textContent="Salvar Pagamento";
        }
        return false;

      }catch(error){
        console.error("Erro no cadastro de novo pagamento:",error);
        const btn=document.getElementById("btn-salvar-pagamento");
        if(btn){
          btn.disabled=false;
          btn.textContent="Salvar Pagamento";
        }
        showInlineAlert("❌ Erro ao cadastrar pagamento. Verifique se todos os campos obrigatórios foram preenchidos.","error");
        return false;
      }
    }

        filtroProducaoEmpresa = typeof filtroProducaoEmpresa !== "undefined" ? filtroProducaoEmpresa : "";
        filtroProducaoUH = typeof filtroProducaoUH !== "undefined" ? filtroProducaoUH : "";

          .filter(p=>!p.anoExercicio || String(p.anoExercicio)===String(exercicioAtivo))

        if(filtroProducaoContrato) pagamentosBase=pagamentosBase.filter(p=>String(p.contrato_id||"")===String(filtroProducaoContrato));
        if(filtroProducaoUH) pagamentosBase=pagamentosBase.filter(p=>String(p.uh||"")===String(filtroProducaoUH));
