    async function salvarProducao(e){
      e.preventDefault();

      const pagamentoId=document.getElementById("form-prod-pagamento").value;
      const pagamento=allPagamentos.find(p=>p.id===pagamentoId);
      const contrato=allContratos.find(c=>c.id===pagamento?.contrato_id);

      if(!pagamento||!contrato){
        showInlineAlert("❌ Selecione um processo de pagamento válido","error");
        return;
      }

      const existente=obterProducaoPorPagamento(pagamentoId);
      const producao={
        ...(existente||{}),
        id:existente?.id||Date.now().toString(),
        tipo:"producao",
        pagamento_id:pagamentoId,
        contrato_id:pagamento.contrato_id,
        competencia:pagamento.competencia,
        uh:pagamento.uh,
        servicoTipo:contrato.servicoTipo,
        empresa:contrato.empresa,
        nContrato:contrato.nContrato,
        nfNumero:pagamento.nfNumero,
        nfValor:parseValorBR(pagamento.nfValor),
        numProcedimentos:parseInt(document.getElementById("form-prod-procedimentos")?.value||0),
        numCirurgias:parseInt(document.getElementById("form-prod-cirurgias")?.value||0),
        numPacientes:parseInt(document.getElementById("form-prod-pacientes")?.value||0),
        numSessoesHD:parseInt(document.getElementById("form-prod-sessoes-hd")?.value||0),
        numInsercaoCateter:parseInt(document.getElementById("form-prod-cateter")?.value||0),
        dadosComuns:document.getElementById("form-prod-dados-comuns")?.value||"",
        observacoes:document.getElementById("form-prod-obs").value,
        anoExercicio:exercicioAtivo,
        atualizadoEm:new Date().toISOString(),
        criadoEm:existente?.criadoEm||new Date().toISOString()
      };

      const result=existente ? await atualizarRegistroSeguro(producao,"producao") : await criarRegistroSeguro(producao,"producao");
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Produção salva com sucesso!","info");
        renderContent();
      } else {
        showInlineAlert("❌ Erro ao salvar produção","error");
      }
    }

    async function confirmarExclusaoTecnico(id,matricula=""){
      try{
        if(!hasPermission("edit") && !hasPermission("delete")){
          showInlineAlert("❌ Sem permissão para excluir técnico.","error");

        }

        const listaCompleta=mesclarTecnicosLocais(allTecnicos).filter(x=>x.tipo==="tecnico");

          String(x.id)===String(id) ||
          String(x.tecnicoMatricula||"").toUpperCase()===String(matricula||"").toUpperCase()
        );

        if(!t){
          showInlineAlert("❌ Técnico não encontrado para exclusão.","error");
          return;

        if(!confirm(`Deseja excluir o técnico ${t.tecnicoNome || t.tecnicoMatricula}?`)) return;

        const result=await excluirTecnicoSeguro(t);

          buildNav();
          renderContent();
        }else{

      }catch(error){
        console.error("Erro ao confirmar exclusão de técnico:",error);
        showInlineAlert("❌ Erro ao excluir técnico.","error");

    function baixarCSV(nomeArquivo,cabecalho,linhas){
      const conteudo="\ufeff"+[cabecalho.map(csvEscape).join(";"),...linhas.map(l=>l.map(csvEscape).join(";"))].join("\n");
      const blob=new Blob([conteudo],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download=nomeArquivo;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function baixarJSON(nomeArquivo,objeto){
      const blob=new Blob([JSON.stringify(objeto,null,2)],{type:"application/json;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download=nomeArquivo;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function auditarIndicadoresSistema(){
      const contratos=allContratos.filter(c=>!c.anoExercicio || String(c.anoExercicio)===String(exercicioAtivo));

      const pagos=pagamentos.filter(p=>pagamentoEstaPago(p));
      const semProcesso=pagamentos.filter(p=>!obterProcessoSEIPagamento(p) || obterProcessoSEIPagamento(p)==="—").length;
      const semContrato=pagamentos.filter(p=>!allContratos.find(c=>String(c.id)===String(p.contrato_id))).length;
      const indenizatorios=pagamentos.filter(p=>String(p.tipoProcessoPagamento||"convencional")==="indenizatorio").length;
      const semEmpenho=contratos.filter(c=>!calcularValorEmpenhadoContrato(c)).length;
      const vigCritica=verificarVigenciaContratos(contratos).filter(a=>a.cor==="vermelho").length;
      const totalPago=pagos.reduce((s,p)=>s+parseValorBR(p.nfValor),0);
      const totalPendente=pagamentos.filter(p=>!pagamentoEstaPago(p)).reduce((s,p)=>s+parseValorBR(p.nfValor),0);

      return {contratos,pagamentos,pagos,semProcesso,semContrato,indenizatorios,semEmpenho,vigCritica,totalPago,totalPendente};
    }

    function parseLinhaSIGEF(linha){
      const partes=linha.split(/[;\t,]/).map(p=>p.trim()).filter(Boolean);
      if(partes.length<3) return null;
      const texto=linha;
      const ob=(texto.match(/\bOB[-\s]?\d{3,}[\w-]*/i)||[])[0] || partes.find(p=>/^OB/i.test(p)) || "";
      const processo=partes.find(p=>/\d{4,}.*\d{4}/.test(p)) || partes[0] || "";
      const valorTxt=[...texto.matchAll(/(?:R\$\s*)?[\d.]+,\d{2}/g)].map(m=>m[0]).pop() || partes[partes.length-1] || "0";
      return {processo,ob,valor:parseValorBR(valorTxt),linha};
    }

    function processarTextoSIGEF(texto){
      const linhas=String(texto||"").split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      const importados=linhas.map(parseLinhaSIGEF).filter(Boolean);
      let atualizados=0;

      importados.forEach(item=>{
        const p=(allPagamentos||[]).find(pg=>{
          const proc=obterProcessoSEIPagamento(pg);
          return proc && item.processo && proc.replace(/\D/g,"").includes(item.processo.replace(/\D/g,"").slice(-8));
        });
        if(p && item.ob){
          p.situacao="Pago";
          p.ordensBancarias=normalizarListaFinanceira(p.ordensBancarias||[]);
          p.ordensBancarias.push({numero:item.ob,data:new Date().toISOString().slice(0,10),valor:item.valor,empenho:p.empenho||""});
          p.atualizadoEm=new Date().toISOString();
          p.dataUltimaAtualizacaoSituacao=new Date().toISOString();
          p.notificacaoSIGEF=true;
          p.observacoes=((p.observacoes||"")+"\nAtualizado via SIGEF: "+item.ob+" • "+fmtM(item.valor)).trim();
          atualizados++;
          registrarAuditoria("Atualização SIGEF","pagamentos",p,`Pagamento marcado como pago via SIGEF • OB ${item.ob} • ${fmtM(item.valor)}`);
        }
      });

      salvarBancoLocal();
      persistirListasPrincipais();
      localStorage.setItem("sigecon_sigef_importacoes",JSON.stringify(importados.slice(0,200)));
      showInlineAlert(`✅ SIGEF processado: ${importados.length} linha(s), ${atualizados} pagamento(s) atualizado(s).`,"info");
      renderSigef(document.getElementById("content-area"));
    }

    function obterPeriodoRelatorio(){
      const inicio=document.getElementById("relatorio-periodo-inicial")?.value || `${exercicioAtivo}-01-01`;
      const fim=document.getElementById("relatorio-periodo-final")?.value || `${exercicioAtivo}-12-31`;
      return {inicio,fim};
    }

    function dataEstaNoPeriodo(data, inicio, fim){
      if(!data) return true;
      const d=String(data).slice(0,10);
      if(inicio && d < inicio) return false;
      if(fim && d > fim) return false;
      return true;
    }

    function contratoEstaNoPeriodoRelatorio(c,inicio,fim){
      // Considera contrato dentro do período quando há intersecção entre a vigência e o período escolhido.
      const ini=String(c?.vigIni||"").slice(0,10);
      const fimVig=String(c?.vigFim||"").slice(0,10);
      if(!ini && !fimVig) return true;
      if(fim && ini && ini > fim) return false;
      if(inicio && fimVig && fimVig < inicio) return false;
      return true;
    }

    function obterContratosRelatorioFiltrados(){
      const {inicio,fim}=obterPeriodoRelatorio();
      let lista=aplicarFiltroLeitorContratos(allContratos).filter(c=>!c.anoExercicio || String(c.anoExercicio)===String(exercicioAtivo));
      lista=lista.filter(c=>contratoEstaNoPeriodoRelatorio(c,inicio,fim));

      if(relFiltroContratosEmpresa) lista=lista.filter(c=>String(c.empresa||"")===String(relFiltroContratosEmpresa));
      if(relFiltroContratosServico) lista=lista.filter(c=>String(c.servicoTipo||"")===String(relFiltroContratosServico));
      if(relFiltroContratosUH) lista=lista.filter(c=>contratoUnidadesArray(c).includes(relFiltroContratosUH));
      if(relFiltroContratosFonte) lista=lista.filter(c=>contratoTemFonte(c,relFiltroContratosFonte));
      if(relFiltroContratosExecucaoStatus){
        lista=lista.filter(c=>calcularExecucaoContrato(c).status===relFiltroContratosExecucaoStatus);
      }
      return lista;
    }

    function pagamentoPassaFiltroFonteRelatorio(p){
      if(!relFiltroPagamentosFonte) return true;
      const filtro=String(resumirFonteRecurso(relFiltroPagamentosFonte)).toLowerCase();
      const fontes=obterFontesDistintasPagamento(p).map(i=>String(i.codigo||"").toLowerCase());
      return fontes.some(f=>f===filtro || f.includes(filtro));
    }

    function obterPagamentosRelatorioFiltrados(){
      const {inicio,fim}=obterPeriodoRelatorio();
      let lista=aplicarFiltroLeitorPagamentos(allPagamentos).filter(p=>!p.anoExercicio || String(p.anoExercicio)===String(exercicioAtivo));

      if(!relFiltroPagamentosMostrarPagos){
        lista=lista.filter(p=>!pagamentoEstaPago(p));
      }
      lista=lista.filter(p=>dataEstaNoPeriodo(p.atualizadoEm||p.criadoEm,inicio,fim));

      if(relFiltroPagamentosSituacao) lista=lista.filter(p=>String(p.situacao||"")===String(relFiltroPagamentosSituacao));
      if(relFiltroPagamentosCompetencia) lista=lista.filter(p=>String(p.competencia||"")===String(relFiltroPagamentosCompetencia));
      if(relFiltroPagamentosTipoProcesso) lista=lista.filter(p=>String(p.tipoProcessoPagamento||"convencional")===String(relFiltroPagamentosTipoProcesso));
      if(relFiltroPagamentosFonte) lista=lista.filter(p=>pagamentoPassaFiltroFonteRelatorio(p));
      if(relFiltroPagamentosUH) lista=lista.filter(p=>String(p.uh||"")===String(relFiltroPagamentosUH));
      if(relFiltroPagamentosEmpresa || relFiltroPagamentosServico){
        lista=lista.filter(p=>{
          const contrato=allContratos.find(c=>String(c.id)===String(p.contrato_id));
          if(relFiltroPagamentosEmpresa && String(contrato?.empresa||"")!==String(relFiltroPagamentosEmpresa)) return false;
          if(relFiltroPagamentosServico && String(contrato?.servicoTipo||"")!==String(relFiltroPagamentosServico)) return false;
          return true;
        });
      }
      return lista;
    }

    function montarDadosRelatorio(tipo){
      const contratos=obterContratosRelatorioFiltrados();
      const pagamentos=obterPagamentosRelatorioFiltrados();
      const auditoria=carregarAuditoria();

      if(tipo==="pagamentos"){
        const cab=["Processo SEI","Empresa","Unidade","Competência","Valor","Situação","Fonte","Empenho(s)","Observações"];
        const linhas=pagamentos.map(p=>{
          const c=allContratos.find(ct=>String(ct.id)===String(p.contrato_id));
          const empenhos=Array.isArray(p.empenhos)?p.empenhos.map(e=>e.numero).filter(Boolean).join(", "):(p.empenho||"");
          return [
            obterProcessoSEIPagamento(p),
            c?.empresa||"—",
            p.uh||"—",
            formatarCompetenciaBR(p.competencia),
            fmtM(p.nfValor),
            p.situacao||"—",
            obterCodigoFontePagamento(p)||p.fonteRecurso||"—",
            empenhos||"—",
            p.observacoes||""
          ];
        });
        return {titulo:"Relatório de Processos de Pagamento",cab,linhas};
      }

      if(tipo==="auditoria"){
        const cab=["Data","Usuário","Perfil","Ação","Módulo","Descrição"];
        const linhas=auditoria.map(l=>[
          formatarDataHoraBR(l.data||l.criadoEm),
          l.usuario||"—",
          l.perfil||"—",
          l.acao||"—",
          l.modulo||l.tipoLista||"—",
          l.descricao||l.detalhe||"—"
        ]);
        return {titulo:"Relatório de Auditoria",cab,linhas};
      }

      const cab=["Contrato","Processo","Empresa","Serviço","Unidades","Valor Contrato","Empenhado","Executado","Saldo","Vigência"];
      const linhas=contratos.map(c=>{
        const emp=calcularValorEmpenhadoContrato(c);
        const exec=calcularValorExecutadoContrato(c);
        return [
          c.nContrato||"",
          c.nProcesso||"",
          c.empresa||"",
          servicoLabel(c.servicoTipo||""),
          contratoUnidadesArray(c).join(", "),
          fmtM(c.valorContrato),
          fmtM(emp),
          fmtM(exec),
          fmtM(emp-exec),
          `${formatarDataBR(c.vigIni)} até ${formatarDataBR(c.vigFim)}`
        ];
      });
      return {titulo:"Relatório de Contratos e Execução",cab,linhas};
    }

    async function adicionarExercicioConfiguracao(){
      const ano=parseInt(document.getElementById("config-exercicio-ano")?.value);
      const status=document.getElementById("config-exercicio-status")?.value||"Ativo";
      if(!ano){
        showInlineAlert("❌ Informe o ano do exercício","error");
        return;
      }
      if(obterExerciciosDisponiveis().some(ex=>String(ex.exercicioAno)===String(ano))){
        showInlineAlert("❌ Este exercício fiscal já existe","error");
        return;
      }

      const exercicio={id:Date.now().toString(),tipo:"exercicio",exercicioAno:ano,exercicioStatus:status,criadoEm:new Date().toISOString()};
      const result=await salvarExercicioSeguro(exercicio);

        return;

            alert("Exercício não encontrado.");
            return;
          }

          const ano=parseInt(row.querySelector(".config-ex-ano-edit")?.value);
          const status=row.querySelector(".config-ex-status-edit")?.value||"Ativo";

          if(!ano){
            alert("Informe o ano do exercício.");
            return;

          const atualizado={...ex,exercicioAno:ano,exercicioStatus:status,atualizadoEm:new Date().toISOString()};
          const result=await atualizarExercicioSeguro(atualizado);

          if(result.isOk){
            carregarExerciciosCadastrados();
            showInlineAlert("✅ Exercício editado com sucesso!","info");
            renderConfiguracoes(document.getElementById("content-area"));
          }
        };

      area.querySelectorAll(".config-ex-btn-delete").forEach(btn=>{

          const row=this.closest(".config-ex-row");
          if(!row) return;

          const idx=Number(row.dataset.index);
          const exercicios=obterExerciciosDisponiveis();
          const ex=exercicios[idx];

          if(!ex){
            alert("Exercício não encontrado.");
            return;

          if(!confirm("Deseja excluir este exercício fiscal?")) return;

          const result=await excluirExercicioSeguro(ex);

          if(result.isOk){
            carregarExerciciosCadastrados();
            showInlineAlert("✅ Exercício excluído com sucesso!","info");
            renderConfiguracoes(document.getElementById("content-area"));
          }
        };
      });

function adicionarListaItem(listKey,inputId){
      const inputEl=document.getElementById(inputId);
      if(!inputEl||!inputEl.value.trim()){
        showInlineAlert("❌ Digite um valor","error");
        return;
      }

      const novoItem=inputEl.value.trim();
      if(!listas[listKey]) listas[listKey]=[];

      if(listas[listKey].includes(novoItem)){
        showInlineAlert("❌ Este item já existe","error");
        return;
      }

      listas[listKey].push(novoItem);
      inputEl.value="";
      salvarConfiguracoesLocais();
      showInlineAlert("✅ Item adicionado com sucesso!","info");
      renderConfiguracoes(document.getElementById("content-area"));
      setTimeout(()=>lucide.createIcons(),50);
    }

    function editarListaItem(listKey,item){
      if(!listas[listKey]) return;
      const idx=listas[listKey].findIndex(i=>i===item);
      if(idx>=0) editarListaItemPorIndice(listKey,idx);
    }

    function editarListaItemPorIndice(listKey,idx){
      idx=Number(idx);
      if(!listas[listKey] || Number.isNaN(idx) || idx<0 || idx>=listas[listKey].length){
        alert("Item não encontrado para edição.");
        return;
      }

      const atual=String(listas[listKey][idx]);
      const mensagem=listKey==="servicos" ? "Edite no formato codigo|Nome do Serviço" : "Editar item:";
      const novo=prompt(mensagem, atual);

      if(novo===null) return;

      const valor=String(novo).trim();
      if(!valor){
        alert("O valor não pode ficar vazio.");
        return;
      }

      if(valor!==atual && listas[listKey].includes(valor)){
        alert("Este item já existe.");
        return;
      }

      listas[listKey][idx]=valor;
      salvarConfiguracoesLocais();
      showInlineAlert("✅ Item atualizado com sucesso!","info");
      renderConfiguracoes(document.getElementById("content-area"));
      setTimeout(()=>lucide.createIcons(),50);
    }

    window.editarListaItemPorIndice=editarListaItemPorIndice;
    window.editarListaItem=editarListaItem;

    function deletarListaItem(listKey,item){
      if(!listas[listKey]) return;
      const idx=listas[listKey].findIndex(i=>i===item);
      if(idx>=0) deletarListaItemPorIndice(listKey,idx);
    }

    function deletarListaItemPorIndice(listKey,idx){
      idx=Number(idx);
      if(!listas[listKey] || Number.isNaN(idx) || idx<0 || idx>=listas[listKey].length){
        alert("Item não encontrado para exclusão.");
        return;
      }

      if(!confirm("Confirmar exclusão deste item?")) return;

      listas[listKey].splice(idx,1);
      salvarConfiguracoesLocais();
      showInlineAlert("✅ Item removido com sucesso!","info");
      renderConfiguracoes(document.getElementById("content-area"));
      setTimeout(()=>lucide.createIcons(),50);
    }

    window.deletarListaItemPorIndice=deletarListaItemPorIndice;
    window.deletarListaItem=deletarListaItem;

    // Clique seguro dos botões de Configurações
    if(!window.__sigeconConfigClickHandler){
      window.__sigeconConfigClickHandler=true;
      document.addEventListener("click",function(e){
        const btn=e.target.closest("[data-config-action]");
        if(!btn) return;

        e.preventDefault();
        e.stopPropagation();

        const action=btn.getAttribute("data-config-action");
        const key=btn.getAttribute("data-key");
        const idx=parseInt(btn.getAttribute("data-index"));

        if(action==="edit"){
          editarListaItemPorIndice(key,idx);
        }

        if(action==="delete"){
          deletarListaItemPorIndice(key,idx);
        }
      });
    }

          });
        } catch(e){
          console.error("Element SDK error:",e);
        }
      }
      
      aplicarBancoLocal();
      reidratarListasPrincipais();
      lucide.createIcons();

      // Reforço final: após SDK e ícones carregarem, mantém a sessão aberta.

        }
      } else {
        exibirTelaLogin();
      }
    }

    if(document.readyState==="loading"){
      document.addEventListener("DOMContentLoaded",initializeApp);
    } else {
      initializeApp();
    }
