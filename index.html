<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGC-CAS v3.0</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config={theme:{extend:{colors:{navy:{'950':'#0a1628','900':'#0d1f3c','800':'#122b50','700':'#173a6a','600':'#1c4a85','500':'#2563a8','400':'#3b82c4','300':'#6ba3d6','200':'#93c0e8','100':'#c2ddf4','50':'#e8f1fb'},sky:{'50':'#f8fafc','100':'#f0f6ff','200':'#e0ecff','300':'#c2dff4'},steel:{'900':'#1a2332','800':'#243044','700':'#2e3f57','600':'#3a4f6a','500':'#4a6380','400':'#6b8298','300':'#8ea2b5','200':'#b3c3d1','100':'#d5dee6','50':'#edf1f5'}},fontFamily:{sans:['DM Sans','sans-serif'],mono:['Space Mono','monospace']}}}}
  </script>
  <style>
    html,body{height:100%;margin:0;overflow:hidden;background:#f8fafc;font-size:16px}
    *{scrollbar-width:thin;scrollbar-color:#3b82c4 #f0f6ff}
    ::-webkit-scrollbar{width:8px;height:8px}
    ::-webkit-scrollbar-track{background:#f0f6ff}
    ::-webkit-scrollbar-thumb{background:#3b82c4;border-radius:4px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
    .fade-in{animation:fadeIn .4s ease both}
    .slide-in{animation:slideIn .35s ease both}
    .card-hover{transition:all .25s ease}
    .card-hover:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(37,99,168,0.1)}
    .tab-active{background:linear-gradient(135deg,#1c4a85,#2563a8);color:#fff;box-shadow:0 2px 10px rgba(37,99,168,0.3)}
    .progress-bar{background:linear-gradient(90deg,#1c4a85,#3b82c4,#6ba3d6)}
    .badge{font-size:12px;padding:6px 12px;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .row-hover:hover{background:rgba(37,99,168,0.08)}
    .glass{background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);border:2px solid rgba(37,99,168,0.12);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    .topbar-gradient{background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);border-bottom:2px solid rgba(37,99,168,0.15)}
    .sidebar-gradient{background:linear-gradient(180deg,#f0f6ff 0%,#e8f1fb 60%,#f0f6ff 100%)}
    .btn-primary{background:linear-gradient(135deg,#1c4a85,#2563a8);color:white;font-weight:700;font-size:16px;transition:all .25s;border-radius:10px;padding:12px 20px;border:none;cursor:pointer}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(37,99,168,0.35);background:linear-gradient(135deg,#0f3461,#1c4a85)}
    .btn-secondary{background:#d4e6ff;color:#1c4a85;font-weight:700;font-size:15px;transition:all .25s;border-radius:10px;padding:11px 18px;border:none;cursor:pointer}
    .btn-secondary:hover{background:#b8d9ff;transform:translateY(-1px)}
    .input-field{background:#fff;border:2px solid rgba(37,99,168,0.2);border-radius:10px;padding:14px 16px;font-size:16px;color:#1a2332;transition:all .25s;font-weight:500}
    .input-field:focus{border-color:#2563a8;box-shadow:0 0 0 4px rgba(37,99,168,0.15);outline:none}
    .modal-bg{background:rgba(0,0,0,0.5);backdrop-filter:blur(5px)}
    .hidden-btn.visitor{display:none !important}
    table{font-size:16px;line-height:1.7}
    th{font-size:15px;font-weight:700;color:#1a2332;padding:14px 12px;background:#f0f6ff}
    td{font-size:15px;padding:14px 12px}
    label{font-size:15px;font-weight:600;color:#1a2332}
    p{line-height:1.6}
    .config-tab{color:#3a4f6a;transition:all .25s}
    .config-tab.active{background:#d4e6ff;color:#1c4a85}
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-sky-50 font-sans text-steel-700 overflow-hidden">
  <div id="login-screen" class="h-full w-full fixed inset-0 z-50 bg-gradient-to-br from-navy-900 via-navy-800 to-navy-950 flex items-center justify-center">
   <div class="w-full max-w-md">
    <div class="glass rounded-2xl p-8 shadow-2xl">
     <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-14 h-14 rounded-lg bg-gradient-to-br from-sky-400 to-navy-600 flex items-center justify-center shadow-lg">
       <i data-lucide="shield-check" class="w-7 h-7 text-white"></i>
      </div>
      <div>
       <h1 class="text-3xl font-bold text-navy-900">SGC-CAS</h1>
       <p class="text-sm text-steel-500">v3.0 — Sistema de Gestão</p>
      </div>
     </div>
     <div class="space-y-4">
      <div>
       <label class="block text-sm font-bold text-navy-900 mb-2">📅 Exercício Fiscal *</label> <select id="login-exercicio" class="input-field w-full text-base" required onchange="carregarExerciciosCadastrados()"> <option value="">— Selecione o exercício —</option> </select>
      </div>
      <div>
       <label class="block text-sm font-bold text-navy-900 mb-2">Perfil de Acesso</label> <select id="login-perfil" class="input-field w-full text-base" required> <option value="">— Selecione seu perfil —</option> <option value="gestor">👤 Gestor (Admin Full)</option> <option value="tecnico">🔧 Técnico Operacional</option> <option value="visitante">👁️ Visitante (Leitura)</option> </select>
      </div>
      <div id="login-credenciais" class="space-y-4 hidden">
       <div>
        <label class="block text-sm font-bold text-navy-900 mb-2" id="label-credencial">Senha Admin</label> <input id="login-input" type="password" class="input-field w-full text-base" placeholder="••••••••">
       </div>
      </div><button type="button" onclick="autenticar()" class="btn-primary w-full py-3 rounded-lg font-bold flex items-center justify-center gap-2 text-base"> <i data-lucide="log-in" class="w-5 h-5"></i>Acessar Sistema </button>
     </div>
    </div>
   </div>
  </div>
  <div id="app" class="h-full flex flex-col hidden">
   <!-- Topbar -->
   <header class="topbar-gradient border-b border-navy-200/30 flex items-center justify-between px-6 py-4 flex-shrink-0" style="min-height:64px">
    <div class="flex items-center gap-4">
     <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-navy-600 to-navy-700 flex items-center justify-center shadow-lg">
      <i data-lucide="shield-check" class="w-7 h-7 text-white"></i>
     </div>
     <div>
      <h1 id="main-title" class="text-xl font-bold text-navy-900 leading-tight tracking-wide">SGC-CAS</h1>
      <p id="main-subtitle" class="text-sm text-steel-600 leading-tight">Gestão Contratual v3.0</p>
     </div>
    </div>
    <div class="flex items-center gap-3">
     <div id="profile-badge" class="flex items-center gap-2 px-5 py-3 bg-navy-50 rounded-full border-2 border-navy-300">
      <div class="w-3 h-3 rounded-full bg-emerald-500"></div><span id="profile-text" class="text-base font-semibold text-navy-800">Gestor Admin</span>
     </div>
     <div class="text-sm font-bold text-steel-600 px-3 py-2 bg-sky-100 rounded-lg border border-sky-300">
      📅 <span id="exercicio-badge">2026</span>
     </div><button onclick="fazerLogout()" class="p-2 rounded-lg hover:bg-navy-100 transition text-steel-600 hover:text-navy-700" title="Sair"> <i data-lucide="log-out" class="w-5 h-5"></i> </button>
    </div>
   </header><!-- Main Layout -->
   <div class="flex flex-1 overflow-hidden gap-4 p-4">
    <!-- Sidebar -->
    <nav class="sidebar-gradient w-56 flex-shrink-0 border-2 border-navy-200/40 rounded-xl flex flex-col py-5 px-4 overflow-y-auto shadow-sm">
     <div id="nav-items" class="flex flex-col gap-2"></div>
     <div class="mt-auto pt-4 border-t border-navy-200/50 text-center">
      <p class="text-xs text-steel-700 font-bold">SGC-CAS v3.0</p>
      <p class="text-xs text-steel-500 font-semibold">SES — 2025</p>
     </div>
    </nav><!-- Content Area -->
    <main id="content-area" class="flex-1 overflow-y-auto pr-2"></main>
   </div>
  </div><!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-bg fixed inset-0 hidden z-40" onclick="if(event.target.id==='modal-overlay')closeAllModals()"></div><!-- Modal Container -->
  <div id="modal-container" class="fixed inset-0 z-50 hidden pointer-events-none flex items-center justify-center p-4">
   <div id="modal-content" class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto pointer-events-auto"></div>
  </div>
  <script>
    // ─── GLOBALS ───
    let currentProfile="gestor";
    let currentTab="dashboard";
    let allContratos=[];
    let allPagamentos=[];
    let allTecnicos=[];
    let usuarioAutenticado=null;
    let filtroUH="";
    let filtroServico="";
    let filtroEmpresa="";
    let exercicioAtivo=2026;
    
    // Listas Configuráveis
    let listas={
      empenhos:["NE-2026-00001","NE-2026-00002"],
      fontes:["Tesouro Estadual","Receita Própria"],
      unidades:["HMWG","HRTM","HEMONORTE","HCCPG"],
      empresas:["MedServ Ltda","Tech Saúde","Bem+Health","Clínica Plus"],
      situacoes:["A liquidar","Liquidado","Pago","Na unidade"],
      status:["🟢 Ativo","🟡 Fechado","🔵 Auditado"],
      servidores:["Servidor 1","Servidor 2"]
    };

    // ─── DATA SDK HANDLER ───
    const dataHandler={
      onDataChanged(data){
        allContratos=data.filter(d=>d.tipo==="contrato");
        allPagamentos=data.filter(d=>d.tipo==="pagamento");
        allTecnicos=data.filter(d=>d.tipo==="tecnico");
        if(usuarioAutenticado && currentTab){
          renderContent();
        }
      }
    };

    // ─── AUTENTICAÇÃO ───
    function carregarExerciciosCadastrados(){
      const selectExercicio=document.getElementById("login-exercicio");
      // Limpar opções anteriores (mantém placeholder)
      while(selectExercicio.options.length>1){
        selectExercicio.remove(1);
      }
      
      // Buscar exercícios cadastrados em allContratos e allPagamentos
      const anosExercicio=new Set();
      
      // Coletar anos de contratos
      allContratos.forEach(c=>{
        if(c.anoExercicio) anosExercicio.add(c.anoExercicio);
      });
      
      // Coletar anos de pagamentos
      allPagamentos.forEach(p=>{
        if(p.anoExercicio) anosExercicio.add(p.anoExercicio);
      });
      
      // Buscar exercícios cadastrados explicitamente (tipo=exercicio)
      const exerciciosCadastrados=allTecnicos.filter(t=>t.tipo==="exercicio");
      exerciciosCadastrados.forEach(ex=>{
        if(ex.exercicioAno) anosExercicio.add(ex.exercicioAno);
      });
      
      if(anosExercicio.size===0){
        // Se nenhum exercício foi cadastrado, mostrar opções padrão
        const opcoes=[{ano:2026,status:"Ativo"},{ano:2025,status:"Fechado"},{ano:2024,status:"Fechado"}];
        opcoes.forEach(op=>{
          const opt=document.createElement("option");
          opt.value=op.ano.toString();
          opt.textContent=op.ano+" ("+op.status+")";
          if(op.ano===2026) opt.selected=true;
          selectExercicio.appendChild(opt);
        });
      } else {
        // Ordenar anos de forma decrescente
        const anosOrdenados=[...anosExercicio].sort((a,b)=>b-a);
        anosOrdenados.forEach(ano=>{
          // Buscar status do exercício cadastrado, ou usar padrão
          const exCadastrado=exerciciosCadastrados.find(ex=>ex.exercicioAno===ano);
          const status=exCadastrado?exCadastrado.exercicioStatus:"Ativo";
          
          const opt=document.createElement("option");
          opt.value=ano.toString();
          opt.textContent=ano+" ("+status+")";
          if(ano===2026) opt.selected=true;
          selectExercicio.appendChild(opt);
        });
      }
    }

    function autenticar(){
      const exercicio=document.getElementById("login-exercicio").value;
      const perfil=document.getElementById("login-perfil").value;
      const input=document.getElementById("login-input").value;
      
      if(!exercicio){
        showInlineAlert("❌ Selecione um exercício fiscal","error");
        return;
      }
      
      if(!perfil){
        showInlineAlert("❌ Selecione um perfil de acesso","error");
        return;
      }

      let usuario=null;

      if(perfil==="gestor"){
        if(input.trim()!=="123456"){
          showInlineAlert("❌ Senha do Gestor incorreta!\n\nUse: 123456","error");
          return;
        }
        usuario={
          id:"ADM001",
          nome:"Gestor Administrativo",
          perfil:"gestor",
          matricula:"ADM001",
          unidades:["HMWG","HRTM","HEMONORTE","HCCPG"]
        };
      } else if(perfil==="tecnico"){
        if(!input||input.trim()===""){
          showInlineAlert("❌ Digite sua matrícula técnico","error");
          return;
        }
        const tecnicosCadastrados={
          "TEC001":{nome:"Carlos Silva",unidades:["HMWG","HRTM"],servicos:["hemodialise","cirurgias","opme-ortopedia"]},
          "TEC002":{nome:"Ana Costa",unidades:["HRTM"],servicos:["hemodialise","laboratorio"]},
          "TEC003":{nome:"Roberto Martins",unidades:["HMWG","HEMONORTE"],servicos:["telemedicina","homecare"]},
          "TEC004":{nome:"Mariana Santos",unidades:["HCCPG"],servicos:["opme-urologia","cirurgias"]}
        };
        
        const inputUpper=input.toUpperCase().trim();
        if(!tecnicosCadastrados[inputUpper]){
          showInlineAlert("❌ Matrícula não encontrada.\n\nExemplos: TEC001, TEC002, TEC003, TEC004","error");
          return;
        }
        
        const tecnico=tecnicosCadastrados[inputUpper];
        usuario={
          id:inputUpper,
          nome:tecnico.nome,
          perfil:"tecnico",
          matricula:inputUpper,
          unidades:tecnico.unidades,
          servicos:tecnico.servicos
        };
      } else if(perfil==="visitante"){
        usuario={
          id:"VIS001",
          nome:"Visitante",
          perfil:"visitante",
          matricula:"VIS001",
          unidades:[]
        };
      }

      if(usuario){
        usuarioAutenticado=usuario;
        currentProfile=perfil;
        exercicioAtivo=parseInt(exercicio);
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("exercicio-badge").textContent=exercicio;
        updateProfileUI();
        showInlineAlert("✅ Bem-vindo, "+usuario.nome+"!","info");
      }
    }

    function fazerLogout(){
      usuarioAutenticado=null;
      exercicioAtivo=2026;
      document.getElementById("login-screen").classList.remove("hidden");
      document.getElementById("app").classList.add("hidden");
      document.getElementById("login-exercicio").value="2026";
      document.getElementById("login-perfil").value="";
      document.getElementById("login-input").value="";
      document.getElementById("login-credenciais").classList.add("hidden");
    }

    document.addEventListener("DOMContentLoaded",()=>{
      carregarExerciciosCadastrados();
      
      document.getElementById("login-perfil").addEventListener("change",(e)=>{
        const credDiv=document.getElementById("login-credenciais");
        const labelCred=document.getElementById("label-credencial");
        if(e.target.value==="gestor"){
          credDiv.classList.remove("hidden");
          labelCred.textContent="🔐 Senha de Acesso";
          document.getElementById("login-input").type="password";
          document.getElementById("login-input").placeholder="Digite a senha...";
        } else if(e.target.value==="tecnico"){
          credDiv.classList.remove("hidden");
          labelCred.textContent="👤 Sua Matrícula Técnico";
          document.getElementById("login-input").type="text";
          document.getElementById("login-input").placeholder="Ex: TEC001";
        } else {
          credDiv.classList.add("hidden");
        }
        document.getElementById("login-input").value="";
      });

      document.getElementById("login-input").addEventListener("keypress",(e)=>{
        if(e.key==="Enter") autenticar();
      });
    });

    function showInlineAlert(msg,tipo="info"){
      const alertDiv=document.createElement("div");
      alertDiv.className=`fixed top-4 right-4 px-4 py-3 rounded-lg ${tipo==="error"?"bg-red-100 text-red-700":"bg-blue-100 text-blue-700"} text-sm font-medium z-40 fade-in`;
      alertDiv.textContent=msg;
      document.body.appendChild(alertDiv);
      setTimeout(()=>alertDiv.remove(),3000);
    }

    // ─── PROFILES & PERMISSIONS ───
    const profiles={
      gestor:{label:"Gestor Admin",color:"emerald",perms:["create","edit","delete","manage_users","view_all"]},
      tecnico:{label:"Técnico Operacional",color:"blue",perms:["create","edit","delete_own","view_linked"]},
      visitante:{label:"Visitante (Leitura)",color:"slate",perms:["view_only"]}
    };

    function updateProfileUI(){
      const p=profiles[currentProfile];
      const nomeUsuario=usuarioAutenticado?usuarioAutenticado.nome:p.label;
      document.getElementById("profile-text").textContent=nomeUsuario;
      document.getElementById("profile-badge").classList.toggle("bg-blue-50",currentProfile==="tecnico");
      document.getElementById("profile-badge").classList.toggle("bg-slate-50",currentProfile==="visitante");
      document.getElementById("profile-badge").classList.toggle("bg-navy-50",currentProfile==="gestor");
      buildNav();
      renderContent();
      lucide.createIcons();
    }

    function hasPermission(perm){
      return profiles[currentProfile].perms.includes(perm)||profiles[currentProfile].perms.includes("view_all");
    }

    // ─── HELPERS ───
    const fmt=v=>"R$ "+(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtM=v=>{if(v>=1e6)return"R$ "+(v/1e6).toFixed(1)+"M";if(v>=1e3)return"R$ "+(v/1e3).toFixed(0)+"K";return fmt(v)};
    const pct=(a,b)=>b?Math.round(a/b*100):0;

    function statusBadge(s){
      const m={"Ativo":"bg-emerald-100 text-emerald-700","Vencendo":"bg-yellow-100 text-yellow-700","Crítico":"bg-red-100 text-red-700","Sem saldo":"bg-orange-100 text-orange-700","Encerrado":"bg-slate-100 text-slate-600",
        "Pago":"bg-emerald-100 text-emerald-700","Em análise":"bg-sky-100 text-sky-700","UCI":"bg-cyan-100 text-cyan-700","Liquidado":"bg-blue-100 text-blue-700","Financeiro":"bg-indigo-100 text-indigo-700","Recebido":"bg-steel-200 text-steel-700","Glosado":"bg-red-100 text-red-700","A liquidar":"bg-yellow-100 text-yellow-700","Na unidade":"bg-purple-100 text-purple-700"};
      return `<span class="badge ${m[s]||'bg-slate-100 text-slate-600'}">${s}</span>`;
    }

    // ─── NAV ───
    const navItems=[
      {id:"dashboard",icon:"layout-dashboard",label:"Dashboard"},
      {id:"contratos",icon:"file-text",label:"Contratos"},
      {id:"pagamentos",icon:"credit-card",label:"Pagamentos"},
      {id:"producao",icon:"activity",label:"Produção"},
      {id:"tecnicos",icon:"users",label:"Técnicos",onlyGestor:true},
      {id:"exercicios",icon:"calendar",label:"Exercícios",onlyGestor:true},
      {id:"auditoria",icon:"search",label:"Auditoria",onlyGestor:true},
      {id:"relatorios",icon:"bar-chart-3",label:"Relatórios"},
      {id:"configuracoes",icon:"settings",label:"⚙️ Configurações",onlyGestor:true},
    ];

    function buildNav(){
      const c=document.getElementById("nav-items");
      c.innerHTML=navItems.filter(n=>!n.onlyGestor||currentProfile==="gestor").map(n=>`
        <button onclick="switchTab('${n.id}')" id="nav-${n.id}" class="flex items-center gap-3 px-4 py-4 rounded-lg text-base font-bold transition-all ${currentTab===n.id?'tab-active':'text-steel-700 hover:bg-navy-100 hover:text-navy-900'}">
          <i data-lucide="${n.icon}" class="w-6 h-6 flex-shrink-0"></i>
          <span>${n.label}</span>
        </button>
      `).join("");
      lucide.createIcons();
    }

    function switchTab(id){currentTab=id;buildNav();renderContent()}
    function openModal(title,content){
      const modalCont=document.getElementById("modal-container");
      const modalContent=document.getElementById("modal-content");
      modalContent.innerHTML=`
        <div class="p-8">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-navy-900">${title}</h2>
            <button onclick="closeAllModals()" class="p-2 rounded hover:bg-sky-100"><i data-lucide="x" class="w-6 h-6 text-steel-600"></i></button>
          </div>
          ${content}
        </div>`;
      document.getElementById("modal-overlay").classList.remove("hidden");
      modalCont.classList.remove("hidden");
      lucide.createIcons();
    }

    function closeAllModals(){
      document.getElementById("modal-overlay").classList.add("hidden");
      document.getElementById("modal-container").classList.add("hidden");
    }

    // ─── CONTENT RENDERER ───
    function renderContent(){
      const el=document.getElementById("content-area");
      const renderers={
        dashboard:renderDashboard,
        contratos:renderContratos,
        pagamentos:renderPagamentos,
        producao:renderProducao,
        tecnicos:renderTecnicos,
        exercicios:renderExercicios,
        auditoria:renderAuditoria,
        relatorios:renderRelatorios,
        configuracoes:renderConfiguracoes
      };
      el.innerHTML="";
      (renderers[currentTab]||renderDashboard)(el);
      
      document.querySelectorAll(".hidden-btn").forEach(btn=>{
        btn.style.display=hasPermission("edit")||hasPermission("create")?"":"none";
      });
      lucide.createIcons();
    }

    // ─── ALERTAS DE VIGÊNCIA ───
    function verificarVigenciaContratos(){
      const hoje=new Date();
      const alertas=[];
      
      allContratos.forEach(c=>{
        if(!c.vigFim) return;
        const vigFim=new Date(c.vigFim);
        const diasRestantes=Math.floor((vigFim-hoje)/(1000*60*60*24));
        
        if(diasRestantes<0){
          alertas.push({tipo:"Expirado",contrato:c.nContrato,empresa:c.empresa,dias:diasRestantes,severidade:"crítica"});
        } else if(diasRestantes<=30){
          alertas.push({tipo:"Vencendo",contrato:c.nContrato,empresa:c.empresa,dias:diasRestantes,severidade:"alta"});
        } else if(diasRestantes<=90){
          alertas.push({tipo:"Atenção",contrato:c.nContrato,empresa:c.empresa,dias:diasRestantes,severidade:"média"});
        }
      });
      
      return alertas;
    }

async function salvarContratoComEmpenhos(e) {
  e.preventDefault();
  
  // Coletar dados dos empenhos dinâmicos
  const empenhosDOM = document.querySelectorAll(".item-empenho");
  const listaEmpenhos = [];
  let somaEmpenhos = 0;

  empenhosDOM.forEach(item => {
    const num = item.querySelector(".emp-numero").value;
    const val = parseFloat(item.querySelector(".emp-valor").value) || 0;
    const font = item.querySelector(".emp-fonte").value;
    
    if(num) {
      listaEmpenhos.push({ numero: num, valor: val, fonte: font });
      somaEmpenhos += val;
    }
  });

  const novoContrato = {
    id: Date.now().toString(),
    tipo: "contrato",
    empresa: document.getElementById("form-empresa").value,
    nContrato: document.getElementById("form-ncontrato").value,
    valorContrato: parseFloat(document.getElementById("form-valor-contrato").value),
    servicoTipo: document.getElementById("form-servico").value,
    empenhosVinculados: listaEmpenhos, // O Array com todos os empenhos
    valorEmpenhoTotal: somaEmpenhos,   // Soma automática para o Dashboard
    anoExercicio: exercicioAtivo,
    status: "Ativo",
    criadoEm: new Date().toISOString()
  };

  const result = await window.dataSdk.create(novoContrato);
  if(result.isOk) {
    closeAllModals();
    showInlineAlert("✅ Contrato e " + listaEmpenhos.length + " empenhos vinculados com sucesso!");
  }
}

    async function salvarPagamento(e){
      e.preventDefault();
      if(!hasPermission("create")){
        showInlineAlert("Sem permissão para criar pagamentos","error");
        return;
      }
      
      const novoPagamento={
        id:Date.now().toString(),
        tipo:"pagamento",
        uh:document.getElementById("form-uh-pag").value,
        contrato_id:document.getElementById("form-contrato-pag").value,
        competencia:document.getElementById("form-competencia-pag").value,
        nfNumero:document.getElementById("form-nf-pag").value,
        nfValor:parseFloat(document.getElementById("form-valor-nf-pag").value),
        processoSEI:document.getElementById("form-sei-pag").value,
        dataEmissao:document.getElementById("form-data-nf-pag").value,
        empenho:document.getElementById("form-empenho-pag").value,
        situacao:document.getElementById("form-situacao-pag").value,
        tipoNF:"servico",
        criadoEm:new Date().toISOString()
      };
      
      const result=await window.dataSdk.create(novoPagamento);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Pagamento salvo com sucesso!","info");
      } else {
        showInlineAlert("Erro ao salvar pagamento","error");
      }
    }

    // ─── STUBS ───
    // ─── PRODUÇÃO ───
    let filtroProducaoCompetencia="";
    let filtroProducaoContrato="";
    let filtroProducaoEmpresa="";
    let filtroProducaoUH="";
    let filtroProducaoServico="";

    function renderProducao(el){
      // Coletar competências dos pagamentos
      const competencias=new Set();
      allPagamentos.forEach(p=>{if(p.competencia) competencias.add(p.competencia)});
      const competenciasOrdenadas=[...competencias].sort().reverse();

      // Coletar contratos
      const contratosFiltrados=allContratos.filter(c=>c.anoExercicio==exercicioAtivo);

      // Coletar empresas
      const empresas=new Set(contratosFiltrados.map(c=>c.empresa).filter(Boolean));

      // Coletar unidades
      const unidades=new Set();
      contratosFiltrados.forEach(c=>{
        if(c.unidades){
          c.unidades.split(",").forEach(uh=>unidades.add(uh.trim()));
        }
      });

      // Coletar serviços
      const servicos=new Set(contratosFiltrados.map(c=>c.servicoTipo).filter(Boolean));

      // Filtrar pagamentos
      let pagamentosFiltrados=allPagamentos.filter(p=>p.anoExercicio==exercicioAtivo||!p.anoExercicio);
      
      if(filtroProducaoCompetencia) pagamentosFiltrados=pagamentosFiltrados.filter(p=>p.competencia===filtroProducaoCompetencia);
      if(filtroProducaoContrato) pagamentosFiltrados=pagamentosFiltrados.filter(p=>p.contrato_id===filtroProducaoContrato);
      if(filtroProducaoUH) pagamentosFiltrados=pagamentosFiltrados.filter(p=>p.uh===filtroProducaoUH);

      if(filtroProducaoEmpresa||filtroProducaoServico){
        pagamentosFiltrados=pagamentosFiltrados.filter(p=>{
          const contrato=allContratos.find(c=>c.id===p.contrato_id);
          if(!contrato) return false;
          if(filtroProducaoEmpresa && contrato.empresa!==filtroProducaoEmpresa) return false;
          if(filtroProducaoServico && contrato.servicoTipo!==filtroProducaoServico) return false;
          return true;
        });
      }

      // Agrupar por unidade
      const producaoPorUH={};
      pagamentosFiltrados.forEach(p=>{
        if(!producaoPorUH[p.uh]) producaoPorUH[p.uh]={count:0,valor:0};
        producaoPorUH[p.uh].count++;
        producaoPorUH[p.uh].valor+=parseFloat(p.nfValor)||0;
      });

      // Agrupar por serviço
      const producaoPorServico={};
      pagamentosFiltrados.forEach(p=>{
        const contrato=allContratos.find(c=>c.id===p.contrato_id);
        const svc=contrato?.servicoTipo||"Sem classificação";
        if(!producaoPorServico[svc]) producaoPorServico[svc]={count:0,valor:0};
        producaoPorServico[svc].count++;
        producaoPorServico[svc].valor+=parseFloat(p.nfValor)||0;
      });

      // Cálculos totais
      const totalPagamentos=pagamentosFiltrados.length;
      const totalValor=pagamentosFiltrados.reduce((s,p)=>s+(parseFloat(p.nfValor)||0),0);
      const metaMensal=500;
      const execucaoPercentual=totalPagamentos>0?Math.min(100,Math.round((totalPagamentos/metaMensal)*100)):0;

      el.innerHTML=`
      <div class="fade-in space-y-6">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 class="text-2xl font-bold text-navy-900">📊 Produção Assistencial</h2>
            <p class="text-sm text-steel-500 mt-2">Monitoramento de atividades por contrato, unidade e serviço</p>
          </div>
          ${currentProfile==="gestor"?`<button onclick="openNovaProducaoModal()" class="btn-primary px-4 py-2 rounded-lg flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i>Registrar Produção
          </button>`:""}
        </div>

        <!-- Filtros -->
        <div class="glass rounded-xl p-6 grid grid-cols-1 md:grid-cols-5 gap-4">
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Competência</label>
            <select onchange="filtroProducaoCompetencia=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${competenciasOrdenadas.map(c=>`<option value="${c}" ${filtroProducaoCompetencia===c?"selected":""}>${c}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Contrato</label>
            <select onchange="filtroProducaoContrato=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${contratosFiltrados.map(c=>`<option value="${c.id}" ${filtroProducaoContrato===c.id?"selected":""}>${c.nContrato}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Empresa</label>
            <select onchange="filtroProducaoEmpresa=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...empresas].sort().map(emp=>`<option value="${emp}" ${filtroProducaoEmpresa===emp?"selected":""}>${emp}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Unidade</label>
            <select onchange="filtroProducaoUH=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...unidades].sort().map(uh=>`<option value="${uh}" ${filtroProducaoUH===uh?"selected":""}>${uh}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Serviço</label>
            <select onchange="filtroProducaoServico=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${[...servicos].sort().map(svc=>`<option value="${svc}" ${filtroProducaoServico===svc?"selected":""}>${svc}</option>`).join("")}
            </select>
          </div>
        </div>

        <!-- KPIs -->
        <div class="grid md:grid-cols-4 gap-5">
          <div class="glass rounded-xl p-6 card-hover fade-in">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">Total Registros</p>
            <p class="text-3xl font-bold text-navy-900">${totalPagamentos}</p>
            <p class="text-xs text-steel-500 mt-2">Notas Fiscais</p>
          </div>
          <div class="glass rounded-xl p-6 card-hover fade-in" style="animation-delay:60ms">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">Valor Total</p>
            <p class="text-3xl font-bold text-navy-900">${fmtM(totalValor)}</p>
            <p class="text-xs text-steel-500 mt-2">Faturado</p>
          </div>
          <div class="glass rounded-xl p-6 card-hover fade-in" style="animation-delay:120ms">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">Meta Mensal</p>
            <p class="text-3xl font-bold text-navy-900">${metaMensal}</p>
            <p class="text-xs text-steel-500 mt-2">Procedimentos</p>
          </div>
          <div class="glass rounded-xl p-6 card-hover fade-in" style="animation-delay:180ms">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">% Execução</p>
            <p class="text-3xl font-bold ${execucaoPercentual>=80?"text-emerald-600":execucaoPercentual>=50?"text-yellow-600":"text-red-600"}">${execucaoPercentual}%</p>
            <div class="h-2 bg-sky-200 rounded-full mt-2 overflow-hidden"><div class="h-full ${execucaoPercentual>=80?"bg-emerald-600":execucaoPercentual>=50?"bg-yellow-600":"bg-red-600"}" style="width:${execucaoPercentual}%"></div></div>
          </div>
        </div>

        <!-- Análise Detalhada -->
        <div class="grid md:grid-cols-2 gap-5">
          <!-- Produção por Unidade -->
          <div class="glass rounded-xl p-6">
            <h3 class="text-lg font-bold text-navy-900 mb-5 flex items-center gap-2">
              <i data-lucide="hospital" class="w-5 h-5 text-navy-600"></i>🏥 Produção por Unidade
            </h3>
            <div class="space-y-3">
              ${Object.entries(producaoPorUH).length===0?`
              <p class="text-sm text-steel-500">Nenhum registro para os filtros selecionados</p>
              `:`
              ${Object.entries(producaoPorUH).map(([uh,data])=>{
                const maxValue=Math.max(...Object.values(producaoPorUH).map(d=>d.count));
                const percentual=(data.count/maxValue)*100;
                return `
                <div>
                  <div class="flex justify-between text-sm font-bold mb-2">
                    <span class="text-navy-900">${uh}</span>
                    <span class="text-emerald-600">${data.count} registros • ${fmtM(data.valor)}</span>
                  </div>
                  <div class="h-3 bg-sky-200 rounded-full overflow-hidden">
                    <div class="h-full bg-emerald-500 rounded-full" style="width:${percentual}%"></div>
                  </div>
                </div>
                `;
              }).join("")}
              `}
            </div>
          </div>

          <!-- Produção por Serviço -->
          <div class="glass rounded-xl p-6">
            <h3 class="text-lg font-bold text-navy-900 mb-5 flex items-center gap-2">
              <i data-lucide="briefcase" class="w-5 h-5 text-navy-600"></i>💼 Produção por Serviço
            </h3>
            <div class="space-y-3">
              ${Object.entries(producaoPorServico).length===0?`
              <p class="text-sm text-steel-500">Nenhum registro para os filtros selecionados</p>
              `:`
              ${Object.entries(producaoPorServico).sort((a,b)=>b[1].count-a[1].count).map(([svc,data])=>{
                const maxValue=Math.max(...Object.values(producaoPorServico).map(d=>d.count));
                const percentual=(data.count/maxValue)*100;
                return `
                <div>
                  <div class="flex justify-between text-sm font-bold mb-2">
                    <span class="text-navy-900">${svc}</span>
                    <span class="text-blue-600">${data.count} registros • ${fmtM(data.valor)}</span>
                  </div>
                  <div class="h-3 bg-blue-200 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-600 rounded-full" style="width:${percentual}%"></div>
                  </div>
                </div>
                `;
              }).join("")}
              `}
            </div>
          </div>
        </div>

        <!-- Tabela Detalhada -->
        ${pagamentosFiltrados.length>0?`
        <div class="glass rounded-xl overflow-hidden">
          <table class="w-full text-xs">
            <thead>
              <tr class="border-b border-navy-200/30">
                <th class="text-left px-4 py-3 font-bold text-navy-900">Competência</th>
                <th class="text-left px-4 py-3 font-bold text-navy-900">Contrato</th>
                <th class="text-left px-4 py-3 font-bold text-navy-900">Empresa</th>
                <th class="text-left px-4 py-3 font-bold text-navy-900">Unidade</th>
                <th class="text-left px-4 py-3 font-bold text-navy-900">NF</th>
                <th class="text-right px-4 py-3 font-bold text-navy-900">Valor</th>
                <th class="text-center px-4 py-3 font-bold text-navy-900">Status</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-sky-100/50">
              ${pagamentosFiltrados.slice(0,10).map(p=>{
                const contrato=allContratos.find(c=>c.id===p.contrato_id);
                return `
                <tr class="row-hover">
                  <td class="px-4 py-3 font-mono text-navy-700">${p.competencia}</td>
                  <td class="px-4 py-3 font-semibold text-navy-900">${contrato?.nContrato||"—"}</td>
                  <td class="px-4 py-3 text-steel-700">${contrato?.empresa||"—"}</td>
                  <td class="px-4 py-3 font-mono text-navy-600">${p.uh}</td>
                  <td class="px-4 py-3 font-mono text-navy-600">${p.nfNumero}</td>
                  <td class="px-4 py-3 text-right font-bold text-navy-900">${fmtM(p.nfValor)}</td>
                  <td class="px-4 py-3 text-center">${statusBadge(p.situacao)}</td>
                </tr>
                `;
              }).join("")}
            </tbody>
          </table>
          ${pagamentosFiltrados.length>10?`<div class="px-4 py-3 text-xs text-steel-600 text-center">+ ${pagamentosFiltrados.length-10} registros</div>`:""}
        </div>
        `:""}
      </div>`;
      lucide.createIcons();
    }

    // ─── AUDITORIA ───
    let filtroAuditoriaCompetencia="";
    let filtroAuditoriaContrato="";
    let filtroAuditoriaEmpresa="";
    let filtroAuditoriaUH="";
    let filtroAuditoriaServico="";

    function renderAuditoria(el){
      // Coletar dados para os filtros
      const competencias=new Set();
      allPagamentos.forEach(p=>{if(p.competencia) competencias.add(p.competencia)});
      const competenciasOrdenadas=[...competencias].sort().reverse();

      const contratosFiltrados=allContratos.filter(c=>c.anoExercicio==exercicioAtivo);
      const empresas=new Set(contratosFiltrados.map(c=>c.empresa).filter(Boolean));

      const unidades=new Set();
      contratosFiltrados.forEach(c=>{
        if(c.unidades){
          c.unidades.split(",").forEach(uh=>unidades.add(uh.trim()));
        }
      });

      const servicos=new Set(contratosFiltrados.map(c=>c.servicoTipo).filter(Boolean));

      // Analisar inconsistências
      const issues=[];

      // Verificar contratos sem empenho
      contratosFiltrados.forEach(c=>{
        if(!c.valorEmpenho2026 || c.valorEmpenho2026===0){
          issues.push({
            tipo:"⚠️ Inconsistência",
            desc:`Contrato ${c.nContrato} (${c.empresa}) sem empenho vinculado`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Alta",
            categoria:"empenho"
          });
        }
      });

      // Verificar pagamentos duplicados
      const nfsAgrupo=new Map();
      allPagamentos.forEach(p=>{
        const key=`${p.nfNumero}-${p.uh}`;
        if(!nfsAgrupo.has(key)) nfsAgrupo.set(key,[]);
        nfsAgrupo.get(key).push(p);
      });

      nfsAgrupo.forEach((pagtos,key)=>{
        if(pagtos.length>1){
          issues.push({
            tipo:"🔴 Crítico",
            desc:`Pagamento duplicado detectado (NF: ${key.split("-")[0]}) - ${pagtos.length} registros`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Crítica",
            categoria:"duplicacao"
          });
        }
      });

      // Verificar saldos negativos
      contratosFiltrados.forEach(c=>{
        const saldo=(c.valorEmpenho2026||0)-(c.valorExecutado2026||0);
        if(saldo<0){
          issues.push({
            tipo:"🔴 Crítico",
            desc:`Contrato ${c.nContrato} com saldo negativo: ${fmtM(saldo)}`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Crítica",
            categoria:"saldo"
          });
        }
      });

      // Verificar técnicos sem vínculo
      const tecnicosCadastrados=allTecnicos.filter(t=>t.tipo==="tecnico");
      tecnicosCadastrados.forEach(t=>{
        if(!t.tecnicoAtivo){
          issues.push({
            tipo:"⚠️ Inconsistência",
            desc:`Técnico ${t.tecnicoNome} (${t.tecnicoMatricula}) inativo no sistema`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Média",
            categoria:"tecnico"
          });
        }
      });

      // Verificar contratos vencendo
      const hoje=new Date();
      contratosFiltrados.forEach(c=>{
        if(c.vigFim){
          const vigFim=new Date(c.vigFim);
          const diasRestantes=Math.floor((vigFim-hoje)/(1000*60*60*24));
          if(diasRestantes>0 && diasRestantes<=30){
            issues.push({
              tipo:"⚠️ Atenção",
              desc:`Contrato ${c.nContrato} vence em ${diasRestantes} dias (${c.vigFim})`,
              data:new Date().toISOString().split("T")[0],
              severidade:"Média",
              categoria:"vigencia"
            });
          }
        }
      });

      // Filtrar issues
      let issuesFiltrados=issues;
      if(filtroAuditoriaCompetencia) issuesFiltrados=issuesFiltrados.filter(i=>i.categoria!=="empenho"&&i.categoria!=="saldo");
      if(filtroAuditoriaContrato) issuesFiltrados=issuesFiltrados.filter(i=>i.categoria!=="empenho"&&i.categoria!=="saldo");

      // Contar por severidade
      const countCritica=issuesFiltrados.filter(i=>i.severidade==="Crítica").length;
      const countAlta=issuesFiltrados.filter(i=>i.severidade==="Alta").length;
      const countMedia=issuesFiltrados.filter(i=>i.severidade==="Média").length;
      const countBaixa=issuesFiltrados.filter(i=>i.severidade==="Baixa").length;

      el.innerHTML=`
      <div class="fade-in space-y-6">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 class="text-2xl font-bold text-navy-900">🔍 Auditoria Interna</h2>
            <p class="text-sm text-steel-500 mt-2">Detecção automática de inconsistências e anomalias do exercício fiscal</p>
          </div>
          <button onclick="executarAuditoria()" class="btn-primary px-4 py-2 rounded-lg flex items-center gap-2">
            <i data-lucide="play" class="w-4 h-4"></i>Executar Auditoria Completa
          </button>
        </div>

        <!-- Filtros -->
        <div class="glass rounded-xl p-6 grid grid-cols-1 md:grid-cols-5 gap-4">
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Competência</label>
            <select onchange="filtroAuditoriaCompetencia=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${competenciasOrdenadas.map(c=>`<option value="${c}" ${filtroAuditoriaCompetencia===c?"selected":""}>${c}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Contrato</label>
            <select onchange="filtroAuditoriaContrato=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${contratosFiltrados.map(c=>`<option value="${c.id}" ${filtroAuditoriaContrato===c.id?"selected":""}>${c.nContrato}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Empresa</label>
            <select onchange="filtroAuditoriaEmpresa=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...empresas].sort().map(emp=>`<option value="${emp}" ${filtroAuditoriaEmpresa===emp?"selected":""}>${emp}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Unidade</label>
            <select onchange="filtroAuditoriaUH=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...unidades].sort().map(uh=>`<option value="${uh}" ${filtroAuditoriaUH===uh?"selected":""}>${uh}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Serviço</label>
            <select onchange="filtroAuditoriaServico=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${[...servicos].sort().map(svc=>`<option value="${svc}" ${filtroAuditoriaServico===svc?"selected":""}>${svc}</option>`).join("")}
            </select>
          </div>
        </div>

        <!-- Summary KPIs -->
        <div class="grid md:grid-cols-4 gap-5">

    function adicionarListaItem(listKey,inputId){
      const inputEl=document.getElementById(inputId);
      if(!inputEl||!inputEl.value.trim()){
        showInlineAlert("❌ Digite um valor","error");
        return;
      }
      
      const novoItem=inputEl.value.trim();
      if(!listas[listKey]) listas[listKey]=[];
      
      if(listas[listKey].includes(novoItem)){
        showInlineAlert("❌ Este item já existe","error");
        return;
      }
      
      listas[listKey].push(novoItem);
      inputEl.value="";
      showInlineAlert("✅ Item adicionado com sucesso!","info");
      renderConfiguracoes(document.getElementById("content-area"));
    }

    function deletarListaItem(listKey,item){
      if(listas[listKey]){
        listas[listKey]=listas[listKey].filter(i=>i!==item);
        showInlineAlert("✅ Item removido com sucesso!","info");
        renderConfiguracoes(document.getElementById("content-area"));
      }
    }

    // ─── INIT ───
    async function initializeApp(){
      let attempts=0;
      while(!window.dataSdk && attempts<100){
        await new Promise(r=>setTimeout(r,50));
        attempts++;
      }
      
      if(window.dataSdk){
        try {
          const initResult=await window.dataSdk.init(dataHandler);
          if(!initResult.isOk){
            console.error("Data SDK init error");
          }
        } catch(e){
          console.error("Data SDK error:",e);
        }
      }
      
      if(window.elementSdk){
        try {
          window.elementSdk.init({
            defaultConfig:{system_title:"SGC-CAS",subtitle_text:"Gestão Contratual v3.0"},
            onConfigChange:async(cfg)=>{
              const titleEl=document.getElementById("main-title");
              const subtitleEl=document.getElementById("main-subtitle");
              if(titleEl) titleEl.textContent=cfg.system_title;
              if(subtitleEl) subtitleEl.textContent=cfg.subtitle_text;
            },
            mapToCapabilities:cfg=>({recolorables:[],borderables:[],fontEditable:undefined,fontSizeable:undefined}),
            mapToEditPanelValues:cfg=>new Map([["system_title",cfg.system_title],["subtitle_text",cfg.subtitle_text]])
          });
        } catch(e){
          console.error("Element SDK error:",e);
        }
      }
      
      lucide.createIcons();
    }

    if(document.readyState==="loading"){
      document.addEventListener("DOMContentLoaded",initializeApp);
    } else {
      initializeApp();
