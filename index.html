  <script>
    // ─── GLOBALS ───
    let currentProfile="gestor";
    let currentTab="dashboard";
    let allContratos=[];
    let allPagamentos=[];
    let allProducao=[];
    let allTecnicos=[];
    let usuarioAutenticado=null;
    let filtroUH="";
    let filtroServico="";
    let filtroEmpresa="";
    let filtroFonte="";
    let fontesExecucaoSelecionadas=[];
    let filtroPagamentosSituacao="";
    let filtroContratosExecucaoStatus="";
    let exercicioAtivo=2026;
    
    // Listas Configuráveis
    let listas={
      fontes:["Fonte 500 - Tesouro Estadual","Fonte 600 - Federal","Fonte 720","Tesouro Estadual","Receita Própria"],
      unidades:["HMWG","HRTM","HEMONORTE","HCCPG"],
      empresas:["MedServ Ltda","Tech Saúde","Bem+Health","Clínica Plus"],
      servicos:["telemedicina|Telemedicina","homecare|Home Care","hemodialise|Hemodiálise","laboratorio|Laboratórios","cirurgias|Cirurgias Eletivas","opme-ortopedia|OPME Ortopedia","opme-urologia|OPME Urologia"],
      situacoes:["A liquidar","Liquidado","Pago","Na unidade"],
      status:["🟢 Ativo","🟡 Fechado","🔵 Auditado"]
    };

    
    // ─── TÉCNICOS: PERSISTÊNCIA E LOGIN DINÂMICO ───
    function obterTecnicosPadrao(){
      return [
        {id:"TEC001",tipo:"tecnico",tecnicoMatricula:"TEC001",tecnicoNome:"Carlos Silva",tecnicoUnidades:"HMWG,HRTM",tecnicoServicos:"hemodialise,cirurgias,opme-ortopedia",tecnicoAtivo:true},
        {id:"TEC002",tipo:"tecnico",tecnicoMatricula:"TEC002",tecnicoNome:"Ana Costa",tecnicoUnidades:"HRTM",tecnicoServicos:"hemodialise,laboratorio",tecnicoAtivo:true},
        {id:"TEC003",tipo:"tecnico",tecnicoMatricula:"TEC003",tecnicoNome:"Roberto Martins",tecnicoUnidades:"HMWG,HEMONORTE",tecnicoServicos:"telemedicina,homecare",tecnicoAtivo:true},
        {id:"TEC004",tipo:"tecnico",tecnicoMatricula:"TEC004",tecnicoNome:"Mariana Santos",tecnicoUnidades:"HCCPG",tecnicoServicos:"opme-urologia,cirurgias",tecnicoAtivo:true}
      ];
    }

    function carregarTecnicosLocais(){
      try{return JSON.parse(localStorage.getItem("sigecon_tecnicos")||"[]");}catch(e){return [];}
    }

    function salvarTecnicosLocais(lista){
      localStorage.setItem("sigecon_tecnicos",JSON.stringify(lista||[]));
    }

    function carregarTecnicosExcluidos(){
      try{return JSON.parse(localStorage.getItem("sigecon_tecnicos_excluidos")||"[]");}catch(e){return [];}
    }

    function salvarTecnicosExcluidos(lista){
      localStorage.setItem("sigecon_tecnicos_excluidos",JSON.stringify([...(new Set(lista||[]))]));
    }

    function carregarConfiguracoesLocais(){
      try{
        const salvas=JSON.parse(localStorage.getItem("sigecon_configuracoes")||"{}");
        if(salvas.listas && typeof salvas.listas==="object"){
          listas={...listas,...salvas.listas};
        }
        delete listas.servidores;
        delete listas.empenhos;
      }catch(e){
        console.warn("Não foi possível carregar configurações locais:",e);
      }
    }

    function salvarConfiguracoesLocais(){
      delete listas.servidores;
      delete listas.empenhos;
      const atual=JSON.parse(localStorage.getItem("sigecon_configuracoes")||"{}");
      localStorage.setItem("sigecon_configuracoes",JSON.stringify({
        ...atual,
        listas:listas,
        atualizadoEm:new Date().toISOString()
      }));
      return true;
    }

    function obterIdentidadeConfiguracao(){
      try{
        const salvas=JSON.parse(localStorage.getItem("sigecon_configuracoes")||"{}");
        return salvas.identidade||{titulo:"SIGECON - SESAP RN",subtitulo:"Gestão Contratual",suporte:"suporte@sis.gov.br"};
      }catch(e){
        return {titulo:"SIGECON - SESAP RN",subtitulo:"Gestão Contratual",suporte:"suporte@sis.gov.br"};
      }
    }

    function carregarExerciciosLocais(){
      try{return JSON.parse(localStorage.getItem("sigecon_exercicios")||"[]");}catch(e){return [];}
    }

    function salvarExerciciosLocais(lista){
      localStorage.setItem("sigecon_exercicios",JSON.stringify(lista||[]));
    }

    function mesclarExerciciosLocais(registros){
      const mapa=new Map();
      (registros||[]).forEach(item=>{
        if(item.tipo==="exercicio"){
          mapa.set(String(item.exercicioAno||item.id),item);
        }
      });
      carregarExerciciosLocais().forEach(item=>{
        if(item.tipo==="exercicio"){
          mapa.set(String(item.exercicioAno||item.id),item);
        }
      });
      const outros=(registros||[]).filter(item=>item.tipo!=="exercicio");
      return [...outros,...mapa.values()];
    }

    function obterExerciciosDisponiveis(){
      const padrao=[
        {id:"ex-2026",tipo:"exercicio",exercicioAno:2026,exercicioStatus:"Ativo"},
        {id:"ex-2025",tipo:"exercicio",exercicioAno:2025,exercicioStatus:"Fechado"},
        {id:"ex-2024",tipo:"exercicio",exercicioAno:2024,exercicioStatus:"Fechado"}
      ];
      const todos=mesclarExerciciosLocais([...(allTecnicos||[]),...padrao]).filter(x=>x.tipo==="exercicio");
      const mapa=new Map();
      todos.forEach(ex=>{
        if(ex.exercicioAno) mapa.set(String(ex.exercicioAno),ex);
      });
      return [...mapa.values()].sort((a,b)=>(b.exercicioAno||0)-(a.exercicioAno||0));
    }

    async function salvarExercicioSeguro(exercicio){
      const existentes=carregarExerciciosLocais().filter(ex=>String(ex.exercicioAno)!==String(exercicio.exercicioAno) && String(ex.id)!==String(exercicio.id));
      existentes.push(exercicio);
      salvarExerciciosLocais(existentes);

      if(window.dataSdk && window.dataSdk.create){
        try{
          const jaExiste=allTecnicos.find(ex=>ex.tipo==="exercicio" && String(ex.exercicioAno)===String(exercicio.exercicioAno));
          if(!jaExiste){
            const result=await window.dataSdk.create(exercicio);
            if(result?.isOk){
              allTecnicos=mesclarExerciciosLocais([...allTecnicos,exercicio]);
              return {isOk:true,origem:"dataSdk"};
            }
          }
        }catch(e){console.warn("Falha ao salvar exercício no Data SDK. Mantido localmente:",e);}
      }
      allTecnicos=mesclarExerciciosLocais([...allTecnicos,exercicio]);
      return {isOk:true,origem:"local"};
    }

    async function atualizarExercicioSeguro(exercicio){
      const locais=carregarExerciciosLocais();
      const idx=locais.findIndex(ex=>String(ex.id)===String(exercicio.id) || String(ex.exercicioAno)===String(exercicio.exercicioAno));
      if(idx>=0) locais[idx]=exercicio; else locais.push(exercicio);
      salvarExerciciosLocais(locais);

      if(window.dataSdk && window.dataSdk.update && allTecnicos.some(ex=>String(ex.id)===String(exercicio.id))){
        try{
          const result=await window.dataSdk.update(exercicio);
          if(result?.isOk){
            allTecnicos=mesclarExerciciosLocais(allTecnicos.map(ex=>String(ex.id)===String(exercicio.id)?exercicio:ex));
            return {isOk:true,origem:"dataSdk"};
          }
        }catch(e){console.warn("Falha ao atualizar exercício no Data SDK. Mantido localmente:",e);}
      }
      allTecnicos=mesclarExerciciosLocais(allTecnicos.map(ex=>String(ex.id)===String(exercicio.id)?exercicio:ex));
      return {isOk:true,origem:"local"};
    }

    async function excluirExercicioSeguro(exercicio){
      salvarExerciciosLocais(carregarExerciciosLocais().filter(ex=>String(ex.id)!==String(exercicio.id) && String(ex.exercicioAno)!==String(exercicio.exercicioAno)));

      if(window.dataSdk && window.dataSdk.delete && allTecnicos.some(ex=>String(ex.id)===String(exercicio.id))){
        try{
          const result=await window.dataSdk.delete(exercicio);
          if(result?.isOk){
            allTecnicos=mesclarExerciciosLocais(allTecnicos.filter(ex=>String(ex.id)!==String(exercicio.id)));
            return {isOk:true,origem:"dataSdk"};
          }
        }catch(e){console.warn("Falha ao excluir exercício no Data SDK. Removido localmente:",e);}
      }
      allTecnicos=mesclarExerciciosLocais(allTecnicos.filter(ex=>String(ex.id)!==String(exercicio.id) && String(ex.exercicioAno)!==String(exercicio.exercicioAno)));
      return {isOk:true,origem:"local"};
    }

    function chaveTecnico(t){
      return String(t?.tecnicoMatricula||t?.id||"").trim().toUpperCase();
    }

    function mesclarTecnicosLocais(registros){
      const mapa=new Map();
      const excluidos=new Set(carregarTecnicosExcluidos().map(x=>String(x||"").toUpperCase()));
      [...(registros||[]),...carregarTecnicosLocais(),...obterTecnicosPadrao()].forEach(item=>{
        const chaveMat=chaveTecnico(item);
        if(item.tipo==="tecnico" && excluidos.has(chaveMat)) return;
        const chave=item.tipo==="tecnico" ? "tecnico_"+chaveMat : String(item.tipo||"")+"_"+String(item.id||"");
        if(chave && !mapa.has(chave)) mapa.set(chave,item);
      });
      return [...mapa.values()];
    }

    function buscarTecnicoPorMatricula(matricula){
      const mat=String(matricula||"").trim().toUpperCase();
      return mesclarTecnicosLocais(allTecnicos).find(t=>t.tipo==="tecnico" && chaveTecnico(t)===mat && t.tecnicoAtivo!==false);
    }

    async function criarOuSalvarLocal(registro){
      if(window.dataSdk && window.dataSdk.create){
        try{
          const result=await window.dataSdk.create(registro);
          if(result?.isOk) return {isOk:true, origem:"dataSdk"};
        }catch(e){console.warn("Falha no Data SDK. Salvando localmente:",e);}
      }
      const locais=carregarTecnicosLocais().filter(t=>String(t.id)!==String(registro.id) && chaveTecnico(t)!==chaveTecnico(registro));
      locais.push(registro);
      salvarTecnicosLocais(locais);
      allTecnicos=mesclarTecnicosLocais(allTecnicos);
      return {isOk:true, origem:"local"};
    }

    async function atualizarOuSalvarLocal(registro){
      if(window.dataSdk && window.dataSdk.update && !String(registro.id||"").startsWith("TEC00")){
        try{
          const result=await window.dataSdk.update(registro);
          if(result?.isOk) return {isOk:true, origem:"dataSdk"};

      }
      const locais=carregarTecnicosLocais();
      const idx=locais.findIndex(t=>String(t.id)===String(registro.id) || chaveTecnico(t)===chaveTecnico(registro));
      if(idx>=0) locais[idx]=registro; else locais.push(registro);
      salvarTecnicosLocais(locais);
      allTecnicos=mesclarTecnicosLocais(allTecnicos.filter(t=>String(t.id)!==String(registro.id)));
      return {isOk:true, origem:"local"};
    }

    async function excluirTecnicoSeguro(registro){
      const matricula=chaveTecnico(registro);
      const excluidos=carregarTecnicosExcluidos();
      if(matricula && !excluidos.map(x=>String(x).toUpperCase()).includes(matricula)){
        excluidos.push(matricula);
        salvarTecnicosExcluidos(excluidos);
      }

      if(window.dataSdk && window.dataSdk.delete && !String(registro.id||"").startsWith("TEC00")){
        try{
          const result=await window.dataSdk.delete(registro);
          if(result?.isOk){
            allTecnicos=mesclarTecnicosLocais(allTecnicos.filter(t=>String(t.id)!==String(registro.id) && chaveTecnico(t)!==matricula));
            return {isOk:true, origem:"dataSdk"};
          }
        }catch(e){console.warn("Falha no delete Data SDK. Removendo localmente:",e);}
      }

      const locais=carregarTecnicosLocais().filter(t=>String(t.id)!==String(registro.id) && chaveTecnico(t)!==matricula);
      salvarTecnicosLocais(locais);
      allTecnicos=mesclarTecnicosLocais(allTecnicos.filter(t=>String(t.id)!==String(registro.id) && chaveTecnico(t)!==matricula));
      return {isOk:true, origem:"local"};
    }

    function carregarExerciciosCadastrados(){
      const selectExercicio=document.getElementById("login-exercicio");
      if(!selectExercicio) return;
      while(selectExercicio.options.length>1){
        selectExercicio.remove(1);
      }

      const exercicios=obterExerciciosDisponiveis();
      exercicios.forEach(ex=>{
        const opt=document.createElement("option");
        opt.value=String(ex.exercicioAno);
        opt.textContent=ex.exercicioAno+" ("+(ex.exercicioStatus||"Ativo")+")";
        if(ex.exercicioAno===exercicioAtivo || ex.exercicioAno===2026) opt.selected=true;
        selectExercicio.appendChild(opt);
      });
    }

    function autenticar(){
      const exercicio=document.getElementById("login-exercicio").value;
      const perfil=document.getElementById("login-perfil").value;
      const input=document.getElementById("login-input").value;
      
      if(!exercicio){
        showInlineAlert("❌ Selecione um exercício fiscal","error");
        return;
      }
      
      if(!perfil){
        showInlineAlert("❌ Selecione um perfil de acesso","error");
        return;
      }

      let usuario=null;

      if(perfil==="gestor"){
        if(input.trim()!=="123456"){
          showInlineAlert("❌ Senha do Gestor incorreta!\n\nUse: 123456","error");
          return;
        }
        usuario={
          id:"ADM001",
          nome:"Gestor Administrativo",
          perfil:"gestor",
          matricula:"ADM001",
          unidades:["HMWG","HRTM","HEMONORTE","HCCPG"]
        };
      } else if(perfil==="tecnico"){
        if(!input||input.trim()===""){
          showInlineAlert("❌ Digite sua matrícula de técnico","error");
          return;
        }

        const inputUpper=input.toUpperCase().trim();
        const tecnico=buscarTecnicoPorMatricula(inputUpper);

        if(!tecnico){
          const cadastrados=mesclarTecnicosLocais(allTecnicos)
            .filter(t=>t.tipo==="tecnico" && t.tecnicoAtivo!==false)
            .map(t=>t.tecnicoMatricula)
            .filter(Boolean)
            .slice(0,8)
            .join(", ");
          showInlineAlert("❌ Matrícula não encontrada ou técnico inativo."+(cadastrados?` Matrículas ativas: ${cadastrados}`:""),"error");
          return;
        }

        usuario={
          id:chaveTecnico(tecnico),
          nome:tecnico.tecnicoNome||"Técnico Operacional",
          perfil:"tecnico",
          matricula:chaveTecnico(tecnico),
          unidades:[],
          servicos:String(tecnico.tecnicoServicos||"").split(",").map(s=>s.trim()).filter(Boolean)
        };
      } else if(perfil==="visitante"){
        usuario={
          id:"VIS001",
          nome:"Visitante",
          perfil:"visitante",
          matricula:"VIS001",
          unidades:[]
        };
      }

      if(usuario){
        usuarioAutenticado=usuario;
        currentProfile=perfil;
        exercicioAtivo=parseInt(exercicio);
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("exercicio-badge").textContent=exercicio;
        updateProfileUI();
        showInlineAlert("✅ Bem-vindo, "+usuario.nome+"!","info");
      }
    }

    function hasPermission(perm){
      return profiles[currentProfile].perms.includes(perm)||profiles[currentProfile].perms.includes("view_all");
    }

    // ─── HELPERS ───
    const fmt=v=>"R$ "+(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtM = v => "R$ " + (v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    const pct=(a,b)=>b?Math.round(a/b*100):0;

    function parseValorBR(valor){
      if(valor===undefined||valor===null) return 0;
      const texto=String(valor).trim();
      if(!texto) return 0;
      const normalizado=texto.replace(/R\$|\s/g,"").replace(/\./g,"").replace(",",".");
      return parseFloat(normalizado)||0;
    }

    function escapeHtml(valor){
      return String(valor ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function extrairEmpenhosContrato(c){
      if(Array.isArray(c?.empenhos) && c.empenhos.length){
        return c.empenhos.map(e=>({
          numero:String(e.numero||"").trim(),
          valor:parseValorBR(e.valor),
          fonte:String(e.fonte||"").trim()
        })).filter(e=>e.numero||e.valor||e.fonte);
      }

      if(c?.empenhosTexto){
        return String(c.empenhosTexto).split("\n").map(linha=>{
          const partes=linha.split("|");
          return {
            numero:String(partes[0]||"").trim(),
            valor:parseValorBR(partes[1]),
            fonte:String(partes[2]||"").trim()
          };
        }).filter(e=>e.numero||e.valor||e.fonte);
      }

      if(c?.valorEmpenho2026){
        return [{numero:"Empenho não detalhado", valor:parseValorBR(c.valorEmpenho2026), fonte:c.fonteRecurso||"Não informada"}];
      }

      return [];
    }

    function montarTextoEmpenhos(empenhos){
      return (empenhos||[]).map(e=>`${e.numero||""} | ${parseValorBR(e.valor).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})} | ${e.fonte||""}`).join("\n");
    }

    function calcularValorEmpenhadoContrato(c){
      return extrairEmpenhosContrato(c).reduce((acc,e)=>acc+parseValorBR(e.valor),0);
    }

    function calcularValorEmpenhadoContratoPorFontes(c,fontes){
      const fontesNormalizadas=(fontes||[]).map(f=>String(f||"").toLowerCase().trim()).filter(Boolean);
      return extrairEmpenhosContrato(c).reduce((acc,e)=>{
        const valor=parseValorBR(e.valor);
        if(fontesNormalizadas.length===0) return acc+valor;
        const fonteEmpenho=String(e.fonte||"").toLowerCase();
        return fontesNormalizadas.some(f=>fonteEmpenho.includes(f))?acc+valor:acc;
      },0);
    }

    function obterFontePagamento(p){
      if(p?.fonteRecurso) return String(p.fonteRecurso);
      const contrato=allContratos.find(c=>c.id===p?.contrato_id);
      const empenho=extrairEmpenhosContrato(contrato||{}).find(e=>String(e.numero)===String(p?.empenho));
      return empenho?.fonte||"";
    }

    function contratoTemAlgumaFonte(c,fontes){
      if(!fontes||fontes.length===0) return true;
      return fontes.some(f=>contratoTemFonte(c,f));
    }

    function pagamentoTemAlgumaFonte(p,fontes){
      if(!fontes||fontes.length===0) return true;
      const fontePagamento=obterFontePagamento(p).toLowerCase();
      return fontes.some(f=>fontePagamento.includes(String(f).toLowerCase()));
    }

    function contratoTemFonte(c,fonte){
      if(!fonte) return true;
      const termo=String(fonte).toLowerCase().trim();
      if(!termo) return true;
      return extrairEmpenhosContrato(c).some(e=>String(e.fonte||"").toLowerCase().includes(termo));
    }

      return [...new Set(empresas.filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt-BR"));

    function obterFontesDisponiveis(contratos=allContratos){
      const fontes=[...listas.fontes];
      (contratos||[]).forEach(c=>extrairEmpenhosContrato(c).forEach(e=>{
        if(e.fonte) fontes.push(e.fonte);
      }));
      return [...new Set(fontes)].sort((a,b)=>a.localeCompare(b,"pt-BR"));

    function extrairNFsPagamento(p){
      if(Array.isArray(p?.notasFiscais) && p.notasFiscais.length){
        return p.notasFiscais.map(n=>({
          numero:String(n.numero||"").trim(),

    // ─── ALERTAS DE VIGÊNCIA ───
    function verificarVigenciaContratos(){
      const hoje=new Date();
      const alertas=[];

      allContratos.forEach(c=>{
        if(!c.vigFim) return;
        const vigFim=new Date(c.vigFim);
        const diasRestantes=Math.ceil((vigFim-hoje)/(1000*60*60*24));

        if(diasRestantes<0){
          alertas.push({
            tipo:"Expirado",
            cor:"vermelho",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:`Vencido há ${Math.abs(diasRestantes)} dia(s).`
          });
        } else if(diasRestantes<=30){
          alertas.push({
            tipo:"Crítico",
            cor:"vermelho",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:diasRestantes===0?"Vence hoje.":`Faltam ${diasRestantes} dia(s).`
          });
        } else if(diasRestantes<=60){
          alertas.push({
            tipo:"Atenção",
            cor:"amarelo",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:`Faltam ${diasRestantes} dia(s).`
          });
        } else if(diasRestantes<=90){
          alertas.push({
            tipo:"Primeiro aviso",
            cor:"azul",
            contrato:c.nContrato,
            empresa:c.empresa,
            dias:diasRestantes,
            mensagem:`Primeiro aviso: faltam ${diasRestantes} dia(s).`
          });
        }
      });

      return alertas.sort((a,b)=>a.dias-b.dias);
    }

    function calcularValorExecutadoContrato(c){
      return allPagamentos
        .filter(p=>p.contrato_id===c.id && (!p.anoExercicio || p.anoExercicio==exercicioAtivo))
        .reduce((acc,p)=>acc+parseValorBR(p.nfValor),0);
    }

    function calcularPercentualTempoContrato(c){
      if(!c.vigIni || !c.vigFim) return 0;
      const inicio=new Date(c.vigIni);
      const fim=new Date(c.vigFim);
      const hoje=new Date();
      if(isNaN(inicio)||isNaN(fim)||fim<=inicio) return 0;
      const total=fim-inicio;
      const decorrido=Math.min(Math.max(hoje-inicio,0),total);
      return Math.round((decorrido/total)*100);
    }

    function analisarExecucaoContrato(c){
      const empenhado=calcularValorEmpenhadoContrato(c);
      const executado=calcularValorExecutadoContrato(c);
      const pctExecucao=pct(executado,empenhado);
      const pctTempo=calcularPercentualTempoContrato(c);
      const diferenca=pctExecucao-pctTempo;

      let status="Dentro do esperado";
      let cor="verde";
      let leitura="Execução compatível com o prazo decorrido.";

      if(diferenca<-15){
        status="Abaixo do esperado";
        cor="vermelho";
        leitura="Execução abaixo do ritmo esperado para o período.";
      } else if(diferenca>15){
        status="Acima do esperado";
        cor="amarelo";
        leitura="Execução acima do ritmo esperado. Acompanhar saldo e fonte.";
      }

      return {
        contrato:c.nContrato,
        empresa:c.empresa,
        status,
        cor,
        leitura,
        empenhado,
        executado,
        pctExecucao,
        pctTempo,
        diferenca
      };
    }

    function obterAlertasExecucao(contratos){
      return contratos
        .filter(c=>calcularValorEmpenhadoContrato(c)>0)
        .map(analisarExecucaoContrato);
    }

    function normalizarServicoItem(item){
      if(typeof item==="object" && item!==null){
        return {codigo:item.codigo||item.id||item.value||"", nome:item.nome||item.label||item.codigo||""};
      }
      const txt=String(item||"");
      if(txt.includes("|")){
        const [codigo,...rest]=txt.split("|");
        return {codigo:codigo.trim(), nome:(rest.join("|")||codigo).trim()};
      }
      return {codigo:txt.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""), nome:txt.trim()};
    }

    function renderDashboard(el){

        contratosFiltrados=contratosFiltrados.filter(c=>

        );
      }

      const contratosBaseParaFiltros=[...contratosFiltrados];

      if(filtroUH) contratosFiltrados=contratosFiltrados.filter(c=>c.unidades?.includes(filtroUH));
      if(filtroServico) contratosFiltrados=contratosFiltrados.filter(c=>c.servicoTipo===filtroServico);
      if(filtroEmpresa) contratosFiltrados=contratosFiltrados.filter(c=>String(c.empresa||"")===String(filtroEmpresa));
      if(filtroFonte) contratosFiltrados=contratosFiltrados.filter(c=>contratoTemFonte(c,filtroFonte));

      const totalContratos=contratosFiltrados.length;
      const totalGlobal=contratosFiltrados.reduce((s,c)=>s+(parseFloat(c.valorContrato)||0),0);
      const totalEmpenhado=contratosFiltrados.reduce((s,c)=>s+calcularValorEmpenhadoContrato(c),0);
      const totalExecutado=contratosFiltrados.reduce((s,c)=>s+(parseFloat(c.valorExecutado2026)||0),0);
      const saldo=totalEmpenhado-totalExecutado;
      const execPct=pct(totalExecutado,totalEmpenhado);
      const saldoPct=pct(saldo,totalEmpenhado);

      const opcoesEmpresas=obterEmpresasDisponiveis(contratosBaseParaFiltros, filtroEmpresa);
      const opcoesFontes=obterFontesDisponiveis(allContratos.filter(c=>c.anoExercicio==exercicioAtivo));
      fontesExecucaoSelecionadas=fontesExecucaoSelecionadas.filter(f=>opcoesFontes.includes(f));

      const contratosExecucaoFonte=contratosFiltrados.filter(c=>contratoTemAlgumaFonte(c,fontesExecucaoSelecionadas));
      const idsContratosExecucao=new Set(contratosExecucaoFonte.map(c=>c.id));
      const totalEmpenhadoExecucao=contratosExecucaoFonte.reduce((s,c)=>s+calcularValorEmpenhadoContratoPorFontes(c,fontesExecucaoSelecionadas),0);
      const totalExecutadoExecucao=allPagamentos.filter(p=>{
        if(p.anoExercicio && p.anoExercicio!=exercicioAtivo) return false;
        if(!idsContratosExecucao.has(p.contrato_id)) return false;
        return pagamentoTemAlgumaFonte(p,fontesExecucaoSelecionadas);
      }).reduce((s,p)=>s+(parseValorBR(p.nfValor)||0),0);
      const saldoExecucao=totalEmpenhadoExecucao-totalExecutadoExecucao;
      const pctExecutadoFonte=pct(totalExecutadoExecucao,totalEmpenhadoExecucao);

      const alertasVigencia=verificarVigenciaContratos();
      const alertasExecucao=obterAlertasExecucao(contratosFiltrados);
      const qtdAbaixo=alertasExecucao.filter(a=>a.cor==="vermelho").length;
      const qtdDentro=alertasExecucao.filter(a=>a.cor==="verde").length;
      const qtdAcima=alertasExecucao.filter(a=>a.cor==="amarelo").length;
      const qtdVigCritica=alertasVigencia.filter(a=>a.cor==="vermelho").length;
      const qtdVigAtencao=alertasVigencia.filter(a=>a.cor==="amarelo").length;
      const qtdVigPrimeiro=alertasVigencia.filter(a=>a.cor==="azul").length;
      const totalEmpresas=new Set(contratosFiltrados.map(c=>c.empresa).filter(Boolean)).size;
      const totalFontesDisponiveis=opcoesFontes.length;
      const servicosAtivos=new Set(contratosFiltrados.map(c=>c.servicoTipo).filter(Boolean)).size;

      const cards=[
        {icon:"landmark",label:"Contratado",value:fmtM(totalGlobal),color:"navy",pct:totalGlobal>0?100:0},

        {icon:"zap",label:"Saldo",value:fmtM(saldo),color:"cyan",pct:saldoPct},
      ];

      const distribuicaoUH=['HMWG','HRTM','HEMONORTE','HCCPG'].map(uh=>{
        const contratosUH=contratosFiltrados.filter(c=>c.unidades?.includes(uh));
        return {
          uh,
          count:contratosUH.length,
          valor:contratosUH.reduce((s,c)=>s+(parseFloat(c.valorContrato)||0),0)
        };
      });
      const maiorValorUH=Math.max(1,...distribuicaoUH.map(i=>i.valor));

      const topEmpresas=[...contratosFiltrados]
        .sort((a,b)=>calcularValorEmpenhadoContrato(b)-calcularValorEmpenhadoContrato(a))
        .slice(0,5);
      const maiorTopEmpresa=Math.max(1,...topEmpresas.map(c=>calcularValorEmpenhadoContrato(c)),1);

    async function salvarContrato(e){
      e.preventDefault();
      if(!hasPermission("create")){showInlineAlert("Sem permissão","error");return}
      
      const unidades=[...document.querySelectorAll(".form-uh-multi:checked")].map(el=>el.value);
      if(unidades.length===0){
        showInlineAlert("Selecione pelo menos uma unidade hospitalar","error");
        return;
      }
      
      const empenhos=coletarEmpenhos("form-lista-empenhos");
      const empenhosTexto=montarTextoEmpenhos(empenhos);

    async function atualizarContrato(e,id){
      e.preventDefault();
      const unidades=[...document.querySelectorAll(".edit-uh-multi:checked")].map(el=>el.value);
      if(unidades.length===0){
        showInlineAlert("Selecione pelo menos uma unidade hospitalar","error");
        return;
      }
      const empenhos=coletarEmpenhos("edit-lista-empenhos");
      const empenhosTexto=montarTextoEmpenhos(empenhos);
      
      const contratoAtualizado={
        ...allContratos.find(x=>x.id===id),
        nProcesso:document.getElementById("edit-nprocesso").value,
        unidades:unidades.join(","),
        empresa:document.getElementById("edit-empresa").value,
        nContrato:document.getElementById("edit-ncontrato").value,
        aditivo:document.getElementById("edit-aditivo").value||"—",
        vigIni:document.getElementById("edit-vigini").value,
        vigFim:document.getElementById("edit-vigfim").value,
        valorContrato:parseFloat(document.getElementById("edit-valor-contrato").value),
        valorEstimadoMensal:parseFloat(document.getElementById("edit-valor-mensal").value),
        servicoTipo:document.getElementById("edit-servico").value,
        empenhos:empenhos,
        empenhosTexto:empenhosTexto,
        valorEmpenho2026:calcularValorEmpenhadoContrato({empenhos})
      };
      
      const result=await window.dataSdk.update(contratoAtualizado);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Contrato atualizado com sucesso!","info");
      } else {
        showInlineAlert("Erro ao atualizar contrato","error");
      }
    }

    async function confirmarExclusaoContrato(id){
      const c=allContratos.find(x=>x.id===id);
      if(!c)return;
      const result=await window.dataSdk.delete(c);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Contrato excluído com sucesso!","info");
      } else {
        showInlineAlert("❌ Erro ao excluir contrato","error");
      }
    }

    async function atualizarPagamento(e,id){
      e.preventDefault();
      const notas=coletarNotasPagamento();
      const empenhos=coletarEmpenhosPagamento("edit");

      if(!empenhos.length){
        showInlineAlert("❌ Selecione pelo menos um empenho","error");
        return;
      }
      if(!notas.length){
        showInlineAlert("❌ Cadastre pelo menos uma nota fiscal","error");
        return;
      }

      const totalNotas=notas.reduce((s,n)=>s+parseValorBR(n.valor),0);
      const pagamentoAtualizado={
        ...allPagamentos.find(x=>x.id===id),
        uh:document.getElementById("edit-uh-pag").value,
        contrato_id:document.getElementById("edit-contrato-pag").value,
        competencia:document.getElementById("edit-competencia-pag").value,
        empenhos:empenhos,
        empenho:empenhos.map(e=>e.numero).join(","),
        fonteRecurso:[...new Set(empenhos.map(e=>e.fonte).filter(Boolean))].join(", "),
        valorEmpenhoVinculado:empenhos.reduce((s,e)=>s+parseValorBR(e.valor),0),
        notasFiscais:notas,
        nfNumero:notas.map(n=>n.numero).join(", "),
        nfValor:totalNotas,
        processoSEI:notas.map(n=>n.sei).filter(Boolean).join(", "),
        dataEmissao:notas[0]?.dataEmissao||"",
        tipoNF:notas.map(n=>n.tipo).join(","),
        situacao:document.getElementById("edit-situacao-pag").value
      };

      const result=await window.dataSdk.update(pagamentoAtualizado);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Pagamento atualizado com sucesso!","info");
      } else {
        showInlineAlert("Erro ao atualizar pagamento","error");
      }
    }

    async function confirmarExclusaoPagamento(id){
      const p=allPagamentos.find(x=>x.id===id);
      if(!p)return;
      const result=await window.dataSdk.delete(p);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Pagamento excluído com sucesso!","info");
      } else {
        showInlineAlert("❌ Erro ao excluir pagamento","error");
      }
    }

    async function salvarPagamento(e){
      e.preventDefault();
      if(!hasPermission("create")){
        showInlineAlert("Sem permissão para criar pagamentos","error");
        return;
      }

      const notas=coletarNotasPagamento();
      const empenhos=coletarEmpenhosPagamento("form");

      if(!empenhos.length){
        showInlineAlert("❌ Selecione pelo menos um empenho","error");
        return;
      }
      if(!notas.length){
        showInlineAlert("❌ Cadastre pelo menos uma nota fiscal","error");
        return;
      }

      const totalNotas=notas.reduce((s,n)=>s+parseValorBR(n.valor),0);

      const novoPagamento={
        id:Date.now().toString(),
        tipo:"pagamento",
        uh:document.getElementById("form-uh-pag").value,
        contrato_id:document.getElementById("form-contrato-pag").value,
        competencia:document.getElementById("form-competencia-pag").value,
        empenhos:empenhos,
        empenho:empenhos.map(e=>e.numero).join(","),
        fonteRecurso:[...new Set(empenhos.map(e=>e.fonte).filter(Boolean))].join(", "),
        valorEmpenhoVinculado:empenhos.reduce((s,e)=>s+parseValorBR(e.valor),0),
        notasFiscais:notas,
        nfNumero:notas.map(n=>n.numero).join(", "),
        nfValor:totalNotas,
        processoSEI:notas.map(n=>n.sei).filter(Boolean).join(", "),
        dataEmissao:notas[0]?.dataEmissao||"",
        situacao:document.getElementById("form-situacao-pag").value,
        tipoNF:notas.map(n=>n.tipo).join(","),
        criadoEm:new Date().toISOString()
      };

      const result=await window.dataSdk.create(novoPagamento);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Pagamento salvo com sucesso!","info");
      } else {
        showInlineAlert("Erro ao salvar pagamento","error");
      }
    }

    // ─── STUBS ───
    // ─── PRODUÇÃO ───
    let filtroProducaoCompetencia="";
    let filtroProducaoContrato="";
    let filtroProducaoEmpresa="";
    let filtroProducaoUH="";
    let filtroProducaoServico="";

    function obterPagamentoLabel(p){
      const contrato=allContratos.find(c=>c.id===p.contrato_id);
      const nfs=extrairNFsPagamento(p).map(n=>n.numero).filter(Boolean).join(", ");
      return `${p.competencia||"—"} • ${contrato?.nContrato||"Contrato"} • ${contrato?.empresa||"—"} • NF(s): ${nfs||p.nfNumero||"—"}`;
    }

    function obterProducaoPorPagamento(pagamentoId){
      return allProducao.find(pr=>pr.pagamento_id===pagamentoId);
    }

      const svc=String(servico||"").toLowerCase();

      if(svc.includes("cirurgia") || svc.includes("cirurgias") || svc.includes("eletiva")){
        return `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
              <label class="block text-xs font-semibold text-navy-900 mb-1">Nº de Procedimentos</label>
              <input id="form-prod-procedimentos" type="number" min="0" class="input-field w-full" value="${dados.numProcedimentos||""}" placeholder="0">
            </div>
            <div>
              <label class="block text-xs font-semibold text-navy-900 mb-1">Nº de Cirurgias</label>
              <input id="form-prod-cirurgias" type="number" min="0" class="input-field w-full" value="${dados.numCirurgias||""}" placeholder="0">
            </div>
            <div>
              <label class="block text-xs font-semibold text-navy-900 mb-1">Nº de Pacientes Atendidos</label>
              <input id="form-prod-pacientes" type="number" min="0" class="input-field w-full" value="${dados.numPacientes||""}" placeholder="0">
            </div>

        `;

      if(svc.includes("hemodialise") || svc.includes("hemodiálise")){

            <div>
              <label class="block text-xs font-semibold text-navy-900 mb-1">Nº Sessões HD</label>

            </div>
            <div>
              <label class="block text-xs font-semibold text-navy-900 mb-1">Nº Inserções de Cateter</label>
              <input id="form-prod-cateter" type="number" min="0" class="input-field w-full" value="${dados.numInsercaoCateter||""}" placeholder="0">

          </div>
        `;
      }

      return `
        <div class="grid grid-cols-1 gap-3">
          <div>
            <label class="block text-xs font-semibold text-navy-900 mb-1">Dados comuns da produção</label>

          </div>
        </div>
      `;

    function atualizarFormularioProducao(){
      const pagamentoId=document.getElementById("form-prod-pagamento")?.value;
      const resumo=document.getElementById("resumo-pagamento-producao");
      const campos=document.getElementById("campos-producao-servico");
      const pagamento=allPagamentos.find(p=>p.id===pagamentoId);
      const contrato=allContratos.find(c=>c.id===pagamento?.contrato_id);
      const producaoExistente=obterProducaoPorPagamento(pagamentoId)||{};

      if(!pagamento||!contrato){
        if(resumo) resumo.innerHTML=`<p class="text-sm text-steel-500">Selecione um processo de pagamento para carregar os dados.</p>`;
        if(campos) campos.innerHTML="";
        return;
      }

      const notas=extrairNFsPagamento(pagamento);
      const empenhos=Array.isArray(pagamento.empenhos)?pagamento.empenhos:(pagamento.empenho?[{numero:pagamento.empenho,fonte:pagamento.fonteRecurso}]:[]);

      if(resumo){
        resumo.innerHTML=`
          <div class="grid md:grid-cols-3 gap-3 text-xs">
            <div><p class="text-steel-500">Contrato</p><p class="font-bold text-navy-900">${escapeHtml(contrato.nContrato||"—")}</p></div>
            <div><p class="text-steel-500">Empresa</p><p class="font-bold text-navy-900">${escapeHtml(contrato.empresa||"—")}</p></div>
            <div><p class="text-steel-500">Serviço</p><p class="font-bold text-navy-900">${servicoLabel(contrato.servicoTipo)}</p></div>
            <div><p class="text-steel-500">Competência</p><p class="font-bold text-navy-900">${escapeHtml(pagamento.competencia||"—")}</p></div>
            <div><p class="text-steel-500">NF(s)</p><p class="font-bold text-navy-900">${escapeHtml(notas.map(n=>n.numero).join(", ")||pagamento.nfNumero||"—")}</p></div>
            <div><p class="text-steel-500">Valor</p><p class="font-bold text-navy-900">${fmtM(pagamento.nfValor)}</p></div>
            <div class="md:col-span-3"><p class="text-steel-500">Empenho(s)</p><p class="font-bold text-navy-900">${escapeHtml(empenhos.map(e=>e.numero).join(", ")||"—")}</p></div>
          </div>
        `;
      }

      if(campos){
        campos.innerHTML=renderCamposProducaoServico(contrato.servicoTipo,producaoExistente);
      }
      lucide.createIcons();
    }

    function renderProducao(el){
      const competencias=new Set();
      allPagamentos.forEach(p=>{if(p.competencia) competencias.add(p.competencia)});
      const competenciasOrdenadas=[...competencias].sort().reverse();

      const contratosBase=allContratos.filter(c=>c.anoExercicio==exercicioAtivo);
      const empresas=new Set(contratosBase.map(c=>c.empresa).filter(Boolean));
      const unidades=new Set();
      contratosBase.forEach(c=>{
        if(c.unidades) String(c.unidades).split(",").forEach(uh=>unidades.add(uh.trim()));
      });
      const servicos=new Set(contratosBase.map(c=>c.servicoTipo).filter(Boolean));

      let pagamentosBase=allPagamentos.filter(p=>p.anoExercicio==exercicioAtivo||!p.anoExercicio);

      if(currentProfile==="tecnico"&&usuarioAutenticado?.servicos){
        pagamentosBase=pagamentosBase.filter(p=>{
          const contrato=allContratos.find(c=>c.id===p.contrato_id);
          return contrato && usuarioAutenticado.servicos.includes(contrato.servicoTipo);
        });
      }

      if(filtroProducaoCompetencia) pagamentosBase=pagamentosBase.filter(p=>p.competencia===filtroProducaoCompetencia);
      if(filtroProducaoContrato) pagamentosBase=pagamentosBase.filter(p=>p.contrato_id===filtroProducaoContrato);
      if(filtroProducaoUH) pagamentosBase=pagamentosBase.filter(p=>p.uh===filtroProducaoUH);

      if(filtroProducaoEmpresa||filtroProducaoServico){
        pagamentosBase=pagamentosBase.filter(p=>{
          const contrato=allContratos.find(c=>c.id===p.contrato_id);
          if(!contrato) return false;
          if(filtroProducaoEmpresa && contrato.empresa!==filtroProducaoEmpresa) return false;
          if(filtroProducaoServico && contrato.servicoTipo!==filtroProducaoServico) return false;
          return true;
        });
      }

      const producoesFiltradas=allProducao.filter(pr=>pagamentosBase.some(p=>p.id===pr.pagamento_id));
      const pagamentosSemProducao=pagamentosBase.filter(p=>!obterProducaoPorPagamento(p.id));

      const totalProcessosPagamento=pagamentosBase.length;
      const totalProducoes=producoesFiltradas.length;
      const totalValor=pagamentosBase.reduce((s,p)=>s+(parseValorBR(p.nfValor)||0),0);
      const pendentes=pagamentosSemProducao.length;
      const percComProducao=totalProcessosPagamento?Math.round((totalProducoes/totalProcessosPagamento)*100):0;

      const totalProcedimentos=producoesFiltradas.reduce((s,p)=>s+(parseInt(p.numProcedimentos)||0)+(parseInt(p.numCirurgias)||0),0);
      const totalPacientes=producoesFiltradas.reduce((s,p)=>s+(parseInt(p.numPacientes)||0),0);
      const totalSessoesHD=producoesFiltradas.reduce((s,p)=>s+(parseInt(p.numSessoesHD)||0),0);
      const totalCateter=producoesFiltradas.reduce((s,p)=>s+(parseInt(p.numInsercaoCateter)||0),0);

      const producaoPorServico={};
      pagamentosBase.forEach(p=>{
        const contrato=allContratos.find(c=>c.id===p.contrato_id);
        const svc=contrato?.servicoTipo||"Sem classificação";
        if(!producaoPorServico[svc]) producaoPorServico[svc]={pagamentos:0,producoes:0,valor:0};
        producaoPorServico[svc].pagamentos++;
        producaoPorServico[svc].valor+=parseValorBR(p.nfValor);
        if(obterProducaoPorPagamento(p.id)) producaoPorServico[svc].producoes++;
      });

      el.innerHTML=`
      <div class="fade-in space-y-6">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 class="text-2xl font-bold text-navy-900">📊 Produção Assistencial</h2>
            <p class="text-sm text-steel-500 mt-2">Etapa vinculada aos processos de pagamento e respectivos contratos.</p>
          </div>
          <button onclick="openNovaProducaoModal()" class="btn-primary px-4 py-2 rounded-lg flex items-center gap-2" style="display:${hasPermission("create")?"flex":"none"}">
            <i data-lucide="plus" class="w-4 h-4"></i>Registrar Produção
          </button>
        </div>

        <div class="glass rounded-xl p-6 grid grid-cols-1 md:grid-cols-5 gap-4">
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Competência</label>
            <select onchange="filtroProducaoCompetencia=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${competenciasOrdenadas.map(c=>`<option value="${c}" ${filtroProducaoCompetencia===c?"selected":""}>${c}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Contrato</label>
            <select onchange="filtroProducaoContrato=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${contratosBase.map(c=>`<option value="${c.id}" ${filtroProducaoContrato===c.id?"selected":""}>${c.nContrato}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Empresa</label>
            <select onchange="filtroProducaoEmpresa=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...empresas].sort().map(emp=>`<option value="${emp}" ${filtroProducaoEmpresa===emp?"selected":""}>${emp}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Unidade</label>
            <select onchange="filtroProducaoUH=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...unidades].sort().map(uh=>`<option value="${uh}" ${filtroProducaoUH===uh?"selected":""}>${uh}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Serviço</label>
            <select onchange="filtroProducaoServico=this.value;renderProducao(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${[...servicos].sort().map(svc=>`<option value="${svc}" ${filtroProducaoServico===svc?"selected":""}>${servicoLabel(svc)}</option>`).join("")}
            </select>
          </div>
        </div>

        <div class="grid md:grid-cols-4 gap-5">
          <div class="glass rounded-xl p-6 card-hover">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">Processos de pagamento</p>
            <p class="text-3xl font-bold text-navy-900">${totalProcessosPagamento}</p>
            <p class="text-xs text-steel-500 mt-2">${fmtM(totalValor)} vinculados</p>
          </div>
          <div class="glass rounded-xl p-6 card-hover">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">Produções registradas</p>
            <p class="text-3xl font-bold text-emerald-700">${totalProducoes}</p>
            <p class="text-xs text-steel-500 mt-2">${percComProducao}% dos processos</p>
          </div>
          <div class="glass rounded-xl p-6 card-hover">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">Pendentes de produção</p>
            <p class="text-3xl font-bold ${pendentes>0?"text-yellow-600":"text-emerald-600"}">${pendentes}</p>
            <p class="text-xs text-steel-500 mt-2">Após cadastro do pagamento</p>
          </div>
          <div class="glass rounded-xl p-6 card-hover">
            <p class="text-sm font-bold text-steel-600 uppercase mb-2">Indicadores específicos</p>
            <p class="text-sm font-bold text-navy-900">Proced./Cirurgias: ${totalProcedimentos}</p>

    async function salvarProducao(e){
      e.preventDefault();

      const pagamentoId=document.getElementById("form-prod-pagamento").value;
      const pagamento=allPagamentos.find(p=>p.id===pagamentoId);
      const contrato=allContratos.find(c=>c.id===pagamento?.contrato_id);

      if(!pagamento||!contrato){
        showInlineAlert("❌ Selecione um processo de pagamento válido","error");
        return;
      }

      const existente=obterProducaoPorPagamento(pagamentoId);
      const producao={
        ...(existente||{}),
        id:existente?.id||Date.now().toString(),
        tipo:"producao",
        pagamento_id:pagamentoId,
        contrato_id:pagamento.contrato_id,
        competencia:pagamento.competencia,
        uh:pagamento.uh,
        servicoTipo:contrato.servicoTipo,
        empresa:contrato.empresa,
        nContrato:contrato.nContrato,
        nfNumero:pagamento.nfNumero,
        nfValor:parseValorBR(pagamento.nfValor),
        numProcedimentos:parseInt(document.getElementById("form-prod-procedimentos")?.value||0),
        numCirurgias:parseInt(document.getElementById("form-prod-cirurgias")?.value||0),
        numPacientes:parseInt(document.getElementById("form-prod-pacientes")?.value||0),
        numSessoesHD:parseInt(document.getElementById("form-prod-sessoes-hd")?.value||0),
        numInsercaoCateter:parseInt(document.getElementById("form-prod-cateter")?.value||0),
        dadosComuns:document.getElementById("form-prod-dados-comuns")?.value||"",
        observacoes:document.getElementById("form-prod-obs").value,
        anoExercicio:exercicioAtivo,
        atualizadoEm:new Date().toISOString(),
        criadoEm:existente?.criadoEm||new Date().toISOString()
      };

      const result=existente ? await window.dataSdk.update(producao) : await window.dataSdk.create(producao);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Produção salva com sucesso!","info");
      } else {
        showInlineAlert("❌ Erro ao salvar produção","error");
      }
    }

    async function salvarTecnico(e){
      e.preventDefault();
      if(!hasPermission("create")){
        showInlineAlert("❌ Sem permissão para criar técnicos","error");
        return;
      }

      const servicos=[...document.querySelectorAll(".form-tec-srv:checked")].map(el=>el.value);
      const matricula=document.getElementById("form-tec-mat").value.trim().toUpperCase();

      if(servicos.length===0){
        showInlineAlert("❌ Selecione pelo menos um serviço","error");
        return;
      }

      if(buscarTecnicoPorMatricula(matricula)){
        showInlineAlert("❌ Já existe técnico ativo com essa matrícula","error");
        return;
      }

      salvarTecnicosExcluidos(carregarTecnicosExcluidos().filter(m=>String(m).toUpperCase()!==matricula));

      const novoTecnico={
        id:Date.now().toString(),
        tipo:"tecnico",
        tecnicoMatricula:matricula,
        tecnicoNome:document.getElementById("form-tec-nome").value.trim(),
        tecnicoUnidades:"",
        tecnicoServicos:servicos.join(","),
        tecnicoAtivo:document.getElementById("form-tec-ativo").checked,
        criadoEm:new Date().toISOString()
      };

      const result=await criarOuSalvarLocal(novoTecnico);
      if(result.isOk){
        closeAllModals();
        showInlineAlert("✅ Técnico salvo com sucesso!","info");
        renderTecnicos(document.getElementById("content-area"));
      } else {
        showInlineAlert("❌ Erro ao salvar técnico","error");
      }
    }

      const result=await excluirTecnicoSeguro(t);
      if(result.isOk){
        closeAllModals();

        renderTecnicos(document.getElementById("content-area"));
      } else {

        return;
      }
      
      const novoExercicio={
        id:Date.now().toString(),
        tipo:"exercicio",

        exercicioStatus:document.getElementById("form-status-ex").value,
        criadoEm:new Date().toISOString()

      const result=await salvarExercicioSeguro(novoExercicio);

      const ex=allTecnicos.find(x=>x.id===id);
      if(!ex)return;
      const result=await excluirExercicioSeguro(ex);

        closeAllModals();

    // ─── AUDITORIA ───
    let filtroAuditoriaCompetencia="";
    let filtroAuditoriaContrato="";
    let filtroAuditoriaEmpresa="";
    let filtroAuditoriaUH="";
    let filtroAuditoriaServico="";

    function renderAuditoria(el){
      // Coletar dados para os filtros
      const competencias=new Set();
      allPagamentos.forEach(p=>{if(p.competencia) competencias.add(p.competencia)});
      const competenciasOrdenadas=[...competencias].sort().reverse();

      const contratosFiltrados=allContratos.filter(c=>c.anoExercicio==exercicioAtivo);
      const empresas=new Set(contratosFiltrados.map(c=>c.empresa).filter(Boolean));

      const unidades=new Set();
      contratosFiltrados.forEach(c=>{
        if(c.unidades){
          c.unidades.split(",").forEach(uh=>unidades.add(uh.trim()));
        }
      });

      const servicos=new Set(contratosFiltrados.map(c=>c.servicoTipo).filter(Boolean));

      // Analisar inconsistências
      const issues=[];

      // Verificar contratos sem empenho
      contratosFiltrados.forEach(c=>{
        if(!calcularValorEmpenhadoContrato(c)){
          issues.push({
            tipo:"⚠️ Inconsistência",
            desc:`Contrato ${c.nContrato} (${c.empresa}) sem empenho vinculado`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Alta",
            categoria:"empenho"
          });
        }
      });

      // Verificar pagamentos duplicados
      const nfsAgrupo=new Map();
      allPagamentos.forEach(p=>{
        const key=`${p.nfNumero}-${p.uh}`;
        if(!nfsAgrupo.has(key)) nfsAgrupo.set(key,[]);
        nfsAgrupo.get(key).push(p);
      });

      nfsAgrupo.forEach((pagtos,key)=>{
        if(pagtos.length>1){
          issues.push({
            tipo:"🔴 Crítico",
            desc:`Pagamento duplicado detectado (NF: ${key.split("-")[0]}) - ${pagtos.length} registros`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Crítica",
            categoria:"duplicacao"
          });
        }
      });

      // Verificar saldos negativos
      contratosFiltrados.forEach(c=>{
        const saldo=calcularValorEmpenhadoContrato(c)-(c.valorExecutado2026||0);
        if(saldo<0){
          issues.push({
            tipo:"🔴 Crítico",
            desc:`Contrato ${c.nContrato} com saldo negativo: ${fmtM(saldo)}`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Crítica",
            categoria:"saldo"
          });
        }
      });

      // Verificar técnicos sem vínculo
      const tecnicosCadastrados=allTecnicos.filter(t=>t.tipo==="tecnico");
      tecnicosCadastrados.forEach(t=>{
        if(!t.tecnicoAtivo){
          issues.push({
            tipo:"⚠️ Inconsistência",
            desc:`Técnico ${t.tecnicoNome} (${t.tecnicoMatricula}) inativo no sistema`,
            data:new Date().toISOString().split("T")[0],
            severidade:"Média",
            categoria:"tecnico"
          });
        }
      });

      // Verificar contratos vencendo
      const hoje=new Date();
      contratosFiltrados.forEach(c=>{
        if(c.vigFim){
          const vigFim=new Date(c.vigFim);
          const diasRestantes=Math.floor((vigFim-hoje)/(1000*60*60*24));
          if(diasRestantes>0 && diasRestantes<=30){
            issues.push({
              tipo:"⚠️ Atenção",
              desc:`Contrato ${c.nContrato} vence em ${diasRestantes} dias (${c.vigFim})`,
              data:new Date().toISOString().split("T")[0],
              severidade:"Média",
              categoria:"vigencia"
            });
          }
        }
      });

      // Filtrar issues
      let issuesFiltrados=issues;
      if(filtroAuditoriaCompetencia) issuesFiltrados=issuesFiltrados.filter(i=>i.categoria!=="empenho"&&i.categoria!=="saldo");
      if(filtroAuditoriaContrato) issuesFiltrados=issuesFiltrados.filter(i=>i.categoria!=="empenho"&&i.categoria!=="saldo");

      // Contar por severidade
      const countCritica=issuesFiltrados.filter(i=>i.severidade==="Crítica").length;
      const countAlta=issuesFiltrados.filter(i=>i.severidade==="Alta").length;
      const countMedia=issuesFiltrados.filter(i=>i.severidade==="Média").length;
      const countBaixa=issuesFiltrados.filter(i=>i.severidade==="Baixa").length;

      el.innerHTML=`
      <div class="fade-in space-y-6">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 class="text-2xl font-bold text-navy-900">🔍 Auditoria Interna</h2>
            <p class="text-sm text-steel-500 mt-2">Detecção automática de inconsistências e anomalias do exercício fiscal</p>
          </div>
          <button onclick="executarAuditoria()" class="btn-primary px-4 py-2 rounded-lg flex items-center gap-2">
            <i data-lucide="play" class="w-4 h-4"></i>Executar Auditoria Completa
          </button>
        </div>

        <!-- Filtros -->
        <div class="glass rounded-xl p-6 grid grid-cols-1 md:grid-cols-5 gap-4">
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Competência</label>
            <select onchange="filtroAuditoriaCompetencia=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${competenciasOrdenadas.map(c=>`<option value="${c}" ${filtroAuditoriaCompetencia===c?"selected":""}>${c}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Contrato</label>
            <select onchange="filtroAuditoriaContrato=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${contratosFiltrados.map(c=>`<option value="${c.id}" ${filtroAuditoriaContrato===c.id?"selected":""}>${c.nContrato}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Empresa</label>
            <select onchange="filtroAuditoriaEmpresa=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...empresas].sort().map(emp=>`<option value="${emp}" ${filtroAuditoriaEmpresa===emp?"selected":""}>${emp}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Unidade</label>
            <select onchange="filtroAuditoriaUH=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todas</option>
              ${[...unidades].sort().map(uh=>`<option value="${uh}" ${filtroAuditoriaUH===uh?"selected":""}>${uh}</option>`).join("")}
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-navy-900 mb-2">Serviço</label>
            <select onchange="filtroAuditoriaServico=this.value;renderAuditoria(document.getElementById('content-area'))" class="input-field w-full text-sm">
              <option value="">Todos</option>
              ${[...servicos].sort().map(svc=>`<option value="${svc}" ${filtroAuditoriaServico===svc?"selected":""}>${svc}</option>`).join("")}
            </select>
          </div>
        </div>

        <!-- Summary KPIs -->
        <div class="grid md:grid-cols-4 gap-5">
          <div class="glass rounded-xl p-6 text-center card-hover fade-in">
            <p class="text-4xl font-bold ${countCritica>0?"text-red-600":"text-slate-400"}">${countCritica}</p>
            <p class="text-sm text-steel-600 mt-2 font-semibold">Crítico</p>
          </div>
          <div class="glass rounded-xl p-6 text-center card-hover fade-in" style="animation-delay:60ms">
            <p class="text-4xl font-bold ${countAlta>0?"text-orange-600":"text-slate-400"}">${countAlta}</p>
            <p class="text-sm text-steel-600 mt-2 font-semibold">Alto</p>
          </div>
          <div class="glass rounded-xl p-6 text-center card-hover fade-in" style="animation-delay:120ms">
            <p class="text-4xl font-bold ${countMedia>0?"text-yellow-600":"text-slate-400"}">${countMedia}</p>
            <p class="text-sm text-steel-600 mt-2 font-semibold">Médio</p>
          </div>
          <div class="glass rounded-xl p-6 text-center card-hover fade-in" style="animation-delay:180ms">
            <p class="text-4xl font-bold ${countBaixa>0?"text-green-600":"text-slate-400"}">${countBaixa}</p>
            <p class="text-sm text-steel-600 mt-2 font-semibold">Baixo</p>
          </div>
        </div>

        <!-- Issues List -->
        ${issuesFiltrados.length===0?`
        <div class="glass rounded-xl p-8 text-center">
          <i data-lucide="check-circle" class="w-12 h-12 text-emerald-500 mx-auto mb-3"></i>
          <p class="text-lg font-bold text-emerald-600">✅ Auditoria OK</p>
          <p class="text-sm text-steel-600 mt-2">Nenhuma inconsistência detectada nos filtros selecionados</p>
        </div>
        `:`
        <div class="glass rounded-xl overflow-hidden">
          <div class="divide-y divide-sky-100/50">
            ${issuesFiltrados.map((iss,idx)=>`
            <div class="p-4 flex items-start gap-4 hover:bg-sky-50/50 transition fade-in" style="animation-delay:${idx*50}ms">
              <div class="flex-shrink-0">
                <div class="w-10 h-10 rounded-lg ${iss.severidade==="Crítica"?"bg-red-100":""}${iss.severidade==="Alta"?"bg-orange-100":""}${iss.severidade==="Média"?"bg-yellow-100":""}${iss.severidade==="Baixa"?"bg-green-100":""} flex items-center justify-center">
                  <span class="text-lg">${iss.tipo.split(" ")[0]}</span>
                </div>
              </div>
              <div class="flex-1">
                <div class="flex items-center justify-between mb-1">
                  <p class="font-bold text-navy-900">${iss.tipo}</p>
                  <span class="badge ${iss.severidade==="Crítica"?"bg-red-100 text-red-700":iss.severidade==="Alta"?"bg-orange-100 text-orange-700":iss.severidade==="Média"?"bg-yellow-100 text-yellow-700":"bg-green-100 text-green-700"}">${iss.severidade}</span>
                </div>
                <p class="text-sm text-steel-600 mb-2">${iss.desc}</p>
                <p class="text-xs text-steel-500 font-mono">📅 ${iss.data}</p>
              </div>
              <div class="flex-shrink-0">
                <button onclick="gerarRelatorioPorIssue('${iss.categoria}')" class="p-2 rounded hover:bg-sky-100 transition" title="Gerar relatório">
                  <i data-lucide="file-text" class="w-4 h-4 text-navy-600"></i>
                </button>
              </div>
            </div>
            `).join("")}
          </div>
        </div>
        `}

        <!-- Análise de Risco -->
        <div class="glass rounded-xl p-6">
          <h3 class="text-lg font-bold text-navy-900 mb-5 flex items-center gap-2">
            <i data-lucide="alert-triangle" class="w-5 h-5 text-yellow-600"></i>📊 Índice de Risco
          </h3>
          <div class="space-y-4">
            ${[
              {label:"Contratos sem Empenho",value:allContratos.filter(c=>!calcularValorEmpenhadoContrato(c)).length,color:"bg-red-600"},
              {label:"Saldos Negativos",value:allContratos.filter(c=>(calcularValorEmpenhadoContrato(c)-(c.valorExecutado2026||0))<0).length,color:"bg-orange-600"},
              {label:"Pagamentos Pendentes",value:allPagamentos.filter(p=>p.situacao!=="Pago").length,color:"bg-yellow-600"},
              {label:"Vigências Críticas",value:allContratos.filter(c=>{const vigFim=new Date(c.vigFim);const hoje=new Date();const dias=Math.floor((vigFim-hoje)/(1000*60*60*24));return dias>0&&dias<=30}).length,color:"bg-blue-600"}
            ].map((item,i)=>`
            <div>
              <div class="flex justify-between text-sm font-bold mb-2">
                <span class="text-navy-900">${item.label}</span>
                <span class="text-navy-900">${item.value}</span>
              </div>
              <div class="h-3 bg-slate-200 rounded-full overflow-hidden">
                <div class="h-full ${item.color} rounded-full" style="width:${Math.min(100,(item.value/10)*100)}%"></div>
              </div>
            </div>
            `).join("")}
          </div>
        </div>
      </div>`;
      lucide.createIcons();
    }

      setTimeout(()=>{
        const issues=document.querySelectorAll('[class*="bg-red-100"], [class*="bg-orange-100"]').length;
        showInlineAlert(`✅ Auditoria concluída! ${issues} issues encontrados.`,"info");
      },2000);
    }

      return `
        <div class="section-card">
          <div class="section-heading">
            <h3><i data-lucide="calendar-plus" class="w-5 h-5 text-navy-600"></i>Exercícios Fiscais</h3>

          <p class="text-xs text-steel-500 mt-3">Edite os campos diretamente, marque Excluir se necessário e clique em Salvar Configurações.</p>

    async function adicionarExercicioConfiguracao(){
      const ano=parseInt(document.getElementById("config-exercicio-ano")?.value);
      const status=document.getElementById("config-exercicio-status")?.value||"Ativo";
      if(!ano){
        showInlineAlert("❌ Informe o ano do exercício","error");
        return;
      }
      if(obterExerciciosDisponiveis().some(ex=>String(ex.exercicioAno)===String(ano))){
        showInlineAlert("❌ Este exercício fiscal já existe","error");
        return;
      }

      const exercicio={id:Date.now().toString(),tipo:"exercicio",exercicioAno:ano,exercicioStatus:status,criadoEm:new Date().toISOString()};
      const result=await salvarExercicioSeguro(exercicio);
      if(result.isOk){
        carregarExerciciosCadastrados();
        showInlineAlert("✅ Exercício fiscal incluído e liberado no acesso inicial","info");
        renderConfiguracoes(document.getElementById("content-area"));
      }
    }

    async function editarExercicioConfiguracao(id,ano){
      const ex=obterExerciciosDisponiveis().find(e=>String(e.id)===String(id) || String(e.exercicioAno)===String(ano));
      if(!ex){
        alert("Exercício não encontrado para edição.");
        return;
      }
      const novoAno=prompt("Ano do exercício:",ex.exercicioAno);
      if(novoAno===null) return;
      const novoStatus=prompt("Status do exercício: Ativo, Fechado ou Auditado",ex.exercicioStatus||"Ativo");
      if(novoStatus===null) return;

      const atualizado={...ex,exercicioAno:parseInt(novoAno),exercicioStatus:novoStatus.trim()||"Ativo",atualizadoEm:new Date().toISOString()};
      const result=await atualizarExercicioSeguro(atualizado);
      if(result.isOk){
        carregarExerciciosCadastrados();
        showInlineAlert("✅ Exercício fiscal atualizado","info");
        renderConfiguracoes(document.getElementById("content-area"));
      }
    }

    async function excluirExercicioConfiguracao(id,ano){
      const ex=obterExerciciosDisponiveis().find(e=>String(e.id)===String(id) || String(e.exercicioAno)===String(ano));
      if(!ex){
        alert("Exercício não encontrado para exclusão.");
        return;
      }
      if(!confirm("Confirmar exclusão deste exercício fiscal?")) return;
      const result=await excluirExercicioSeguro(ex);
      if(result.isOk){
        carregarExerciciosCadastrados();
        showInlineAlert("✅ Exercício fiscal removido","info");
        renderConfiguracoes(document.getElementById("content-area"));
      }
    }

    window.adicionarExercicioConfiguracao=adicionarExercicioConfiguracao;
    window.editarExercicioConfiguracao=editarExercicioConfiguracao;
    window.excluirExercicioConfiguracao=excluirExercicioConfiguracao;

    if(!window.__sigeconExercicioClickHandler){

      document.addEventListener("click",function(e){
        const btn=e.target.closest("[data-exercicio-action]");
        if(!btn) return;

        e.preventDefault();
        e.stopPropagation();

        const action=btn.getAttribute("data-exercicio-action");
        const id=btn.getAttribute("data-id");
        const ano=parseInt(btn.getAttribute("data-ano"));

        if(action==="add"){
          adicionarExercicioConfiguracao();
        }
        if(action==="edit"){
          editarExercicioConfiguracao(id,ano);
        }
        if(action==="delete"){
          excluirExercicioConfiguracao(id,ano);
        }
      });
    }

      area.querySelectorAll("[data-config-action]").forEach(btn=>{

          ev.stopPropagation();

      area.querySelectorAll("[data-add-list]").forEach(btn=>{

          ev.stopPropagation();

          adicionarListaItem(this.dataset.addList,this.dataset.inputId);
        };
      });
    }

    function adicionarListaItem(listKey,inputId){
      const inputEl=document.getElementById(inputId);
      if(!inputEl||!inputEl.value.trim()){
        showInlineAlert("❌ Digite um valor","error");
        return;
      }

      const novoItem=inputEl.value.trim();
      if(!listas[listKey]) listas[listKey]=[];

      if(listas[listKey].includes(novoItem)){
        showInlineAlert("❌ Este item já existe","error");
        return;
      }

      listas[listKey].push(novoItem);
      inputEl.value="";
      salvarConfiguracoesLocais();
      showInlineAlert("✅ Item adicionado com sucesso!","info");
      renderConfiguracoes(document.getElementById("content-area"));
      setTimeout(()=>lucide.createIcons(),50);
    }

    function editarListaItem(listKey,item){
      if(!listas[listKey]) return;
      const idx=listas[listKey].findIndex(i=>i===item);
      if(idx>=0) editarListaItemPorIndice(listKey,idx);
    }

    function editarListaItemPorIndice(listKey,idx){
      idx=Number(idx);
      if(!listas[listKey] || Number.isNaN(idx) || idx<0 || idx>=listas[listKey].length){
        alert("Item não encontrado para edição.");
        return;
      }

      const atual=String(listas[listKey][idx]);
      const mensagem=listKey==="servicos" ? "Edite no formato codigo|Nome do Serviço" : "Editar item:";
      const novo=prompt(mensagem, atual);

      if(novo===null) return;

      const valor=String(novo).trim();
      if(!valor){
        alert("O valor não pode ficar vazio.");
        return;
      }

      if(valor!==atual && listas[listKey].includes(valor)){
        alert("Este item já existe.");
        return;
      }

      listas[listKey][idx]=valor;
      salvarConfiguracoesLocais();
      showInlineAlert("✅ Item atualizado com sucesso!","info");
      renderConfiguracoes(document.getElementById("content-area"));
      setTimeout(()=>lucide.createIcons(),50);
    }

    window.editarListaItemPorIndice=editarListaItemPorIndice;
    window.editarListaItem=editarListaItem;

    function deletarListaItem(listKey,item){
      if(!listas[listKey]) return;
      const idx=listas[listKey].findIndex(i=>i===item);
      if(idx>=0) deletarListaItemPorIndice(listKey,idx);
    }

    function deletarListaItemPorIndice(listKey,idx){
      idx=Number(idx);
      if(!listas[listKey] || Number.isNaN(idx) || idx<0 || idx>=listas[listKey].length){
        alert("Item não encontrado para exclusão.");
        return;
      }

      if(!confirm("Confirmar exclusão deste item?")) return;

      listas[listKey].splice(idx,1);
      salvarConfiguracoesLocais();
      showInlineAlert("✅ Item removido com sucesso!","info");
      renderConfiguracoes(document.getElementById("content-area"));
      setTimeout(()=>lucide.createIcons(),50);
    }

    window.deletarListaItemPorIndice=deletarListaItemPorIndice;
    window.deletarListaItem=deletarListaItem;

        const key=btn.getAttribute("data-key");

          editarListaItemPorIndice(key,idx);
        }

        if(action==="delete"){
          deletarListaItemPorIndice(key,idx);
        }
      });
    }

    async function configAdicionarExercicioCampo(){
      const ano=parseInt(document.getElementById("config-exercicio-ano")?.value);
      const status=document.getElementById("config-exercicio-status")?.value||"Ativo";
      if(!ano){
        alert("Informe o ano do exercício.");
        return;
      }
      if(obterExerciciosDisponiveis().some(ex=>String(ex.exercicioAno)===String(ano))){
        alert("Este exercício já existe.");
        return;
      }
      const exercicio={id:Date.now().toString(),tipo:"exercicio",exercicioAno:ano,exercicioStatus:status,criadoEm:new Date().toISOString()};
      const result=await salvarExercicioSeguro(exercicio);
      if(result.isOk){
        carregarExerciciosCadastrados();
        renderConfiguracoes(document.getElementById("content-area"));
        showInlineAlert("✅ Exercício adicionado com sucesso!","info");
      }
    }

async function salvarConfiguracoes(){
      const titulo=document.getElementById("config-system-title")?.value||"SIGECON - SESAP RN";
      const subtitulo=document.getElementById("config-system-subtitle")?.value||"Gestão Contratual";
      const suporte=document.getElementById("config-system-support")?.value||"";

      // Salvar listas a partir dos textareas
      document.querySelectorAll(".config-list-textarea").forEach(area=>{
        const key=area.dataset.configKey;
        const linhas=String(area.value||"")
          .split("\\n")
          .map(v=>v.trim())
          .filter(Boolean);

        listas[key]=[...new Set(linhas)];
      });

      delete listas.servidores;
      delete listas.empenhos;

      // Salvar exercícios fiscais
      const exerciciosAtuais=obterExerciciosDisponiveis();
      const exerciciosEditados=[];
      document.querySelectorAll(".config-exercicio-ano-input").forEach(input=>{
        const idx=Number(input.dataset.index);
        const ex=exerciciosAtuais[idx];
        if(!ex) return;

        const marcadoExcluir=document.querySelector(`.config-exercicio-delete-check[data-index="${idx}"]`)?.checked;
        if(marcadoExcluir) return;

        const status=document.querySelector(`.config-exercicio-status-input[data-index="${idx}"]`)?.value||"Ativo";
        const ano=parseInt(input.value);

        if(ano){
          exerciciosEditados.push({
            ...ex,
            exercicioAno:ano,
            exercicioStatus:status,
            atualizadoEm:new Date().toISOString()
          });
        }
      });

      salvarExerciciosLocais(exerciciosEditados);
      allTecnicos=mesclarExerciciosLocais(allTecnicos.filter(x=>x.tipo!=="exercicio").concat(exerciciosEditados));
      carregarExerciciosCadastrados();

      localStorage.setItem("sigecon_configuracoes",JSON.stringify({
        listas:listas,
        identidade:{titulo,subtitulo,suporte},
        atualizadoEm:new Date().toISOString()
      }));

      const titleEl=document.getElementById("main-title");
      const subtitleEl=document.getElementById("main-subtitle");
      if(titleEl) titleEl.textContent=titulo.includes("SIGECON")?"SIGECON":titulo;
      if(subtitleEl) subtitleEl.textContent=subtitulo;

      showInlineAlert("✅ Configurações salvas e integradas ao sistema!","info");
      renderConfiguracoes(document.getElementById("content-area"));
    }

    // ─── INIT ───
    async function initializeApp(){
      carregarConfiguracoesLocais();
      allTecnicos=mesclarExerciciosLocais(allTecnicos);
      carregarExerciciosCadastrados();
      let attempts=0;
      while(!window.dataSdk && attempts<100){
        await new Promise(r=>setTimeout(r,50));
        attempts++;
      }
      
      if(window.dataSdk){
        try {
          const initResult=await window.dataSdk.init(dataHandler);
          if(!initResult.isOk){
            console.error("Data SDK init error");
          }
        } catch(e){
          console.error("Data SDK error:",e);
        }
      }
      
      if(window.elementSdk){
        try {
          window.elementSdk.init({
            defaultConfig:{system_title:"SGC-CAS",subtitle_text:"Gestão Contratual v3.0"},
            onConfigChange:async(cfg)=>{
              const titleEl=document.getElementById("main-title");
              const subtitleEl=document.getElementById("main-subtitle");
              if(titleEl) titleEl.textContent=cfg.system_title;
              if(subtitleEl) subtitleEl.textContent=cfg.subtitle_text;
            },
            mapToCapabilities:cfg=>({recolorables:[],borderables:[],fontEditable:undefined,fontSizeable:undefined}),
            mapToEditPanelValues:cfg=>new Map([["system_title",cfg.system_title],["subtitle_text",cfg.subtitle_text]])
          });
        } catch(e){
          console.error("Element SDK error:",e);
        }
      }
      
      lucide.createIcons();
    }

    if(document.readyState==="loading"){
      document.addEventListener("DOMContentLoaded",initializeApp);
    } else {
      initializeApp();
    }
